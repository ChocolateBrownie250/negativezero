# negativezero platform — full-stack docker-compose.
#
# Run on the VPS via platform/deploy.sh (handles .env, nginx, certbot).
# Don't run by hand without .env populated.
#
# Conventions:
# - All containers prefixed `negativezero-` so they're obvious in `docker ps`
#   alongside unrelated tenants (wellfit, isgroup) on the shared VPS.
# - All services bind to 127.0.0.1 only; nginx is the public entrypoint.
# - Per-service state (bookmark SQLite, tts SQLite + audio) lives under
#   ./data/<service>/, bind-mounted. Backup = snapshot a directory tree.

services:
  # ── landing ───────────────────────────────────────────────────
  # Static site at negativezero.one/. Served by an nginx-alpine
  # container so we don't have to manage filesystem permissions on
  # the host nginx. The host nginx reverse-proxies / to this.
  landing:
    image: nginx:1.27-alpine
    container_name: negativezero-landing
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # The stock nginx image runs its master as root: it needs CHOWN + SETUID +
    # SETGID to chown the cache dirs and drop workers to the nginx user, plus
    # NET_BIND_SERVICE to bind :80. Everything dangerous (NET_RAW, SYS_*, MKNOD,
    # NET_ADMIN, SYS_PTRACE, …) stays dropped.
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    pids_limit: 512
    mem_limit: 512m
    volumes:
      - ../apps/landing:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:${LANDING_HOST_PORT:-3020}:80"
    networks:
      - internal

  # ── timezones ─────────────────────────────────────────────────
  # Static cross-timezone meeting planner at
  # negativezero.one/services/timezones/. No backend; all timezone
  # math is client-side via the Intl API. Served by nginx-alpine with
  # a read-only bind-mount, same pattern as landing.
  timezones:
    image: nginx:1.27-alpine
    container_name: negativezero-timezones
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    # Same stock-nginx cap set as landing (chown cache + drop workers + bind 80);
    # all dangerous caps stay dropped.
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    pids_limit: 512
    mem_limit: 512m
    volumes:
      - ../apps/timezones:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:${TIMEZONES_HOST_PORT:-3024}:80"
    networks:
      - internal

  # ── bookmark-manager ──────────────────────────────────────────
  # Self-hosted single-user bookmark service. Mounted at
  # negativezero.one/services/bookmark-manager/.
  # SQLite file is kept on the host bind-mount; nothing else persistent.
  bookmark-manager:
    build:
      context: ../apps/bookmark-manager
    container_name: negativezero-bookmark-manager
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 512m
    environment:
      NODE_ENV: production
      PORT: "3000"
      SESSION_SECRET: ${BOOKMARK_SESSION_SECRET}
      SSO_SESSION_SECRET: ${SSO_SESSION_SECRET}
      # admin's internal URL for per-account, per-service authorization checks.
      ADMIN_AUTHZ_URL: http://admin:3000
      ENCRYPTION_KEY: ${BOOKMARK_ENCRYPTION_KEY}
      SETUP_CODE_HASH: ${BOOKMARK_SETUP_CODE_HASH}
      PUBLIC_URL: ${BOOKMARK_PUBLIC_URL}
    volumes:
      - ./data/bookmark-manager:/app/server/data
    ports:
      - "127.0.0.1:${BOOKMARK_HOST_PORT:-3021}:3000"
    networks:
      - internal

  # ── admin ─────────────────────────────────────────────────────
  # Platform-level admin tool at negativezero.one/services/admin/.
  # Passkey-auth'd UI for generating registration codes for other
  # services. Owns its own tiny SQLite (admin passkeys + audit log).
  admin:
    build:
      context: ../apps/admin
    container_name: negativezero-admin
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 512m
    environment:
      NODE_ENV: production
      PORT: "3000"
      SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      SSO_SESSION_SECRET: ${SSO_SESSION_SECRET}
      SETUP_CODE_HASH: ${ADMIN_SETUP_CODE_HASH}
      PUBLIC_URL: ${ADMIN_PUBLIC_URL}
    volumes:
      - ./data/admin:/app/server/data
    ports:
      - "127.0.0.1:${ADMIN_HOST_PORT:-3022}:3000"
    networks:
      - internal

  # ── tts (Whisper transcription + LLM cleanup) ─────────────────
  # Audio dictation pipeline at negativezero.one/services/tts/.
  # FastAPI + uvicorn (Python 3.12), aiosqlite with FTS5, Groq Whisper
  # + Llama. The PWA inside uses relative URLs, so nginx prefix-strip
  # gives the container clean root paths.
  #
  # AMETHYST_API_KEY is mapped from TTS_API_KEY in .env — upstream code
  # reads AMETHYST_API_KEY and renaming it would touch unrelated source.
  # Data dir layout (DB + audio cache) matches the upstream config.py
  # defaults to keep the import diff minimal.
  tts:
    build:
      context: ../apps/tts
    container_name: negativezero-tts
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 1g
    environment:
      PORT: "3000"
      GROQ_API_KEY: ${GROQ_API_KEY}
      AMETHYST_API_KEY: ${TTS_API_KEY}
      SSO_SESSION_SECRET: ${SSO_SESSION_SECRET}
      # admin's internal URL for per-account authorization (service "tts").
      ADMIN_AUTHZ_URL: http://admin:3000
      DATA_DIR: /data
      DB_PATH: /data/amethyst.sqlite
      AUDIO_DIR: /data/audio
    volumes:
      - ./data/tts:/data
    ports:
      - "127.0.0.1:${TTS_HOST_PORT:-3023}:3000"
    networks:
      - internal

  # ── video-downloader (clear-HLS remux) ────────────────────────
  # Passkey-protected tool at negativezero.one/services/video-downloader/.
  # Accepts direct public clear-HLS .m3u8 URLs, downloads segments to a temp
  # dir, and remuxes to .mov/.mp4 with ffmpeg stream copy (no decrypt, no
  # player scraping). Fastify + React, same prefix-strip path-mount as the
  # other services; the Vite build bakes /services/video-downloader/ into assets.
  video-downloader:
    build:
      context: ../apps/video-downloader
    container_name: negativezero-video-downloader
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 1g
    environment:
      NODE_ENV: production
      PORT: "3000"
      SESSION_SECRET: ${VIDEO_DOWNLOADER_SESSION_SECRET}
      SSO_SESSION_SECRET: ${SSO_SESSION_SECRET}
      ADMIN_AUTHZ_URL: http://admin:3000
      SETUP_CODE_HASH: ${VIDEO_DOWNLOADER_SETUP_CODE_HASH}
      PUBLIC_URL: ${VIDEO_DOWNLOADER_PUBLIC_URL}
      DATA_DIR: /app/server/data
      VIDEO_DOWNLOADER_MAX_SEGMENTS: ${VIDEO_DOWNLOADER_MAX_SEGMENTS:-1000}
      VIDEO_DOWNLOADER_MAX_BYTES: ${VIDEO_DOWNLOADER_MAX_BYTES:-2000000000}
      VIDEO_DOWNLOADER_CONCURRENCY: ${VIDEO_DOWNLOADER_CONCURRENCY:-4}
      VIDEO_DOWNLOADER_JOB_TIMEOUT_MS: ${VIDEO_DOWNLOADER_JOB_TIMEOUT_MS:-600000}
    volumes:
      - ./data/video-downloader:/app/server/data
    ports:
      - "127.0.0.1:${VIDEO_DOWNLOADER_HOST_PORT:-3025}:3000"
    networks:
      - internal

  # ── redirector (short-link redirects) ─────────────────────────
  # Passkey-protected short-link service at
  # negativezero.one/services/redirector/. The owner pastes a destination
  # URL and gets back a permanent 16-char hash link
  # (…/services/redirector/<hash>) that 302-redirects to it. The hash
  # endpoint is public (shareable); the management UI is behind the same
  # WebAuthn + apex SSO flow as the other private services. Same Fastify +
  # React prefix-strip path-mount; no at-rest encryption and no outbound
  # fetch (the server only emits a Location header).
  redirector:
    build:
      context: ../apps/redirector
    container_name: negativezero-redirector
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 512m
    environment:
      NODE_ENV: production
      PORT: "3000"
      SESSION_SECRET: ${REDIRECTOR_SESSION_SECRET}
      SSO_SESSION_SECRET: ${SSO_SESSION_SECRET}
      ADMIN_AUTHZ_URL: http://admin:3000
      SETUP_CODE_HASH: ${REDIRECTOR_SETUP_CODE_HASH}
      PUBLIC_URL: ${REDIRECTOR_PUBLIC_URL}
      DATA_DIR: /app/server/data
    volumes:
      - ./data/redirector:/app/server/data
    ports:
      - "127.0.0.1:${REDIRECTOR_HOST_PORT:-3026}:3000"
    networks:
      - internal

networks:
  internal:
    driver: bridge
    name: negativezero-internal
