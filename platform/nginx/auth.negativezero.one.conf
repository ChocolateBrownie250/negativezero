# /etc/nginx/sites-available/auth.negativezero.one
#
# Logto identity provider for the negativezero-services platform.
# Core API (sign-in + OIDC) at /, Admin Console at /admin/.
#
# Both Logto endpoints listen on 127.0.0.1 loopback ports
# (LOGTO_CORE_HOST_PORT = 3010, LOGTO_ADMIN_HOST_PORT = 3011 per .env).
#
# This file ships as HTTP-only. `certbot --nginx -d auth.negativezero.one
# --redirect` adds the HTTPS server block + 80→443 redirect on first run.
# Subsequent re-deploys overwrite this file from source, then `certbot
# install --installer nginx --cert-name auth.negativezero.one --redirect`
# re-attaches HTTPS — same idempotency pattern url-vault used.
#
# The $connection_upgrade map is defined separately in
# /etc/nginx/conf.d/negativezero-connection-upgrade.conf so it's
# available at http{} scope regardless of which sites are enabled.

server {
    listen      80;
    listen [::]:80;
    server_name auth.negativezero.one;

    # certbot HTTP-01 challenge target (also covers renewals).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy headers — Logto trusts X-Forwarded-* (TRUST_PROXY_HEADER=1).
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    client_max_body_size 10M;

    # ── Admin Console ─────────────────────────────────────────────
    # ADMIN_ENDPOINT is set to https://auth.negativezero.one/admin so
    # Logto generates absolute URLs with that prefix in the HTML.
    # Trailing slashes on both `location` and `proxy_pass` strip
    # `/admin/` so the upstream sees clean root paths.
    #
    # FALLBACK: if Admin Console breaks under sub-path (broken assets,
    # redirect loops, 404s on internal routes), switch to a dedicated
    # subdomain `admin.negativezero.one`. Don't fight Logto's design
    # with more rewrite tricks.
    location /admin/ {
        proxy_pass http://127.0.0.1:3011/;
    }

    # ── Core (sign-in experience + OIDC endpoints) ────────────────
    # Catch-all. OIDC discovery URL:
    #   https://auth.negativezero.one/.well-known/openid-configuration
    # JWKS:
    #   https://auth.negativezero.one/oidc/jwks
    location / {
        proxy_pass http://127.0.0.1:3010;
    }
}
