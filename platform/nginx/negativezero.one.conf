# /etc/nginx/sites-available/negativezero.one
#
# Apex site for the negativezero platform.
#   /                                → static landing (apps/landing)
#   /services/bookmark-manager/      → bookmark-manager container
#   /services/admin/                 → admin container (code generator)
#   /services/<future>/              → future services (add a location block)
#   /vtt-transcriber/                → Amethyst (cohabiting tenant on this apex)
#
# Upstreams listen on 127.0.0.1 loopback ports; nginx is the public entry.
# Ports come from .env (LANDING/BOOKMARK/ADMIN_HOST_PORT) and deploy.sh
# substitutes them when installing this file.
#
# Ships HTTP-only. `certbot --nginx -d negativezero.one --redirect` adds the
# HTTPS server block + 80→443 redirect on first run. Subsequent re-deploys
# overwrite this file from source; certbot install --installer nginx
# --cert-name negativezero.one --redirect re-attaches HTTPS.
#
# The $connection_upgrade map is defined in
# /etc/nginx/conf.d/negativezero-connection-upgrade.conf.

server {
    listen      80;
    listen [::]:80;
    server_name negativezero.one;

    # certbot HTTP-01 challenge target.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Standard proxy headers; upstreams trust X-Forwarded-*.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # Amethyst uploads audio up to ~25 MB (Groq Whisper limit); bookmark
    # metadata fetches up to ~5 MB. Round up to 30M for both.
    client_max_body_size 30M;

    # Slow mobile uploads (Amethyst).
    proxy_connect_timeout  10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── /services/bookmark-manager/ ────────────────────────────
    # Vite base + PUBLIC_URL inside the container are configured for this
    # exact prefix. nginx passes through unchanged — DON'T add a trailing
    # slash on proxy_pass, that would strip the prefix and break the
    # client's relative asset paths.
    location /services/bookmark-manager/ {
        proxy_pass http://127.0.0.1:__BOOKMARK_HOST_PORT__;
    }

    # ── /services/admin/ ───────────────────────────────────────
    # Same pattern as bookmark-manager: prefix passes through to the
    # container which knows its own base path via Vite + PUBLIC_URL.
    location /services/admin/ {
        proxy_pass http://127.0.0.1:__ADMIN_HOST_PORT__;
    }

    # ── /vtt-transcriber/ ──────────────────────────────────────
    # Amethyst (cohabiting tenant). The PWA inside uses relative URLs,
    # so prefix-strip via trailing slash on both `location` and `proxy_pass`
    # gives the container clean root paths. Kept here so a re-deploy of
    # negativezero.one doesn't wipe Amethyst's routing.
    location = /vtt-transcriber {
        return 301 https://$host/vtt-transcriber/;
    }
    location /vtt-transcriber/ {
        proxy_pass http://127.0.0.1:8090/;
    }

    # ── / (landing) ────────────────────────────────────────────
    # Catch-all → static landing. The landing container is just
    # nginx-alpine serving apps/landing/.
    location / {
        proxy_pass http://127.0.0.1:__LANDING_HOST_PORT__;
    }
}
