# /etc/nginx/sites-available/negativezero.one
#
# Apex site for the negativezero platform.
#   /                                → static landing (apps/landing)
#   /services/bookmark-manager/      → bookmark-manager container
#   /services/<future>/              → future services (add a location block)
#
# Both upstreams listen on 127.0.0.1 loopback ports; nginx is the public
# entrypoint. Ports come from .env (LANDING_HOST_PORT, BOOKMARK_HOST_PORT)
# and deploy.sh substitutes them when installing this file.
#
# Ships HTTP-only. `certbot --nginx -d negativezero.one --redirect` adds
# the HTTPS server block + 80→443 redirect on first run. Re-deploys
# overwrite this file from source; certbot install --installer nginx
# --cert-name negativezero.one --redirect re-attaches HTTPS.
#
# The $connection_upgrade map is defined in
# /etc/nginx/conf.d/negativezero-connection-upgrade.conf.

server {
    listen      80;
    listen [::]:80;
    server_name negativezero.one;

    # certbot HTTP-01 challenge target.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Standard proxy headers; bookmark-manager trusts X-Forwarded-*.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # Bookmarks accept favicon/title fetches up to ~5 MB; round up.
    client_max_body_size 10M;

    # ── /services/bookmark-manager/ ────────────────────────────
    # The Fastify app inside the container is configured (via Vite
    # base + PUBLIC_URL) to serve under this exact prefix. nginx
    # passes the request through unchanged — DON'T add a trailing
    # slash on proxy_pass, that would strip the prefix and break
    # the client's relative asset paths.
    location /services/bookmark-manager/ {
        proxy_pass http://127.0.0.1:__BOOKMARK_HOST_PORT__;
    }

    # ── / (landing) ────────────────────────────────────────────
    # Catch-all → static landing. The landing container is just
    # nginx-alpine serving apps/landing/, so this is a TCP proxy.
    location / {
        proxy_pass http://127.0.0.1:__LANDING_HOST_PORT__;
    }
}
