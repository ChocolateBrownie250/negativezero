# /etc/nginx/sites-available/negativezero.one
#
# Apex site for the negativezero platform.
#   /                                → static landing (apps/landing)
#   /services/basalt/                → bookmark-manager container (the "Basalt" service)
#   /services/bookmark-manager/      → 308 redirect → /services/basalt/ (old URL)
#   /services/admin/                 → admin container (code generator)
#   /services/amethyst/              → tts container (Whisper + LLM cleanup)
#   /services/tts/                   → 308 redirect → /services/amethyst/ (old URL)
#   /services/timezones/             → timezones container (static planner)
#   /services/video-downloader/      → video-downloader container (HLS remux)
#   /services/redirector/            → redirector container (short-link redirects)
#   /services/citrine/               → citrine container (presentation editor)
#   /dashboards/riga-real-estate/    → host-served static Riga housing dashboard
#   /services/<future>/              → future services (add a location block)
#   /vtt-transcriber/                → 308 redirect → /services/amethyst/
#                                       (legacy URL kept for old clients)
#
# Upstreams listen on 127.0.0.1 loopback ports; nginx is the public entry.
# Ports come from .env (LANDING/BOOKMARK/ADMIN/TTS_HOST_PORT) and deploy.sh
# substitutes them when installing this file.
#
# Ships HTTP-only. `certbot --nginx -d negativezero.one --redirect` adds the
# HTTPS server block + 80→443 redirect on first run. Subsequent re-deploys
# overwrite this file from source; certbot install --installer nginx
# --cert-name negativezero.one --redirect re-attaches HTTPS.
#
# The $connection_upgrade map is defined in
# /etc/nginx/conf.d/negativezero-connection-upgrade.conf.

server {
    listen      80;
    listen [::]:80;
    server_name negativezero.one;

    # certbot HTTP-01 challenge target.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Security response headers (sent on every response, including errors).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Standard proxy headers; upstreams trust X-Forwarded-*.
    # X-Forwarded-For is reset to the direct client (not appended) so a
    # spoofed inbound X-Forwarded-For header can't poison what upstreams see.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # tts uploads audio up to ~25 MB (Groq Whisper limit); bookmark
    # metadata fetches up to ~5 MB. Round up to 30M for both.
    client_max_body_size 30M;

    # Slow mobile uploads (tts).
    proxy_connect_timeout  10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── /services/basalt/ ──────────────────────────────────────
    # Self-hosted bookmark service (the "Basalt" service; the container is
    # still named `bookmark-manager` and reuses BOOKMARK_HOST_PORT). Trailing
    # slash on both `location` AND `proxy_pass` strips the prefix before the
    # request reaches the container — Fastify routes live at /api/... and
    # fastify-static serves from /, so they see clean root paths. The browser
    # still sees /services/basalt/ because Vite's `base` bakes that prefix into
    # asset references in index.html and the JS bundle.
    location /services/basalt/ {
        proxy_pass http://127.0.0.1:__BOOKMARK_HOST_PORT__/;
    }

    # ── /services/bookmark-manager/ → /services/basalt/ (renamed URL) ──
    # The service was previously mounted at /services/bookmark-manager/; keep
    # 308 redirects so existing PWA installs and bookmarks follow to the new
    # path. 308 (not 301) preserves method + body for any POST to the old URL.
    location = /services/bookmark-manager {
        return 308 https://$host/services/basalt/;
    }
    location ~ ^/services/bookmark-manager/(.*)$ {
        return 308 https://$host/services/basalt/$1;
    }

    # ── /services/admin/ ───────────────────────────────────────
    # Same path-mount pattern as bookmark-manager.
    # The internal service-to-service authorization endpoint must never be
    # reachable from the public internet — only sibling containers on the
    # docker network call it (it is also bearer-guarded). Block it here.
    location /services/admin/api/internal/ {
        return 404;
    }
    location /services/admin/ {
        proxy_pass http://127.0.0.1:__ADMIN_HOST_PORT__/;
    }

    # ── /services/amethyst/ ────────────────────────────────────
    # Whisper transcription + LLM cleanup pipeline (the "Amethyst" service;
    # the container is still named `tts` and reuses TTS_HOST_PORT). Same
    # path-mount pattern as bookmark-manager and admin: trailing slash on both
    # `location` and `proxy_pass` strips the prefix before reaching the
    # container, so FastAPI sees clean root paths.
    location /services/amethyst/ {
        proxy_pass http://127.0.0.1:__TTS_HOST_PORT__/;

        # Proxy-level errors (413 oversize upload, 502/503/504 backend
        # busy/down/timeout) default to nginx's HTML error page. The iPhone
        # Shortcut's "Get Contents of URL" then types that HTML as Rich Text
        # and the next "Get Dictionary Value" fails with "couldn't convert
        # from Rich Text to Dictionary." Serve JSON for these instead so the
        # Shortcut always gets a parseable dictionary (and the PWA, which only
        # checks the status code, still sees the failure). FastAPI's own error
        # responses are already JSON and pass through untouched.
        error_page 413     = @amethyst_error_413;
        error_page 500 502 503 504 = @amethyst_error_5xx;
    }

    # ── /services/tts/ → /services/amethyst/ (renamed URL) ─────
    # The service was previously mounted at /services/tts/; keep 308 redirects
    # so existing PWA installs and bookmarks follow to the new path. 308 (not
    # 301) preserves method + body for any POST that still targets the old URL.
    location = /services/tts {
        return 308 https://$host/services/amethyst/;
    }
    location ~ ^/services/tts/(.*)$ {
        return 308 https://$host/services/amethyst/$1;
    }

    # ── /services/timezones/ ───────────────────────────────────
    # Static cross-timezone planner. Same path-mount pattern: the
    # trailing slash on both `location` and `proxy_pass` strips the
    # /services/timezones/ prefix so the nginx-alpine container serves
    # its files from root and the page's relative asset refs resolve.
    location /services/timezones/ {
        proxy_pass http://127.0.0.1:__TIMEZONES_HOST_PORT__/;
    }

    # ── /services/video-downloader/ ────────────────────────────
    # Passkey-protected HLS remux tool (Fastify + React). Same prefix-strip
    # pattern: trailing slash on both `location` and `proxy_pass` strips the
    # /services/video-downloader/ prefix; the Vite build bakes that base into
    # asset URLs so they resolve back through here.
    location /services/video-downloader/ {
        proxy_pass http://127.0.0.1:__VIDEO_DOWNLOADER_HOST_PORT__/;
    }

    # ── /services/redirector/ ──────────────────────────────────
    # Passkey-protected short-link service (Fastify + React). Same
    # prefix-strip pattern: the trailing slash on both `location` and
    # `proxy_pass` strips the /services/redirector/ prefix, so the container
    # sees clean root paths. That single mount covers all three surfaces —
    # the management SPA at /, the API at /api/..., and the public redirect
    # at /<16-char-hash> (…/services/redirector/<hash> → /<hash> → 302).
    location /services/redirector/ {
        proxy_pass http://127.0.0.1:__REDIRECTOR_HOST_PORT__/;
    }

    # ── /services/citrine/ ─────────────────────────────────────
    # Private web-native presentation editor (Fastify + React PWA). Same
    # prefix-strip pattern: trailing slash on both `location` and `proxy_pass`
    # strips /services/citrine/ before the container sees the request, while
    # Vite's production base points assets back through this public mount.
    location /services/citrine/ {
        proxy_pass http://127.0.0.1:__CITRINE_HOST_PORT__/;
    }

    # ── /vtt-transcriber/ → amethyst container (legacy URL) ────
    # The tts service was previously deployed standalone under this URL; keep
    # it working for already-signed iPhone Shortcuts that POST audio here.
    #
    # We PROXY in place rather than 308-redirecting to /services/amethyst/.
    # iOS Shortcuts' "Get Contents of URL" does NOT reliably follow 307/308
    # redirects on a form-POST: instead of re-issuing the upload to the new
    # path it surfaces nginx's redirect HTML page (text/html) as the response
    # body. The Shortcut then types that body as Rich Text and the next "Get
    # Dictionary Value" action fails with "couldn't convert from Rich Text to
    # Dictionary." Proxying straight to the container returns FastAPI's
    # application/json directly — no redirect for Shortcuts to mishandle.
    #
    # Same prefix-strip pattern as /services/amethyst/: the trailing slash on
    # both `location` and `proxy_pass` strips /vtt-transcriber/ so FastAPI sees
    # clean root paths (/vtt-transcriber/api/v1/transcribe → /api/v1/transcribe).
    location = /vtt-transcriber {
        return 308 https://$host/vtt-transcriber/;
    }
    location /vtt-transcriber/ {
        proxy_pass http://127.0.0.1:__TTS_HOST_PORT__/;
        # Same JSON-error handling as /services/amethyst/ — keep already-signed
        # Shortcuts on this legacy URL from hitting an HTML error page.
        error_page 413     = @amethyst_error_413;
        error_page 500 502 503 504 = @amethyst_error_5xx;
    }

    # ── /dashboards/riga-real-estate/ ───────────────────────────
    # Public static Riga housing dashboard, published outside the landing
    # container into /var/www/dashboards/riga-real-estate/. This route must
    # stay ahead of the landing catch-all so the apex root does not swallow it.
    location = /dashboards/riga-real-estate {
        return 308 https://$host/dashboards/riga-real-estate/;
    }
    location /dashboards/riga-real-estate/ {
        root /var/www;
        try_files $uri $uri/ /dashboards/riga-real-estate/index.html;
    }

    # ── / (landing) ────────────────────────────────────────────
    # Catch-all → static landing. The landing container is just
    # nginx-alpine serving apps/landing/.
    location / {
        proxy_pass http://127.0.0.1:__LANDING_HOST_PORT__;
    }

    # ── JSON error bodies for the Amethyst transcription API ───
    # Referenced by error_page in the /services/amethyst/ and /vtt-transcriber/
    # locations. `error_page CODE = @name` with the named location ending in an
    # explicit `return CODE` preserves a failing status (so the PWA still treats
    # it as an error) while replacing nginx's default HTML body with JSON — the
    # iPhone Shortcut reads `text`, so the message below is what lands in the
    # clipboard when a transcription can't complete. `internal` keeps these
    # unreachable from outside.
    location @amethyst_error_413 {
        internal;
        default_type application/json;
        return 413 '{"text":"⚠️ Recording too large (over 30 MB). Record a shorter clip and try again.","error":"payload_too_large"}';
    }
    location @amethyst_error_5xx {
        internal;
        default_type application/json;
        return 502 '{"text":"⚠️ Transcription service is busy or timed out. Please try again in a moment.","error":"service_unavailable"}';
    }
}
