# /etc/nginx/conf.d/negativezero-connection-upgrade.conf
#
# Provides $connection_upgrade — required by the Logto Admin Console
# (and any future service) for WebSocket upgrade handling. Defined at
# http{} scope via the conf.d/ include chain so all sites can use it.
#
# Standard nginx idiom: when client sends `Upgrade: websocket`, set
# `Connection: upgrade`; otherwise close the connection rather than
# keep-alive (which can hold connections open longer than needed
# without WS).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
