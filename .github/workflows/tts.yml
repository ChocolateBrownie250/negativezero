name: tts

# CI for the tts service (Amethyst — Python 3.12 + FastAPI). Runs the pytest
# suite so the ~38 unit tests under apps/tts/tests/ actually gate changes.
# Same trigger shape as the TS service workflows (e.g. redirector.yml), adapted
# to Python: the repo's other CI is Node/npm, but apps/tts ships a uv.lock, so
# we use uv to provision Python 3.12, install the pinned dev deps, and run the
# suite reproducibly.
#
# The integration tests in tests/test_integration.py SKIP unless a real
# AMETHYST_API_KEY is present, so NO secret is wired here — they skip in CI and
# never fire live Groq/Amethyst calls. conftest.py supplies the dummy env the
# in-process unit tests need.

on:
  push:
    branches: [main]
    paths:
      - 'apps/tts/**'
      - '.github/workflows/tts.yml'
  pull_request:
    paths:
      - 'apps/tts/**'
      - '.github/workflows/tts.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tts
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Key the uv cache off this service's lockfile only.
          cache-dependency-glob: apps/tts/uv.lock

      # Python 3.12 to match the runtime image (apps/tts/Dockerfile is
      # python:3.12-slim), even though the package allows >=3.11.
      - name: set up Python 3.12
        run: uv python install 3.12

      # Run from apps/tts so the tests' `backend.app.*` imports resolve against
      # the repo tree (pytest inserts the rootdir on sys.path). --extra dev pulls
      # in pytest + pytest-asyncio; asyncio_mode=auto is set in pyproject.toml.
      - name: pytest
        run: uv run --python 3.12 --extra dev pytest -q
