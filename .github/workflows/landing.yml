name: landing

# CI for the static landing page. Lightweight — there's no build step.
# Validates the HTML parses, the font files referenced by @font-face are
# actually present, and that the link to /services/bookmark-manager/
# hasn't drifted.

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/landing.yml'
  pull_request:
    paths:
      - 'apps/landing/**'
      - '.github/workflows/landing.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML lint (htmlhint)
        # htmlhint is lenient — flags real errors (unclosed tags, bad
        # attribute syntax) without complaining about inline <script>/<style>
        # the way html-validate does.
        run: npx --yes htmlhint apps/landing/index.html

      - name: referenced fonts exist
        run: |
          missing=0
          for f in Geist-Variable.ttf Geist-Italic-Variable.ttf GeistMono-Variable.ttf; do
            if [ ! -f "apps/landing/fonts/$f" ]; then
              echo "::error file=apps/landing/index.html::missing referenced font: fonts/$f"
              missing=1
            fi
          done
          exit $missing

      - name: link to bookmark-manager not broken
        # The landing's only outbound app link. If someone renames the
        # bookmark-manager path, this catches it before deploy.
        run: |
          grep -q '"/services/basalt/"' apps/landing/index.html \
            || { echo "::error::landing no longer links to /services/basalt/"; exit 1; }
