name: Deploy

# Auto-deploy the platform on every merge to main, plus a manual button
# (Actions tab → Deploy → "Run workflow") for re-runs.
#
# HOW THIS WORKS — the VPS has NO GitHub credentials (private repo over an
# https remote), so the box CANNOT `git pull`. Instead the runner checks out
# main and PUSHES the tree to the box over SSH (rsync), then runs deploy.sh on
# the box. This mirrors docs/DEPLOY.md (the proven manual procedure). The box
# always reflects main; do not edit files directly on the box — a deploy
# overwrites them.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST         VPS hostname or IP (e.g. 45.76.88.245)
#   SSH_USER         SSH user — root (or a user with passwordless sudo for deploy.sh)
#   SSH_KEY          private key of a DEDICATED deploy key; its public half is in
#                    the box user's ~/.ssh/authorized_keys
#   DEPLOY_PATH      absolute path to the checkout on the VPS (/srv/negativezero)
# Optional:
#   SSH_PORT         SSH port (defaults to 22)
#   SSH_KNOWN_HOSTS  pinned host key line(s); if unset, fetched via ssh-keyscan
#
# platform/.env and platform/data/ live on the box, are gitignored, and are
# EXCLUDED from the rsync — so deploys update code without touching secrets or
# persisted data.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout main
        uses: actions/checkout@v7

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${SSH_PORT:-22}"
          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$PORT" "$SSH_HOST" > ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Sync code to the VPS and run deploy.sh
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          # Optional: when set, the key is seeded/rotated into the box's
          # gitignored platform/.env so the tts (Amethyst) service can start.
          # GitHub masks this secret in logs; leave it unset to manage the key
          # by hand on the box instead.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          # Push the working tree to the box (excludes secrets/state), matching
          # docs/DEPLOY.md Option B. --delete-after keeps the box in lockstep
          # with main while never touching the excluded .env / data / .git.
          rsync -az --delete-after \
            -e "ssh -i $HOME/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=yes -o ServerAliveInterval=30" \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='.venv/' \
            --exclude='platform/.env' \
            --exclude='platform/.env.local' \
            --exclude='platform/data/' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
          # Seed/rotate GROQ_API_KEY in the box's platform/.env from the repo
          # secret BEFORE deploy.sh runs, so tts comes up in the same deploy.
          # The .env is excluded from the rsync and lives only on the box. The
          # value is piped over stdin (never in argv/process list); the helper
          # runs with the SAME privilege as deploy.sh (root, or via `sudo -n`)
          # so a root-owned 600 .env is read and rewritten intact, not clobbered.
          # No-op if the secret is unset. seed-env-key.sh skips a missing .env.
          if [ -n "${GROQ_API_KEY:-}" ]; then
            printf '%s' "$GROQ_API_KEY" | ssh -i "$HOME/.ssh/id_deploy" -p "$PORT" \
              -o StrictHostKeyChecking=yes -o ServerAliveInterval=30 \
              "$SSH_USER@$SSH_HOST" \
              "cd '$DEPLOY_PATH' && if [ \"\$(id -u)\" -eq 0 ]; then bash platform/seed-env-key.sh GROQ_API_KEY; else sudo -n bash platform/seed-env-key.sh GROQ_API_KEY; fi"
          fi
          # Run the idempotent deployer on the box (root runs it directly; a
          # non-root SSH_USER needs passwordless sudo).
          ssh -i "$HOME/.ssh/id_deploy" -p "$PORT" \
            -o StrictHostKeyChecking=yes -o ServerAliveInterval=30 \
            "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && if [ \"\$(id -u)\" -eq 0 ]; then bash platform/deploy.sh; else sudo -n bash platform/deploy.sh; fi"

      - name: Remove key
        if: always()
        run: rm -f ~/.ssh/id_deploy
