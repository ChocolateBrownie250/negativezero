<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Basalt">
  <!-- Basalt: hexagonal columnar jointing (the Giant's-Causeway look) — three
       blue 3D basalt columns on the platform's deep-blue field. Full-bleed
       square (no baked corners) so it's safe as a maskable PWA icon. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13245c"/>
      <stop offset=".52" stop-color="#0a1430"/>
      <stop offset="1" stop-color="#050a18"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".1" r=".75">
      <stop offset="0" stop-color="#3a6ce6" stop-opacity=".5"/>
      <stop offset="1" stop-color="#3a6ce6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floor" cx=".5" cy=".86" r=".4">
      <stop offset="0" stop-color="#5b93f0" stop-opacity=".22"/>
      <stop offset="1" stop-color="#5b93f0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <ellipse cx="256" cy="430" rx="150" ry="34" fill="url(#floor)"/>
  <!-- left column -->
  <polygon points="198,255 174,296.6 174,406.6 198,365" fill="#34539e"/>
  <polygon points="174,296.6 126,296.6 126,406.6 174,406.6" fill="#1c386f"/>
  <polygon points="126,296.6 102,255 102,365 126,406.6" fill="#274583"/>
  <polygon points="198,255 174,296.6 126,296.6 102,255 126,213.4 174,213.4" fill="#4a73c8"/>
  <!-- right column -->
  <polygon points="410,240 386,281.6 386,406.6 410,365" fill="#34539e"/>
  <polygon points="386,281.6 338,281.6 338,406.6 386,406.6" fill="#1c386f"/>
  <polygon points="338,281.6 314,240 314,365 338,406.6" fill="#274583"/>
  <polygon points="410,240 386,281.6 338,281.6 314,240 338,198.4 386,198.4" fill="#4a73c8"/>
  <!-- center column (front) -->
  <polygon points="320,205 288,260.4 288,410.4 320,355" fill="#3565d8"/>
  <polygon points="288,260.4 224,260.4 224,410.4 288,410.4" fill="#1f3d77"/>
  <polygon points="224,260.4 192,205 192,355 224,410.4" fill="#2c5fdd"/>
  <polygon points="320,205 288,260.4 224,260.4 192,205 224,149.6 288,149.6" fill="#7aa6ff"/>
  <polygon points="320,205 288,149.6 224,149.6 192,205" fill="#a9c6ff" fill-opacity=".35"/>
</svg>
