/* ════════════════════════════════════════════════════════════════
   EDITOR APP
   ════════════════════════════════════════════════════════════════ */
const STORE_KEY = 'isgStudioState_v1';

function defaultDeck() {
  return [
    { uid: stUid(), kind: 'basic', key: 'basic:title', content: { ...BASIC_BY_KEY['basic:title'].defaults } },
    { uid: stUid(), kind: 'basic', key: 'basic:bullets', content: { ...BASIC_BY_KEY['basic:bullets'].defaults } },
  ];
}
function stUid() { return 'sl' + Math.random().toString(36).slice(2, 9); }

function EditorApp() {
  CATALOG = useMemo(() => buildCatalog(), []);
  CATALOG_BY_KEY = useMemo(() => Object.fromEntries(CATALOG.map((e) => [e.key, e])), [CATALOG]);

  const [hydrated, setHydrated] = useState(false);
  const [title, setTitle] = useState('Untitled deck');
  const [theme, setTheme] = useState('dark');
  const [deck, setDeck] = useState([]);
  const [current, setCurrent] = useState(0);
  const [editing, setEditing] = useState(false);
  const [libOpen, setLibOpen] = useState(true);
  const [mode, setMode] = useState('edit'); // edit | present | print

  /* hydrate */
  useEffect(() => {
    let s = null;
    try { s = JSON.parse(localStorage.getItem(STORE_KEY) || 'null'); } catch (e) {}
    if (s && Array.isArray(s.deck) && s.deck.length) {
      setTitle(s.title || 'Untitled deck');
      setTheme(s.theme === 'light' ? 'light' : 'dark');
      setDeck(s.deck);
      setCurrent(Math.min(s.current || 0, s.deck.length - 1));
    } else {
      setDeck(defaultDeck());
    }
    setHydrated(true);
  }, []);

  /* persist */
  useEffect(() => {
    if (!hydrated) return;
    try { localStorage.setItem(STORE_KEY, JSON.stringify({ title, theme, deck, current })); } catch (e) {}
  }, [title, theme, deck, current, hydrated]);

  /* theme → DOM */
  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  const addSlide = (key, kind) => {
    const slide = kind === 'basic'
      ? { uid: stUid(), kind: 'basic', key, content: { ...BASIC_BY_KEY[key].defaults } }
      : { uid: stUid(), kind: 'tpl', key };
    setDeck((d) => {
      const next = [...d];
      next.splice(current + 1, 0, slide);
      return next;
    });
    setCurrent((c) => Math.min(c + 1, deck.length));
  };
  const reorder = (from, to) => setDeck((d) => {
    const next = [...d]; const [m] = next.splice(from, 1); next.splice(to, 0, m);
    setCurrent(to); return next;
  });
  const dup = (i) => setDeck((d) => {
    const copy = { ...d[i], uid: stUid(), content: d[i].content ? { ...d[i].content } : undefined };
    const next = [...d]; next.splice(i + 1, 0, copy); return next;
  });
  const del = (i) => setDeck((d) => {
    if (d.length <= 1) return d;
    const next = d.filter((_, x) => x !== i);
    setCurrent((c) => Math.max(0, Math.min(c, next.length - 1)));
    return next;
  });
  const setField = (field, val) => setDeck((d) => d.map((s, i) =>
    i === current ? { ...s, content: { ...(s.content || BASIC_BY_KEY[s.key].defaults), [field]: val } } : s));

  if (!hydrated) return null;
  const slide = deck[current];
  const slideIsBasic = slide && slide.kind === 'basic';

  if (mode === 'present') {
    return <><StudioStyles /><Present deck={deck} start={current} onExit={() => setMode('edit')} /></>;
  }

  return (
    <div className="st-app">
      <StudioStyles />
      {mode === 'print' && <PrintDeck deck={deck} onDone={() => setMode('edit')} />}
      <TopBar
        title={title} onTitle={setTitle}
        theme={theme} onTheme={setTheme}
        editing={editing && slideIsBasic}
        onToggleEdit={() => setEditing((e) => !e)}
        onPresent={() => setMode('present')}
        onExport={() => setMode('print')}
        canPresent={deck.length > 0}
      />
      <div className="st-body">
        <SlideRail
          deck={deck} current={current}
          onSelect={setCurrent} onReorder={reorder} onDup={dup} onDel={del}
          onAddClick={() => setLibOpen(true)}
        />
        <main className="st-main">
          {editing && slideIsBasic && (
            <div className="st-edit-hint">Editing text — click any text on the slide to change it. <button onClick={() => setEditing(false)}>Done</button></div>
          )}
          {editing && slide && !slideIsBasic && (
            <div className="st-edit-hint st-edit-hint-muted">This is a pre-made template element — text editing applies to <b>Basic</b> blocks. Insert one from Elements to author your own copy.</div>
          )}
          <Canvas slide={slide} editing={editing && slideIsBasic} onField={setField} />
        </main>
        {libOpen
          ? <ElementLibrary onAdd={addSlide} onClose={() => setLibOpen(false)} />
          : <button className="st-lib-reopen" onClick={() => setLibOpen(true)}>＋ Elements</button>}
      </div>
    </div>
  );
}

              {kind === 'tiles' && <div style={{ display: 'flex', gap: 5, flex: 1 }}>{[0, 1, 2].map((k) => <div key={k} style={{ flex: 1, height: 16, borderRadius: 3, background: 'var(--bg-4)' }} />)}</div>}
              {kind === 'cols' && <div style={{ display: 'flex', gap: 5, flex: 1 }}>{[0, 1].map((k) => <div key={k} style={{ flex: 1, height: 40, borderRadius: 3, background: 'var(--bg-4)' }} />)}</div>}
              {kind === 'pair' && <div style={{ display: 'flex', gap: 5, flex: 1 }}>{[['ok'], ['bad']].map(([t], k) => <div key={k} style={{ flex: 1, height: 28, borderRadius: 3, background: `var(--${t}-bg)`, borderTop: `2px solid var(--${t})` }} />)}</div>}
              {(kind === 'flex') && <div style={{ flex: 1, display: 'flex', justifyContent: 'space-between' }}><div style={{ width: 60, height: 10, borderRadius: 2, background: 'var(--bg-4)' }} /><div style={{ width: 30, height: 10, borderRadius: 2, background: 'var(--bg-4)' }} /></div>}
              {kind === 'bar' && <div style={{ flex: 1, height: 12, borderRadius: 2, background: 'linear-gradient(90deg, var(--accent), transparent)' }} />}
            </div>
          ))}
        </div>
        {/* region legend */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          {anatomyRegions.map(([n, name, desc, tone], i) => (
            <div key={i} style={{ display: 'grid', gridTemplateColumns: '40px 150px 1fr', gap: 16, alignItems: 'center', padding: '13px 4px', borderBottom: i < anatomyRegions.length - 1 ? '1px solid var(--line)' : 'none' }}>
              <span className="t-num" style={{ fontSize: 22, color: `var(--${tone})` }}>{n}</span>
              <span className="t-h3" style={{ fontSize: 15 }}>{name}</span>
              <span className="t-small">{desc}</span>
            </div>
          ))}
        </div>
      </div>

      {/* principles */}
      <Block meta="6 RULES">Principles</Block>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
        {principles.map(([t, d], i) => (
          <div key={i} style={{ background: 'var(--grad-surface)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '18px 20px', boxShadow: 'var(--elev-1)' }}>
            <div className="t-num" style={{ fontSize: 22, color: 'var(--accent)', opacity: 0.45 }}>{String(i + 1).padStart(2, '0')}</div>
            <div className="t-h3" style={{ fontSize: 15, margin: '8px 0 6px' }}>{t}</div>
            <div className="t-small" style={{ lineHeight: 1.5 }}>{d}</div>
          </div>
        ))}
      </div>
    </Doc>
  );

  /* ── FRAME 2 · ELEMENT LIBRARY ───────────────────────────── */
  const libFrame = (
    <Doc>
      <div className="t-eyebrow">One-pager Kit · Elements</div>
      <h1 className="t-h1" style={{ margin: '12px 0 8px' }}>Element library</h1>
      <p className="t-lead" style={{ fontSize: 16 }}>Every block below is a drop-in. Composed top-to-bottom they make the assembled example in the next frame.</p>

      <Block meta="HEADER">Masthead</Block>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        <Kit name="Masthead · full"><div style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '22px 26px', boxShadow: 'var(--elev-1)' }}><Masthead /></div></Kit>
      </div>

      <Block meta="LEAD">Thesis callout</Block>
      <Kit name="Thesis · accent glow"><Thesis /></Kit>

      <Block meta="DATA">Stat tiles &amp; numerics</Block>
      <div style={{ display: 'flex', gap: 12 }}>
        <Kit name="Stat" span={1}><StatTile label="Headline" value="[ $4.8M ]" sub="ARR" spark={[2, 3, 4, 5, 7, 9]} /></Kit>
        <Kit name="Stat · glow" span={1}><StatTile label="Growth" value="[ 142% ]" tone="ok" sub="YoY" glow="ok" spark={[3, 4, 5, 6, 8, 11]} /></Kit>
        <Kit name="Stat" span={1}><StatTile label="Runway" value="[ 19 mo ]" sub="at current burn" /></Kit>
      </div>

      <Block meta="STATUS">Signal vs risk panels</Block>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
        <Kit name="Signals"><SignalPanel tone="ok" head="Signals" items={['[ Positive signal with a number. ]', '[ Design-partner traction. ]', '[ Team quality. ]']} /></Kit>
        <Kit name="Risks"><SignalPanel tone="bad" head="Risks &amp; open questions" items={['[ Concentration / dependency risk. ]', '[ Open diligence question. ]', '[ Crowded-category caveat. ]']} /></Kit>
      </div>

      <Block meta="VOICE">Pull quote &amp; recommendation</Block>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 26 }}>
        <Kit name="Pull quote"><div style={{ padding: '6px 0' }}><PullQuote /></div></Kit>
        <Kit name="Recommendation bar"><RecoBar /></Kit>
      </div>
    </Doc>
  );

  /* ── FRAME 3 · ASSEMBLED EXAMPLE ─────────────────────────── */
  const exampleFrame = (
    <Doc>
      <div style={{ position: 'absolute', inset: 0, background: 'var(--ambient)', pointerEvents: 'none' }} />
      <div style={{ position: 'relative', display: 'flex', flexDirection: 'column', gap: 22 }}>
        <Masthead />
        <Thesis />
        <div style={{ display: 'flex', gap: 12 }}>
          <StatTile label="Headline ARR" value="[ $4.8M ]" sub="[ +0.6M QoQ ]" spark={[2, 3, 3, 4, 5, 7, 9]} />
          <StatTile label="Growth" value="[ 142% ]" tone="ok" sub="[ YoY ]" glow="ok" spark={[3, 4, 5, 6, 8, 11, 14]} />
          <StatTile label="Net retention" value="[ 128% ]" sub="[ trailing 12mo ]" spark={[5, 5, 6, 6, 7, 7, 8]} />
          <StatTile label="Runway" value="[ 19 mo ]" sub="[ at current burn ]" />
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
          <div style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '20px 22px', boxShadow: 'var(--elev-1)' }}>
            <div className="t-eyebrow" style={{ color: 'var(--ink-3)', marginBottom: 12 }}>What they do</div>
            <Bullet>[ Product in one sentence. ]</Bullet><Bullet>[ Core technical differentiator. ]</Bullet><Bullet>[ Who buys, and why now. ]</Bullet>
          </div>
          <div style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '20px 22px', boxShadow: 'var(--elev-1)' }}>
            <div className="t-eyebrow" style={{ marginBottom: 12 }}>Why it matters to us</div>
            <Bullet tone="accent">[ Fit with the mandate. ]</Bullet><Bullet tone="accent">[ Defensibility / moat read. ]</Bullet><Bullet tone="accent">[ Path to a position. ]</Bullet>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
          <SignalPanel tone="ok" head="Signals" items={['[ Positive signal with a specific number. ]', '[ Design-partner traction. ]']} />
          <SignalPanel tone="bad" head="Risks &amp; open questions" items={['[ Concentration / dependency risk. ]', '[ Open question for diligence. ]']} />
        </div>
        <RecoBar />
      </div>
    </Doc>
  );

  window.ISG.register({
    id: 'onepager-kit', group: 'One-pager kit', name: 'Elements & style guide',
    blurb: 'Everything for building great one-pagers: the six-region anatomy and six principles, a labeled library of drop-in elements (masthead, glow thesis callout, stat tiles, signal/risk panels, pull quote, recommendation bar) and a fully-assembled example. Built to show the improved lighting — elevation, colored glow and glass — at its best in both themes.',
    frames: [
      { label: 'Anatomy & principles', mode: 'flow', w: W, node: anatomyFrame },
      { label: 'Element library', mode: 'flow', w: W, node: libFrame },
      { label: 'Assembled example', mode: 'flow', w: W, node: exampleFrame },
    ],
  });
})();


/* ===== tpl-schemes.jsx ===== */
/* ═══════════════════════════════════════════════════════════════
   DIAGRAM KIT — schematic patterns beyond the architecture engine.
   Drop-in schemes for explaining process, logic and structure:
   process flow · swimlanes · decision ladder · cycle · pyramid ·
   2×2 matrix · option-comparison columns. Each is labeled with a
   best-practice note so an agent knows WHEN to reach for it.
   All color via tokens; theme-aware; SF Pro / SF Mono.
   ═══════════════════════════════════════════════════════════════ */

(function () {
  const W = 1080;
  const Doc = ({ children, pad = '52px 60px 64px' }) => (
    <div className="isg-scope" style={{ width: W, background: 'var(--bg)', color: 'var(--ink)', padding: pad, position: 'relative' }}>{children}</div>
  );
  const Block = ({ children, meta }) => (
    <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', borderBottom: '1px solid var(--line)', paddingBottom: 9, marginBottom: 20, marginTop: 40 }}>
      <h3 style={{ margin: 0 }} className="t-eyebrow">{children}</h3>
      {meta && <span className="t-meta">{meta}</span>}
    </div>
  );
  const Kit = ({ name, note, children }) => (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <span className="t-meta" style={{ color: 'var(--accent)' }}>{name}</span>
        <span style={{ flex: 1, height: 1, background: 'var(--line)' }} />
        {note && <span className="t-meta" style={{ color: 'var(--ink-3)' }}>{note}</span>}
      </div>
      {children}
    </div>
  );

  /* Edge droplet — a glowing dot that runs ALONG the perimeter of a box
     at an even, calm pace (rounded corners + pills), with a per-element
     on/off switch. Centralized in lib as <FlowEdge>. */
  const EdgeDrop = ({ delay = 0 }) => <FlowEdge delay={delay} dur={8} />;

  /* ── 1 · PROCESS FLOW — linear numbered steps + chevrons ──── */
  function ProcessFlow({ steps, tone = 'accent' }) {
    const c = toneColor(tone);
    return (
      <div style={{ display: 'flex', alignItems: 'stretch' }}>
        {steps.map((s, i) => (
          <React.Fragment key={i}>
            <div style={{ flex: 1, background: 'var(--grad-surface)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '16px 18px', boxShadow: 'var(--elev-1)', position: 'relative', overflow: 'hidden' }}>
              <EdgeDrop delay={i * 0.5} />
              <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: c, opacity: 0.85 }} />
              <div style={{ fontFamily: 'var(--f-mono)', fontSize: 11, letterSpacing: '0.14em', color: c }}>{s.k}</div>
              <div className="t-h3" style={{ fontSize: 15, marginTop: 7 }}>{s.title}</div>
              <div className="t-small" style={{ marginTop: 4, lineHeight: 1.45 }}>{s.sub}</div>
            </div>
            {i < steps.length - 1 && (
              <div style={{ width: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <svg width="22" height="14" viewBox="0 0 22 14"><path d="M1,7 H17" stroke="var(--ink-4)" strokeWidth="1.6" /><path d="M13,2 L19,7 L13,12" fill="none" stroke="var(--ink-4)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" /></svg>
              </div>
            )}
          </React.Fragment>
        ))}
      </div>
    );
  }

  /* ── 2 · SWIMLANE — actors × phases grid of chips ─────────── */
  function Swimlane({ phases, lanes }) {
    const cols = `150px repeat(${phases.length}, 1fr)`;
    return (
      <div style={{ border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', overflow: 'hidden', boxShadow: 'var(--elev-1)', position: 'relative' }}>
        <EdgeDrop dur={6} />
        <div style={{ display: 'grid', gridTemplateColumns: cols, background: 'var(--bg-2)', borderBottom: '1px solid var(--line)' }}>
          <div style={{ padding: '11px 16px' }} className="t-meta">Lane</div>
          {phases.map((p, i) => <div key={i} style={{ padding: '11px 16px', borderLeft: '1px solid var(--line)' }} className="t-meta">{p}</div>)}
        </div>
        {lanes.map((ln, li) => (
          <div key={li} style={{ display: 'grid', gridTemplateColumns: cols, borderBottom: li < lanes.length - 1 ? '1px solid var(--line)' : 'none' }}>
            <div style={{ padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 8, background: `var(--${ln.tone}-fill), var(--${ln.tone}-soft)`, borderRight: `2px solid var(--${ln.tone})` }}>
              <Dot tone={ln.tone} size={7} /><span className="t-h3" style={{ fontSize: 13.5 }}>{ln.label}</span>
            </div>
            {ln.cells.map((cell, ci) => (
              <div key={ci} style={{ padding: '12px 14px', borderLeft: '1px solid var(--line)', display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'flex-start', minHeight: 56 }}>
                {(cell || []).map((it, k) => (
                  <span key={k} style={{ fontFamily: 'var(--f-mono)', fontSize: 11, padding: '4px 9px', borderRadius: 6, background: `var(--${ln.tone}-soft)`, border: `1px solid var(--${ln.tone}-line)`, color: 'var(--ink-2)' }}>{it}</span>
                ))}
              </div>
            ))}
          </div>
        ))}
      </div>
    );
  }

  /* ── 3 · DECISION LADDER — sequential qualification gates ─── */
  function DecisionLadder({ rungs, final }) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 0, position: 'relative' }}>
        {rungs.map((r, i) => (
          <div key={i} style={{ position: 'relative', paddingLeft: 26 }}>
            <div style={{ position: 'absolute', left: 9, top: 0, bottom: -2, width: 2, background: 'var(--line-2)' }} />
            <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
              <div style={{ flex: '0 0 360px', position: 'relative', overflow: 'hidden', background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 'var(--r)', padding: '14px 18px', boxShadow: 'var(--elev-1)' }}>
                <EdgeDrop delay={i * 0.7} />
                <div className="t-meta" style={{ color: 'var(--ink-4)' }}>Gate {String(i + 1).padStart(2, '0')}</div>
                <div className="t-h3" style={{ fontSize: 15, marginTop: 5 }}>{r.q}</div>
              </div>
              <svg width="34" height="14" viewBox="0 0 34 14" style={{ flexShrink: 0 }}><path d="M1,7 H28" stroke="var(--ok)" strokeWidth="1.6" /><path d="M24,2 L30,7 L24,12" fill="none" stroke="var(--ok)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" /></svg>
              <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'var(--ok-fill), var(--ok-bg)', border: '1px solid var(--ok-line)', borderRadius: 'var(--r)', padding: '10px 16px' }}>
                <span style={{ fontFamily: 'var(--f-mono)', fontSize: 10, letterSpacing: '0.1em', color: 'var(--ok)' }}>YES →</span>
                <span style={{ fontSize: 13.5, fontWeight: 500 }}>{r.yes}</span>
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0 8px 0', color: 'var(--ink-4)' }}>
              <span style={{ fontFamily: 'var(--f-mono)', fontSize: 10, letterSpacing: '0.1em' }}>NO ↓</span>
            </div>
          </div>
        ))}
        <div style={{ paddingLeft: 26 }}>
          <div style={{ position: 'relative', overflow: 'hidden', display: 'inline-flex', alignItems: 'center', gap: 10, background: 'var(--bad-fill), var(--bad-bg)', border: '1px solid var(--bad-line)', borderRadius: 'var(--r)', padding: '12px 18px' }}>
            <EdgeDrop dur={3.6} />
            <span style={{ fontFamily: 'var(--f-mono)', fontSize: 10, letterSpacing: '0.1em', color: 'var(--bad)' }}>DEFAULT</span>
            <span style={{ fontSize: 13.5, fontWeight: 500 }}>{final}</span>
          </div>
        </div>
      </div>
    );
  }

  /* ── 4 · CYCLE — recurring loop of stages ─────────────────── */
  function CycleDiagram({ stages, size = 320 }) {
    const cx = size / 2, cy = size / 2, R = size / 2 - 54;
    const N = stages.length;
    const ang = (i) => -Math.PI / 2 + (i / N) * Math.PI * 2;
    const tones = ['d-1', 'd-2', 'd-3', 'd-4', 'd-5', 'd-6'];
    return (
      <div style={{ position: 'relative', width: size, height: size, margin: '0 auto' }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ position: 'absolute', inset: 0, overflow: 'visible' }}>
          <defs><marker id="cyc-ah" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="var(--ink-4)" /></marker></defs>
          {stages.map((_, i) => {
            const a0 = ang(i) + 0.42, a1 = ang((i + 1) % N) - 0.42;
            const x0 = cx + R * Math.cos(a0), y0 = cy + R * Math.sin(a0);
            const x1 = cx + R * Math.cos(a1), y1 = cy + R * Math.sin(a1);
            return <path key={i} d={`M${x0},${y0} A${R},${R} 0 0 1 ${x1},${y1}`} fill="none" stroke="var(--line-2)" strokeWidth="1.6" markerEnd="url(#cyc-ah)" />;
          })}
        </svg>
        {stages.map((s, i) => {
          const x = cx + R * Math.cos(ang(i)), y = cy + R * Math.sin(ang(i));
          const t = tones[i % tones.length];
          return (
            <div key={i} style={{ position: 'absolute', left: x, top: y, transform: 'translate(-50%,-50%)', width: 96, height: 96, borderRadius: '50%', background: `var(--${t}-fill), var(--${t}-soft)`, border: `1.5px solid var(--${t}-line)`, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: 8 }}>
              <EdgeDrop delay={i * (4.8 / N)} dur={4.8} />
              <span style={{ fontFamily: 'var(--f-mono)', fontSize: 10, color: `var(--${t})` }}>{String(i + 1).padStart(2, '0')}</span>
              <span style={{ fontSize: 12.5, fontWeight: 600, lineHeight: 1.15, marginTop: 3 }}>{s}</span>
            </div>
          );
        })}
        <div style={{ position: 'absolute', left: cx, top: cy, transform: 'translate(-50%,-50%)', width: 88, height: 88, borderRadius: '50%', background: 'var(--bg-1)', border: '1px solid var(--line)', display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
          <span className="t-meta" style={{ color: 'var(--ink-3)' }}>cycle</span>
        </div>
      </div>
    );
  }

  /* ── 5 · PYRAMID — tiered hierarchy / maturity ────────────── */
  function Pyramid({ tiers }) {
    const n = tiers.length;
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center', position: 'relative' }}>
        {tiers.map((t, i) => {
          const w = 42 + (i / (n - 1)) * 56;
          return (
            <div key={i} style={{ position: 'relative', overflow: 'hidden', width: `${w}%`, background: `var(--${t.tone}-fill), var(--${t.tone}-soft)`, border: `1.5px solid var(--${t.tone}-line)`, borderRadius: 'var(--r)', padding: '13px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14 }}>
              <EdgeDrop delay={i * 0.45} />
              <span className="t-h3" style={{ fontSize: 14 }}>{t.label}</span>
              {t.value && <span style={{ fontFamily: 'var(--f-mono)', fontSize: 12, color: `var(--${t.tone})` }}>{t.value}</span>}
            </div>
          );
        })}
      </div>
    );
  }

  /* ── 6 · MATRIX 2×2 — positioning / prioritization ────────── */
  function Matrix2x2({ xAxis, yAxis, quads, points }) {
    const S = 360;
    return (
      <div style={{ display: 'flex', gap: 18, alignItems: 'center' }}>
        <div style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)', textAlign: 'center' }} className="t-meta">{yAxis}</div>
        <div>
          <div style={{ position: 'relative', width: S, height: S, background: 'var(--grad-well)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', overflow: 'hidden' }}>
            <div style={{ position: 'absolute', left: '50%', top: 0, bottom: 0, width: 1, background: 'var(--line-2)' }} />
            <div style={{ position: 'absolute', top: '50%', left: 0, right: 0, height: 1, background: 'var(--line-2)' }} />
            {quads.map((q, i) => {
              const pos = [{ top: 12, left: 14 }, { top: 12, right: 14 }, { bottom: 12, left: 14 }, { bottom: 12, right: 14 }][i];
              return <div key={i} className="t-meta" style={{ position: 'absolute', ...pos, color: 'var(--ink-4)', maxWidth: 130, textAlign: pos.right != null ? 'right' : 'left' }}>{q}</div>;
            })}
            {points.map((p, i) => (
              <div key={i} style={{ position: 'absolute', left: `${p.x}%`, top: `${100 - p.y}%`, transform: 'translate(-50%,-50%)', display: 'flex', alignItems: 'center', gap: 7 }}>
                <span style={{ width: 13, height: 13, borderRadius: '50%', background: p.hero ? 'var(--accent)' : `var(--${p.tone || 'd-2'})`, boxShadow: p.hero ? 'var(--glow-accent)' : `0 0 0 4px var(--${p.tone || 'd-2'}-soft)`, flexShrink: 0 }} />
                <span style={{ fontSize: 12, fontWeight: p.hero ? 600 : 500, color: p.hero ? 'var(--accent)' : 'var(--ink-2)', whiteSpace: 'nowrap' }}>{p.label}</span>
              </div>
            ))}
          </div>
          <div style={{ textAlign: 'center', marginTop: 10 }} className="t-meta">{xAxis}</div>
        </div>
      </div>
    );
  }

  /* ── 7 · OPTION COLUMNS — trade-off comparison ────────────── */
  function CompareColumns({ rows, options }) {
    const cols = `180px repeat(${options.length}, 1fr)`;
    const mark = (v) => v === true ? <span style={{ color: 'var(--ok)', fontWeight: 700 }}>✓</span> : v === false ? <span style={{ color: 'var(--bad)', opacity: 0.8 }}>✕</span> : <span style={{ color: 'var(--ink-3)', fontFamily: 'var(--f-mono)', fontSize: 11.5 }}>{v}</span>;
    return (
      <div style={{ border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', overflow: 'hidden', boxShadow: 'var(--elev-1)' }}>
        <div style={{ display: 'grid', gridTemplateColumns: cols, background: 'var(--bg-2)', borderBottom: '1px solid var(--line)' }}>
          <div style={{ padding: '13px 16px' }} className="t-meta">Criterion</div>
          {options.map((o, i) => (
            <div key={i} style={{ padding: '13px 16px', borderLeft: '1px solid var(--line)', display: 'flex', alignItems: 'center', gap: 8, background: o.hero ? 'var(--accent-soft)' : 'transparent' }}>
              <Dot tone={o.hero ? 'accent' : 'd-2'} size={7} /><span className="t-h3" style={{ fontSize: 13.5, color: o.hero ? 'var(--accent)' : 'var(--ink)' }}>{o.label}</span>
            </div>
          ))}
        </div>
        {rows.map((r, ri) => (
          <div key={ri} style={{ display: 'grid', gridTemplateColumns: cols, borderBottom: ri < rows.length - 1 ? '1px solid var(--line)' : 'none' }}>

      <Kit name="ProcessFlow" note="USE WHEN · ordered steps, one path">
        <ProcessFlow steps={[
          { k: '01', title: '[ Capture ]', sub: '[ intake / trigger ]' },
          { k: '02', title: '[ Normalize ]', sub: '[ shape to contract ]' },
          { k: '03', title: '[ Evaluate ]', sub: '[ rules / scoring ]' },
          { k: '04', title: '[ Route ]', sub: '[ deliver downstream ]' },
        ]} />
      </Kit>

      <Block meta="OWNERSHIP × TIME">Swimlanes</Block>
      <Kit name="Swimlane" note="USE WHEN · who does what, across phases">
        <Swimlane phases={['Discover', 'Build', 'Ship']} lanes={[
          { label: '[ Product ]', tone: 'd-1', cells: [['[ scope ]', '[ specs ]'], ['[ review ]'], ['[ launch note ]']] },
          { label: '[ Engineering ]', tone: 'd-2', cells: [['[ spike ]'], ['[ implement ]', '[ test ]'], ['[ deploy ]']] },
          { label: '[ GTM ]', tone: 'd-3', cells: [['[ research ]'], ['[ enablement ]'], ['[ announce ]', '[ measure ]']] },
        ]} />
      </Kit>

      <Block meta="LOGIC">Decision ladder &amp; cycle</Block>
      <div style={{ display: 'grid', gridTemplateColumns: '1.35fr 1fr', gap: 28, alignItems: 'start' }}>
        <Kit name="DecisionLadder" note="USE WHEN · sequential gating / qualification">
          <DecisionLadder rungs={[
            { q: '[ Meets minimum threshold? ]', yes: '[ Advance ]' },
            { q: '[ Strategic fit confirmed? ]', yes: '[ Prioritize ]' },
            { q: '[ Capacity available now? ]', yes: '[ Schedule ]' },
          ]} final="[ Park / revisit next cycle ]" />
        </Kit>
        <Kit name="CycleDiagram" note="USE WHEN · a repeating loop">
          <CycleDiagram stages={['[ Plan ]', '[ Build ]', '[ Measure ]', '[ Learn ]']} />

      <Block meta="STRUCTURE">Pyramid &amp; 2×2 matrix</Block>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.1fr', gap: 28, alignItems: 'center' }}>
        <Kit name="Pyramid" note="USE WHEN · tiers / maturity / TAM">
          <Pyramid tiers={[
            { label: '[ Vision ]', tone: 'd-1', value: '[ why ]' },
            { label: '[ Strategy ]', tone: 'd-4', value: '[ how ]' },
            { label: '[ Execution ]', tone: 'd-2', value: '[ what ]' },
            { label: '[ Foundation ]', tone: 'd-3', value: '[ base ]' },

        </Kit>
        <Kit name="Matrix2x2" note="USE WHEN · positioning / prioritization">
          <Matrix2x2 xAxis="[ → capability ]" yAxis="[ → momentum ]"
            quads={['[ niche ]', '[ leaders ]', '[ laggards ]', '[ challengers ]']}
            points={[
              { x: 72, y: 78, label: '[ Us ]', hero: true },
              { x: 38, y: 60, label: '[ Co. A ]', tone: 'd-2' },

            { label: '[ Vendor lock-in ]', values: [false, true, true] },

      </Kit>

  /* ── FRAME 2 · CHOOSING A SCHEME (playbook) ───────────────── */
  const guide = [
    ['Show an ordered sequence', 'Process flow', 'Steps left→right, one path. Number every step; keep to 3–6.', 'd-1'],
    ['Show who owns what, over time', 'Swimlanes', 'Lanes = actors, columns = phases. Best when handoffs matter.', 'd-2'],
    ['Show branching logic', 'Decision ladder', 'Sequential gates with a default outcome. Avoid drawing every branch.', 'd-3'],
    ['Show a repeating process', 'Cycle', 'A closed loop of 3–5 stages. Don’t use for one-time sequences.', 'd-4'],
    ['Show hierarchy or tiers', 'Pyramid', 'Few levels, widest = foundation. Great for maturity / TAM-SAM-SOM.', 'd-5'],
    ['Show position on two axes', '2×2 matrix', 'Two continuous variables, ~3–6 plotted items. Mark your subject in coral.', 'd-6'],
    ['Compare discrete options', 'Option columns', 'Criteria as rows, options as columns. Highlight the recommended column.', 'accent'],
    ['Map system components', 'Architecture engine', 'Nodes + directional edges + trust zones. See the Architecture deck.', 'mute'],
  ];
  const rules = [

    ['Color encodes, never decorates', 'Use one diagram hue per role; reserve coral for the subject or the recommended path.'],

      </div>

      <Block meta="6 RULES">Rules for clear schematics</Block>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
        {rules.map(([t, d], i) => (
          <div key={i} style={{ background: 'var(--grad-surface)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '18px 20px', boxShadow: 'var(--elev-1)' }}>

    blurb: 'Schematic patterns beyond the architecture engine — process flow, swimlanes, decision ladder, cycle, pyramid, 2×2 matrix and option-comparison columns. Every block carries a best-practice note, and a playbook frame maps intent → scheme plus six rules for clear schematics.',
    frames: [
      { label: 'Scheme library', mode: 'flow', w: W, node: libFrame },
      { label: 'Choosing a scheme', mode: 'flow', w: W, node: guideFrame },
    ],
  });
})();


/* ===== tpl-narrative.jsx ===== */
/* ═══════════════════════════════════════════════════════════════
   NARRATIVE FLOW KIT — play-once guided storytelling.
   A choreographed single pass walks the reader through a diagram in
   narrative order: the glow traces the border of the opening figure,
   rides each connector as a comet, then blooms into an arrow that
   wakes the next stage. Ends settled and fully legible; replayable;
   reduced-motion and print land on the end state.
   Built on the nv- primitives in tokens.css.
   ═══════════════════════════════════════════════════════════════ */

(function () {
  const { useState } = React;
  const W = 1080;
  const IW = 960; /* inner width inside 60px Doc padding */

  const Doc = ({ children, label }) => (
    <div className="isg-scope" data-screen-label={label} style={{ width: W, background: 'var(--bg)', color: 'var(--ink)', padding: '52px 60px 64px', position: 'relative' }}>{children}</div>
  );
  const Block = ({ children, meta }) => (
    <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', borderBottom: '1px solid var(--line)', paddingBottom: 9, marginBottom: 20, marginTop: 40 }}>
      <h3 style={{ margin: 0 }} className="t-eyebrow">{children}</h3>
      {meta && <span className="t-meta">{meta}</span>}
    </div>
  );

  /* ── Sequencer shell: auto-plays once on mount, ↻ remounts ── */
  function Sequenced({ note, children }) {
    const [run, setRun] = useState(0);
    return (
      <div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <span className="t-meta" style={{ color: 'var(--ink-4)' }}>{note}</span>
          <button className="nv-replay" onClick={() => setRun((r) => r + 1)} style={{
            display: 'inline-flex', alignItems: 'center', gap: 7,
            fontFamily: 'var(--f-mono)', fontSize: 10.5, letterSpacing: '0.1em', textTransform: 'uppercase',
            padding: '6px 13px', borderRadius: 'var(--r-sm)', cursor: 'pointer',
            border: '1px solid var(--accent-line)', background: 'var(--accent-soft)', color: 'var(--accent)',
          }}>
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M10.5 6a4.5 4.5 0 1 1-1.3-3.2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" /><path d="M10.7 0.8 L10.5 3.4 L7.9 3.2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none" /></svg>
            Replay
          </button>
        </div>
        <div className="nv" key={run}>{children}</div>
      </div>
    );
  }

  /* ── Fixed-coordinate canvas + SVG overlay (shared coord space) ─ */
  const Canvas = ({ h, children }) => (
    <div style={{ position: 'relative', height: h }}>{children}</div>
  );
  const Overlay = ({ h, children }) => (
    <svg width={IW} height={h} viewBox={`0 0 ${IW} ${h}`} style={{ position: 'absolute', inset: 0, overflow: 'visible', pointerEvents: 'none', zIndex: 5 }}>{children}</svg>
  );

  /* Stage card. t = wake time (s). */
  const NodeCard = ({ x, y, w, h, tone = 'd-2', kicker, title, sub, t, hero }) => (
    <div className="nv-wake" style={{
      '--nv-t': `${t}s`,
      position: 'absolute', left: x, top: y, width: w, height: h,
      background: 'var(--grad-surface)', border: `1px solid ${hero ? 'var(--accent-line)' : 'var(--line-2)'}`,
      borderRadius: 'var(--r-lg)', padding: '14px 16px 14px 19px',
      boxShadow: hero ? 'var(--elev-1), 0 8px 30px rgba(234,90,58,0.14)' : 'var(--elev-1)',

    }}>
      <div style={{ position: 'absolute', top: 0, left: 0, bottom: 0, width: 3, background: `var(--${tone})` }} />
      <div style={{ fontFamily: 'var(--f-mono)', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: `var(--${tone})` }}>{kicker}</div>
      <div style={{ fontSize: 15.5, fontWeight: 600, letterSpacing: '-0.01em' }}>{title}</div>
      {sub && <div style={{ fontSize: 12, lineHeight: 1.45, color: 'var(--ink-3)' }}>{sub}</div>}
    </div>
  );

  /* Border-trace comet around a figure (overlay coords). */
  const Trace = ({ x, y, w, h, r = 12, t, dur = 1.5, tone }) => (
    <rect className="nv-trace" x={x + 0.5} y={y + 0.5} width={w - 1} height={h - 1} rx={r} pathLength="1"
      style={{ '--nv-t': `${t}s`, '--nv-dur': `${dur}s`, '--nv-c': tone ? `var(--${tone})` : undefined }} />
  );

  /* Connector: hairline draws & stays, comet rides it, arrowhead
     blooms at the destination and stays. */
  const Edge = ({ d, t, dur = 0.7, ax, ay, angle = 0, tone }) => {
    const c = tone ? `var(--${tone})` : 'var(--accent)';
    return (
      <g>
        <path className="nv-draw" d={d} pathLength="1" stroke="var(--line-2)" strokeWidth="1.5" style={{ '--nv-t': `${t}s`, '--nv-dur': `${dur}s` }} />
        <path className="nv-comet" d={d} pathLength="1" style={{ '--nv-t': `${t + 0.06}s`, '--nv-dur': `${dur + 0.3}s`, '--nv-c': c }} />
        <g transform={`translate(${ax}, ${ay}) rotate(${angle})`}>
          <g className="nv-bloom" style={{ '--nv-t': `${t + dur + 0.14}s` }}>
            <path d="M-8,-6.5 L2.5,0 L-8,6.5" fill="none" stroke={c} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round" style={{ filter: `drop-shadow(0 0 4px ${c})` }} />
          </g>
        </g>
      </g>
    );
  };

  const legend = 'PLAYS ONCE · SETTLES LEGIBLE · REDUCED-MOTION & PRINT SAFE';

  /* ── FRAME 1 · LINEAR JOURNEY → ───────────────────────────── */
  const stagesA = [
    { kicker: '01 · Discover', title: '[ Stage title ]', sub: '[ first touch — how the story opens ]', tone: 'd-2' },
    { kicker: '02 · Evaluate', title: '[ Stage title ]', sub: '[ what the reader weighs here ]', tone: 'd-6' },
    { kicker: '03 · Decide', title: '[ Stage title ]', sub: '[ the commitment moment ]', tone: 'd-3' },
    { kicker: '04 · Scale', title: '[ Outcome ]', sub: '[ where the narrative lands ]', tone: 'd-1' },
  ];
  const ax = [0, 260, 520, 780]; /* card x, w=180 */
  const linearFrame = (
    <Doc label="Narrative · Linear journey">
      <div className="t-eyebrow">Narrative flow · Guided reading</div>
      <h1 className="t-h1" style={{ margin: '12px 0 8px' }}>Lead the eye, once</h1>
      <p className="t-lead" style={{ fontSize: 16 }}>A single choreographed pass: the glow laps the opening figure's border, rides each connector as a comet, and blooms into an arrow that wakes the next stage. When it ends, every cue stays — the page reads perfectly without motion.</p>

      <Block meta="READS →">Linear journey</Block>
      <Sequenced note={legend}>
        <Canvas h={224}>
          {stagesA.map((s, i) => (
            <NodeCard key={i} x={ax[i]} y={40} w={180} h={138} tone={s.tone} kicker={s.kicker} title={s.title} sub={s.sub} t={[0.15, 2.85, 4.0, 5.15][i]} hero={i === 3} />
          ))}
          <Overlay h={224}>
            <Trace x={0} y={40} w={180} h={138} t={0.5} dur={1.6} />
            <Edge d="M184,109 L250,109" t={2.2} dur={0.5} ax={248} ay={109} />
            <Edge d="M444,109 L510,109" t={3.4} dur={0.5} ax={508} ay={109} />
            <Edge d="M704,109 L770,109" t={4.55} dur={0.5} ax={768} ay={109} />
          </Overlay>
        </Canvas>
      </Sequenced>
    </Doc>
  );

  /* ── FRAME 2 · HUB → SUB-AREAS ────────────────────────────── */
  const subs = [
    { kicker: 'Sub-area A', title: '[ Business line ]', sub: '[ one-line scope of this segment ]', tone: 'd-2', y: 0 },
    { kicker: 'Sub-area B', title: '[ Business line ]', sub: '[ one-line scope of this segment ]', tone: 'd-3', y: 150 },
    { kicker: 'Sub-area C', title: '[ Business line ]', sub: '[ one-line scope of this segment ]', tone: 'd-4', y: 300 },
  ];
  const hubFrame = (
    <Doc label="Narrative · Hub to sub-areas">
      <div className="t-eyebrow">Narrative flow · Guided reading</div>
      <h1 className="t-h1" style={{ margin: '12px 0 8px' }}>One core, many branches</h1>
      <p className="t-lead" style={{ fontSize: 16 }}>The glow makes one lap of the core figure, then splits into a fan of arrows — each pointing at a sub-area of the business. Arrows persist as the settled wayfinding.</p>

      <Block meta="READS → THEN FANS">Hub → sub-areas</Block>
      <Sequenced note={legend}>
        <Canvas h={420}>
          <NodeCard x={0} y={135} w={280} h={150} tone="d-1" hero kicker="Core" title="[ Core business ]" sub="[ the platform, company or capability the narrative starts from ]" t={0.15} />
          {subs.map((s, i) => (
            <NodeCard key={i} x={640} y={s.y} w={320} h={110} tone={s.tone} kicker={s.kicker} title={s.title} sub={s.sub} t={[3.0, 3.3, 3.6][i]} />
          ))}
          <Overlay h={420}>
            <Trace x={0} y={135} w={280} h={150} t={0.5} dur={1.7} />
            <Edge d="M284,172 C430,172 480,55 624,55" t={2.25} dur={0.75} ax={628} ay={55} tone="d-2" />
            <Edge d="M284,210 C430,210 480,205 624,205" t={2.55} dur={0.75} ax={628} ay={205} tone="d-3" />
            <Edge d="M284,248 C430,248 480,355 624,355" t={2.85} dur={0.75} ax={628} ay={355} tone="d-4" />
          </Overlay>
        </Canvas>
      </Sequenced>
    </Doc>
  );

  /* ── FRAME 3 · DIAGONAL PATH ↘ ────────────────────────────── */
  const diagFrame = (
    <Doc label="Narrative · Diagonal path">
      <div className="t-eyebrow">Narrative flow · Guided reading</div>
      <h1 className="t-h1" style={{ margin: '12px 0 8px' }}>Down and across</h1>
      <p className="t-lead" style={{ fontSize: 16 }}>For narratives that step diagonally — eras, escalations, build-ups — the comet swoops from each figure down into the next, so the reading order is never ambiguous.</p>

      <Block meta="READS ↘">Diagonal path</Block>
      <Sequenced note={legend}>
        <Canvas h={448}>
          <NodeCard x={0} y={0} w={300} h={120} tone="d-2" kicker="Act I · [ era / phase ]" title="[ Where it begins ]" sub="[ the opening state of the story ]" t={0.15} />
          <NodeCard x={330} y={160} w={300} h={120} tone="d-6" kicker="Act II · [ era / phase ]" title="[ The turn ]" sub="[ what changes and why it matters ]" t={2.85} />
          <NodeCard x={660} y={320} w={300} h={120} tone="d-1" hero kicker="Act III · [ era / phase ]" title="[ Where it lands ]" sub="[ the resolution the reader should keep ]" t={4.6} />
          <Overlay h={448}>
            <Trace x={0} y={0} w={300} h={120} t={0.5} dur={1.5} />
            <Edge d="M160,124 C160,220 230,220 318,220" t={2.15} dur={0.7} ax={322} ay={220} />
            <Edge d="M490,284 C490,380 560,380 648,380" t={3.9} dur={0.7} ax={652} ay={380} />
          </Overlay>

      </Sequenced>
    </Doc>
  );

  window.ISG.register({
    id: 'narrative-flow', group: 'Narrative flow', name: 'Guided narrative',
    blurb: 'Play-once choreography that walks the reader through a diagram in order: a glow traces the opening figure\u2019s border, rides each connector as a comet, and blooms into arrows that wake the next stage. Three reading paths — linear \u2192, hub \u2192 sub-areas, diagonal \u2198. Settles fully legible, replays on demand, and reduced-motion / print land on the end state.',
    frames: [

})();

  /* ── Positioned canvas + SVG overlay (shared coordinate space) ─ */
  const Canvas = ({ h, children }) => (
    <div style={{ position: 'relative', height: h }}>{children}</div>

  const Overlay = ({ h, children }) => (
    <svg width={IW} height={h} viewBox={`0 0 ${IW} ${h}`} style={{
      position: 'absolute', inset: 0, overflow: 'visible', pointerEvents: 'none', zIndex: 5,
    }}>{children}</svg>

  /* ── Border-trace comet ─────────────────────────────────────── */
  const Trace = ({ x, y, w, h, r = 10, t, dur = 1.3 }) => (
    <rect className="nv-trace" x={x + 0.5} y={y + 0.5} width={w - 1} height={h - 1} rx={r} pathLength="1"
      style={{ '--nv-t': `${t}s`, '--nv-dur': `${dur}s` }} />

  /* ── Connector: draw + comet + arrowhead bloom
       angle 90 → points ↓  |  angle 0 → points → ──────────────── */
  const Conn = ({ d, t, dur = 0.46, ax, ay, angle = 90, tone }) => {
    const c = tone ? `var(--${tone})` : 'var(--accent)';
    return (
      <g>
        <path className="nv-draw" d={d} pathLength="1" stroke="var(--line-2)" strokeWidth="1.4"
          style={{ '--nv-t': `${t}s`, '--nv-dur': `${dur}s` }} />
        <path className="nv-comet" d={d} pathLength="1"
          style={{ '--nv-t': `${t + 0.04}s`, '--nv-dur': `${dur + 0.26}s`, '--nv-c': c }} />
        <g transform={`translate(${ax},${ay}) rotate(${angle})`}>
          <g className="nv-bloom" style={{ '--nv-t': `${t + dur + 0.1}s` }}>
            <path d="M-7,-5.5 L2,0 L-7,5.5" fill="none" stroke={c} strokeWidth="2.2"
