<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISG · Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--f-sans); }
  #root { min-height: 100vh; }

  /* Ambient mesh + grain behind the shell */
  .gl-mesh { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .gl-mesh::after {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(1500px 850px at 12% -8%, var(--accent-soft), transparent 60%),
      radial-gradient(1300px 760px at 92% 4%, color-mix(in srgb, var(--d-2) 9%, transparent), transparent 65%),
      radial-gradient(1000px 800px at 82% 96%, color-mix(in srgb, var(--d-3) 6%, transparent), transparent 65%);
    filter: blur(22px);
  }
  .gl-mesh::before {
    content: ""; position: absolute; inset: 0; opacity: 0;
  }
  @keyframes isgPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0a0b0d">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0a0b0d"/>
    <rect x="360" y="250" width="220" height="150" rx="14" fill="none" stroke="#d3604a" stroke-width="6"/>
    <rect x="700" y="250" width="140" height="150" rx="14" fill="none" stroke="#6e8fc4" stroke-width="6"/>
    <line x1="580" y1="325" x2="700" y2="325" stroke="#5fb0bf" stroke-width="6"/>
    <path d="M676,313 L700,325 L676,337" fill="none" stroke="#5fb0bf" stroke-width="6"/>
    <rect x="360" y="440" width="480" height="110" rx="14" fill="none" stroke="#6fae84" stroke-width="6"/>
  </svg>
</template>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'SF Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#767b84;background:#0a0b0d;">Loading template library…</div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- All modules inlined into ONE Babel block. Canonical sources: lib/viz/gallery/tpl-*.jsx -->
<script type="text/babel" data-presets="react">

/* ===== lib.jsx ===== */
/* ═══════════════════════════════════════════════════════════════
   ISG LIB — shared primitives. Every template composes from these.
   Pure presentational components; all color via CSS vars (tokens.css).
   Exported to window at the bottom for cross-file use.
   ═══════════════════════════════════════════════════════════════ */

/* Mono eyebrow with the signature accent tick rule */
function Eyebrow({ children, accent = true, color, style }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      fontFamily: 'var(--f-mono)', fontSize: 'var(--t-label)', fontWeight: 500,
      letterSpacing: '0.12em', textTransform: 'uppercase',
      color: color || (accent ? 'var(--accent)' : 'var(--ink-3)'), ...style,
    }}>
      {accent && <span style={{ width: 24, height: 1, background: 'var(--accent)', flexShrink: 0 }} />}
      {children}
    </div>
  );
}

/* Status / category dot */
function Dot({ tone = 'accent', size = 8, pulse }) {
  const c = toneColor(tone);
  return (
    <span style={{
      width: size, height: size, borderRadius: '50%', background: c,
      flexShrink: 0, display: 'inline-block',
      boxShadow: `0 0 0 3px color-mix(in srgb, ${c} 18%, transparent)`,
      animation: pulse ? 'isgPulse 2.4s var(--ease) infinite' : 'none',
    }} />
  );
}

/* Pill / tag. tone drives color. variant: soft (default) | outline | solid */
function Tag({ children, tone = 'default', variant = 'soft', mono = true, style }) {
  const c = toneColor(tone);
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 6,
    fontFamily: mono ? 'var(--f-mono)' : 'var(--f-sans)',
    fontSize: '10.5px', letterSpacing: mono ? '0.08em' : '0.01em',
    textTransform: mono ? 'uppercase' : 'none',
    padding: '3px 9px', borderRadius: 'var(--r-sm)', whiteSpace: 'nowrap',
    fontWeight: 500, lineHeight: 1.4, ...style,
  };
  const skins = {
    soft:    { background: tintBg(tone), border: `1px solid ${tintLine(tone)}`, color: c },
    outline: { background: 'transparent', border: `1px solid var(--line-2)`, color: 'var(--ink-2)' },
    solid:   { background: c, border: `1px solid ${c}`, color: 'var(--accent-ink)' },
  };
  return <span style={{ ...base, ...skins[variant] }}>{children}</span>;
}

/* The workhorse surface. accentBar paints a 2px top rule in `tone`.
   Pass href / detail / onActivate to make the whole card a control. */
function Card({ children, label, title, sub, tone, accentBar, pad = 'var(--s-6)', glass, style, bodyStyle, href, detail, onActivate, cue }) {
  const clickable = !!(href || detail || onActivate);
  const baseStyle = {
    position: 'relative', background: glass ? 'var(--glass-bg)' : 'var(--bg-1)',
    backdropFilter: glass ? 'var(--glass-blur)' : 'none',
    WebkitBackdropFilter: glass ? 'var(--glass-blur)' : 'none',
    border: '1px solid var(--line)', borderRadius: 'var(--r-lg)',
    boxShadow: glass ? 'var(--glass-shadow)' : 'var(--elev-1)', overflow: 'hidden', ...style,
  };
  const body = (
    <>
      {accentBar && <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: toneColor(tone || 'accent') }} />}
      {clickable && cue && <span className="ix-cue" aria-hidden="true">{href ? '↗' : '+'}</span>}
      <div style={{ padding: pad, ...bodyStyle }}>
        {label && <div className="mono-label" style={{ marginBottom: title ? 8 : 0 }}>{label}</div>}
        {title && <div style={{ fontSize: 'var(--t-h3)', fontWeight: 600, letterSpacing: '-0.01em', marginBottom: sub ? 4 : 0 }}>{title}</div>}
        {sub && <div style={{ fontSize: 'var(--t-small)', color: 'var(--ink-3)', marginBottom: children ? 14 : 0 }}>{sub}</div>}
        {children}
      </div>
    </>
  );
  if (!clickable) return <div style={baseStyle}>{body}</div>;
  if (href) {
    const ext = /^(https?:|mailto:|tel:)/.test(href);
    return <a className="ix ix-lift" style={{ display: 'block', textDecoration: 'none', color: 'inherit', ...baseStyle }} href={href} target={ext ? '_blank' : undefined} rel={ext ? 'noopener noreferrer' : undefined}>{body}</a>;
  }
  const fire = (e) => { e.stopPropagation(); if (onActivate) onActivate(e); if (detail) openInspector(detail); };
  return <div className="ix ix-lift" role="button" tabIndex={0} style={baseStyle} onClick={fire} onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fire(e); } }}>{body}</div>;
}

/* Big metric tile. Pass href / detail / onActivate to make it a control. */
function StatCard({ value, label, tone = 'ink', sub, style, href, detail, onActivate, cue }) {
  const clickable = !!(href || detail || onActivate);
  const baseStyle = {
    position: 'relative', flex: 1, minWidth: 0, background: 'var(--bg-1)', border: '1px solid var(--line)',
    borderRadius: 'var(--r-lg)', padding: 'var(--s-5) var(--s-6)', boxShadow: 'var(--elev-1)',
    display: 'flex', flexDirection: 'column', gap: 6, ...style,
  };
  const body = (
    <>
      {clickable && cue && <span className="ix-cue" aria-hidden="true">{href ? '↗' : '+'}</span>}
      {label && <div className="mono-label" style={{ fontSize: 'var(--t-micro)' }}>{label}</div>}
      <div style={{ fontSize: 40, fontWeight: 600, letterSpacing: '-0.03em', lineHeight: 1, color: tone === 'ink' ? 'var(--ink)' : toneColor(tone), fontFamily: 'var(--f-sans)' }}>{value}</div>
      {sub && <div style={{ fontSize: 'var(--t-small)', color: 'var(--ink-3)' }}>{sub}</div>}
    </>
  );
  if (!clickable) return <div style={baseStyle}>{body}</div>;
  if (href) {
    const ext = /^(https?:|mailto:|tel:)/.test(href);
    return <a className="ix ix-lift" style={{ textDecoration: 'none', color: 'inherit', ...baseStyle }} href={href} target={ext ? '_blank' : undefined} rel={ext ? 'noopener noreferrer' : undefined}>{body}</a>;
  }
  const fire = (e) => { e.stopPropagation(); if (onActivate) onActivate(e); if (detail) openInspector(detail); };
  return <div className="ix ix-lift" role="button" tabIndex={0} style={baseStyle} onClick={fire} onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fire(e); } }}>{body}</div>;
}

/* Label · value row, mono key. Great for spec sheets / overview blocks. */
function KV({ k, v, vColor }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '128px 1fr', gap: 16, alignItems: 'baseline', padding: '9px 0', borderBottom: '1px solid var(--line)' }}>
      <span style={{ fontFamily: 'var(--f-mono)', fontSize: '10.5px', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>{k}</span>
      <span style={{ fontSize: 'var(--t-body)', color: vColor || 'var(--ink)' }}>{v}</span>
    </div>
  );
}
function KVList({ rows }) {
  return <div>{rows.map((r, i) => <KV key={i} {...r} />)}</div>;
}

/* Section divider with an optional right-aligned meta count */
function SectionHead({ label, meta, style }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', borderBottom: '1px solid var(--line)', paddingBottom: 10, marginBottom: 18, ...style }}>
      <div className="mono-label" style={{ color: 'var(--ink-2)' }}>{label}</div>
      {meta && <div style={{ fontFamily: 'var(--f-mono)', fontSize: 'var(--t-micro)', color: 'var(--ink-4)', letterSpacing: '0.08em' }}>{meta}</div>}
    </div>
  );
}

/* Horizontal stacked proportion bar (BY PROFILE / BY STATUS) */
function StackBar({ segments, height = 14 }) {
  const total = segments.reduce((a, s) => a + s.value, 0) || 1;
  return (
    <div>
      <div style={{ display: 'flex', height, borderRadius: 'var(--r-xs)', overflow: 'hidden', gap: 2 }}>
        {segments.map((s, i) => (
          <div key={i} title={`${s.label}: ${s.value}`} style={{ width: `${(s.value / total) * 100}%`, background: s.color || toneColor(s.tone || 'accent') }} />
        ))}
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px 20px', marginTop: 14 }}>
        {segments.map((s, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 7, fontSize: 'var(--t-small)', color: 'var(--ink-2)' }}>
            <span style={{ width: 9, height: 9, borderRadius: 2, background: s.color || toneColor(s.tone || 'accent') }} />
            {s.label}
            <span style={{ fontFamily: 'var(--f-mono)', color: 'var(--ink-3)', fontSize: '11px' }}>{s.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* Horizontal funnel / ranked bar row */
function BarRow({ value, label, sub, pct, tone = 'accent' }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '120px 1fr 180px', alignItems: 'center', gap: 18 }}>
      <div style={{ fontSize: 26, fontWeight: 600, letterSpacing: '-0.02em', fontFamily: 'var(--f-sans)' }}>{value}</div>
      <div style={{ height: 30, background: 'var(--bg-3)', borderRadius: 'var(--r-sm)', overflow: 'hidden' }}>
        <div style={{ width: `${pct}%`, height: '100%', background: `linear-gradient(90deg, ${toneColor(tone)}, color-mix(in srgb, ${toneColor(tone)} 60%, transparent))` }} />
      </div>
      <div style={{ textAlign: 'right' }}>
        <div style={{ fontSize: 'var(--t-small)', fontWeight: 500 }}>{label}</div>
        <div className="mono-label" style={{ fontSize: '9px', justifyContent: 'flex-end' }}>{sub}</div>
      </div>
    </div>
  );
}

/* A boxed diagram node for architecture flows (HTML, not SVG).
   Pass href / detail / onActivate to make it a control. */
function Node({ title, sub, tone = 'd-1', tags, mono, style, href, detail, onActivate, cue }) {
  const c = `var(--${tone})`;
  const clickable = !!(href || detail || onActivate);
  const baseStyle = {
    position: 'relative',
    background: `var(--${tone}-soft)`, border: `1px solid var(--${tone}-line)`,
    borderRadius: 'var(--r)', padding: '12px 14px', ...style,
  };
  const body = (
    <>
      {clickable && cue && <span className="ix-cue" aria-hidden="true">{href ? '↗' : '+'}</span>}
      <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--ink)', fontFamily: mono ? 'var(--f-mono)' : 'var(--f-sans)', letterSpacing: mono ? '0.02em' : '-0.01em' }}>{title}</div>
      {sub && <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 3 }}>{sub}</div>}
      {tags && <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginTop: 9 }}>{tags.map((t, i) => <Tag key={i} tone={tone}>{t}</Tag>)}</div>}
    </>
  );
  if (!clickable) return <div style={baseStyle}>{body}</div>;
  if (href) {
    const ext = /^(https?:|mailto:|tel:)/.test(href);
    return <a className="ix ix-lift" style={{ display: 'block', textDecoration: 'none', color: 'inherit', ...baseStyle }} href={href} target={ext ? '_blank' : undefined} rel={ext ? 'noopener noreferrer' : undefined}>{body}</a>;
  }
  const fire = (e) => { e.stopPropagation(); if (onActivate) onActivate(e); if (detail) openInspector(detail); };
  return <div className="ix ix-lift" role="button" tabIndex={0} style={baseStyle} onClick={fire} onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fire(e); } }}>{body}</div>;
}

/* ── helpers ─────────────────────────────────────────────────── */
/* ═══════════════════════════════════════════════════════════════
   INTERACTIVITY — make any template element a tactile control.
   • Interactive  — wrapper that renders an <a> for hyperlinks or a
     keyboard-accessible button-div that opens the Inspector.
   • openInspector(detail) — fire the shared detail panel from code.
   • Inspector — the panel itself (mounted once by the gallery App).
   Detail payload: { kicker, title, sub, tone, body (str | str[]),
     stats:[{k,v}], tags:[…], links:[{label,href}] }.
   ─────────────────────────────────────────────────────────────── */
function openInspector(detail) {
  if (typeof window === 'undefined') return;
  window.dispatchEvent(new CustomEvent('isg:inspect', { detail }));
}

function Interactive({ href, detail, onActivate, className = '', style, children,
                       lift = true, ring = false, cue, title, stop = true }) {
  const cls = ['ix', lift && 'ix-lift', ring && 'ix-ring', className].filter(Boolean).join(' ');
  const cueEl = cue ? <span className="ix-cue" aria-hidden="true">{cue === 'link' ? '↗' : (cue === 'inspect' ? '+' : cue)}</span> : null;
  if (href) {
    const ext = /^(https?:|mailto:|tel:)/.test(href);
    return (
      <a href={href} title={title} className={cls}
         style={{ display: 'block', position: 'relative', ...style }}
         target={ext ? '_blank' : undefined} rel={ext ? 'noopener noreferrer' : undefined}
         onClick={(e) => { if (stop) e.stopPropagation(); }}>
        {cueEl}{children}
      </a>
    );
  }
  const fire = (e) => { if (stop) e.stopPropagation(); if (onActivate) onActivate(e); if (detail) openInspector(detail); };
  return (
    <div title={title} className={cls} style={{ position: 'relative', ...style }}
         role="button" tabIndex={0} onClick={fire}
         onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fire(e); } }}>
      {cueEl}{children}
    </div>
  );
}

/* FlowEdge — a slim comet/"worm" that crawls the parent box's perimeter
   (rounded corners + pills) at an even pace, orienting along the edge,
   with its own on/off switch. Drop inside any position:relative box.
   Honors the global FLOW toggle and reduced-motion / print. */
function FlowEdge({ dur = 8, thick = 5, len = 34, delay = 0, color }) {
  const [on, setOn] = React.useState(true);
  const vars = { '--fd-dur': dur + 's', '--fd-thick': thick + 'px', '--fd-len': len + 'px', '--fd-delay': (delay || 0) + 's' };
  if (color) vars['--fd-c'] = `var(--${color})`;
  return (
    <>
      <span className="flow-edge" data-off={on ? undefined : ''} style={vars}>
        <span className="flow-dot" />
      </span>
      <button type="button" className="flow-switch" data-on={on ? 'true' : 'false'}
        aria-label={on ? 'Turn off edge animation' : 'Turn on edge animation'}
        title={on ? 'Turn off edge animation' : 'Turn on edge animation'}
        onClick={(e) => { e.stopPropagation(); e.preventDefault(); setOn((v) => !v); }}>
        <span className="fs-dot" />
      </button>
    </>
  );
}

function Inspector() {
  const [d, setD] = React.useState(null);
  React.useEffect(() => {
    const onOpen = (e) => setD(e.detail || null);
    const onKey = (e) => { if (e.key === 'Escape') setD(null); };
    window.addEventListener('isg:inspect', onOpen);
    window.addEventListener('keydown', onKey);
    return () => { window.removeEventListener('isg:inspect', onOpen); window.removeEventListener('keydown', onKey); };
  }, []);
  const open = !!d;
  const tone = d && d.tone ? d.tone : 'accent';
  const c = toneColor(tone);
  const bodyLines = d && d.body ? (Array.isArray(d.body) ? d.body : [d.body]) : [];
  return (
    <>
      <div className="ix-backdrop" data-open={open ? 'true' : 'false'} onClick={() => setD(null)} aria-hidden={!open} />
      <aside className="ix-panel" data-open={open ? 'true' : 'false'} role="dialog" aria-modal="true" aria-hidden={!open}
             aria-label={d ? (d.title || 'Detail') : 'Detail'}>
        {d && (
          <>
            <div className="ix-panel-head">
              <div className="ix-panel-accent" style={{ background: c }} />
              <div style={{ minWidth: 0 }}>
                {d.kicker && <div className="mono-label" style={{ color: c, marginBottom: 8 }}>{d.kicker}</div>}
                <div style={{ fontSize: 'var(--t-h1)', fontWeight: 600, letterSpacing: '-0.025em', lineHeight: 1.12, textWrap: 'balance' }}>{d.title}</div>
                {d.sub && <div style={{ fontSize: 'var(--t-small)', color: 'var(--ink-3)', marginTop: 6 }}>{d.sub}</div>}
              </div>
              <button className="ix-panel-close" onClick={() => setD(null)} aria-label="Close detail">×</button>
            </div>
            <div className="ix-panel-body">
              {bodyLines.length > 0 && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {bodyLines.map((b, i) => (
                    <p key={i} className="t-body" style={{ margin: 0, fontSize: 14.5, lineHeight: 1.6, color: 'var(--ink-2)' }}>{b}</p>
                  ))}
                </div>
              )}
              {d.stats && d.stats.length > 0 && (
                <div style={{ marginTop: bodyLines.length ? 22 : 0 }}>
                  <KVList rows={d.stats.map((s) => ({ k: s.k, v: s.v, vColor: s.vColor }))} />
                </div>
              )}
              {d.tags && d.tags.length > 0 && (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7, marginTop: 22 }}>
                  {d.tags.map((t, i) => <Tag key={i} tone={typeof t === 'object' ? t.tone : tone}>{typeof t === 'object' ? t.label : t}</Tag>)}
                </div>
              )}
              {d.links && d.links.length > 0 && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 9, marginTop: 26 }}>
                  {d.links.map((l, i) => {
                    const ext = /^(https?:|mailto:|tel:)/.test(l.href || '');
                    return (
                      <a key={i} href={l.href || '#'} className="ix-panel-link"
                         target={ext ? '_blank' : undefined} rel={ext ? 'noopener noreferrer' : undefined}
                         style={{
                           display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
                           padding: '12px 16px', borderRadius: 'var(--r)', textDecoration: 'none',
                           border: `1px solid ${l.primary ? 'var(--accent-line)' : 'var(--line)'}`,
                           background: l.primary ? 'var(--accent-soft)' : 'var(--bg-1)',
                           color: l.primary ? 'var(--accent)' : 'var(--ink)',
                           fontSize: 14, fontWeight: 500,
                         }}>
                        <span>{l.label}</span>
                        <span style={{ fontFamily: 'var(--f-mono)', fontSize: 13, opacity: 0.8 }}>{ext ? '↗' : '→'}</span>
                      </a>
                    );
                  })}
                </div>
              )}
            </div>
          </>
        )}
      </aside>
    </>
  );
}

function toneColor(tone) {
  const map = {
    accent: 'var(--accent)', ink: 'var(--ink)', ink2: 'var(--ink-2)', mute: 'var(--mute)',
    ok: 'var(--ok)', warn: 'var(--warn)', bad: 'var(--bad)',
    p1: 'var(--p1)', p2: 'var(--p2)', p3: 'var(--p3)', p4: 'var(--p4)', p5: 'var(--p5)',
    'd-1': 'var(--d-1)', 'd-2': 'var(--d-2)', 'd-3': 'var(--d-3)', 'd-4': 'var(--d-4)', 'd-5': 'var(--d-5)', 'd-6': 'var(--d-6)',
    default: 'var(--ink-2)',
  };
  return map[tone] || tone;
}
function tintBg(tone) {
  const map = {
    accent: 'var(--accent-soft)', ok: 'var(--ok-bg)', warn: 'var(--warn-bg)', bad: 'var(--bad-bg)',
    'd-1': 'var(--d-1-soft)', 'd-2': 'var(--d-2-soft)', 'd-3': 'var(--d-3-soft)', 'd-4': 'var(--d-4-soft)', 'd-5': 'var(--d-5-soft)', 'd-6': 'var(--d-6-soft)',
  };
  return map[tone] || 'color-mix(in srgb, var(--ink) 7%, transparent)';

Object.assign(window, {

/* ===== viz.jsx ===== */
/* ═══════════════════════════════════════════════════════════════
   ISG VIZ — reusable SVG chart kit. Theme-aware (all color via
   tokens). Each component is self-contained; gradient/clip ids are
   uniquified to avoid collisions. Exported to window at the bottom.
   ═══════════════════════════════════════════════════════════════ */

let __vizId = 0;
const uid = (p) => `${p}-${++__vizId}`;
const cssVar = (t) => (t && t.startsWith('--')) ? `var(${t})` : (t && t.startsWith('#') ? t : `var(--${t || 'd-2'})`);

/* ── Sparkline — compact trend line, optional area fill ──────── */
function Sparkline({ data, w = 160, h = 44, tone = 'd-2', area = true, strokeW = 2, dot = true }) {
  const max = Math.max(...data), min = Math.min(...data), rng = (max - min) || 1;
  const pad = strokeW + 1;
  const X = (i) => pad + (i / (data.length - 1)) * (w - pad * 2);
  const Y = (v) => pad + (1 - (v - min) / rng) * (h - pad * 2);
  const pts = data.map((v, i) => [X(i), Y(v)]);
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const fill = `${line} L${X(data.length - 1).toFixed(1)},${h - pad} L${pad},${h - pad} Z`;
  const gid = uid('spark');
  const c = cssVar(tone);
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: 'block', overflow: 'visible' }}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity="0.32" /><stop offset="100%" stopColor={c} stopOpacity="0" /></linearGradient></defs>
      {area && <path d={fill} fill={`url(#${gid})`} />}
      <path d={line} fill="none" stroke={c} strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" />
      {dot && <circle cx={X(data.length - 1)} cy={Y(data[data.length - 1])} r={strokeW + 1.2} fill={c} />}
    </svg>
  );
}

/* ── AreaChart — larger area chart with baseline grid + axis ─── */
function AreaChart({ series, w = 520, h = 200, tone = 'd-2', grid = 4, labels }) {
  const data = series;
  const max = Math.max(...data) * 1.1, min = Math.min(0, ...data), rng = (max - min) || 1;
  const padL = 6, padB = labels ? 22 : 8, padT = 8;
  const X = (i) => padL + (i / (data.length - 1)) * (w - padL * 2);
  const Y = (v) => padT + (1 - (v - min) / rng) * (h - padT - padB);
  const pts = data.map((v, i) => [X(i), Y(v)]);
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const fill = `${line} L${X(data.length - 1).toFixed(1)},${Y(min)} L${padL},${Y(min)} Z`;
  const gid = uid('area'); const c = cssVar(tone);
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: 'block', overflow: 'visible' }}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity="0.34" /><stop offset="100%" stopColor={c} stopOpacity="0.02" /></linearGradient></defs>
      {Array.from({ length: grid + 1 }).map((_, i) => { const y = padT + (i / grid) * (h - padT - padB); return <line key={i} x1={padL} y1={y} x2={w - padL} y2={y} stroke="var(--line)" strokeWidth="1" />; })}
      <path d={fill} fill={`url(#${gid})`} />
      <path d={line} fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill="var(--bg-1)" stroke={c} strokeWidth="1.6" />)}
      {labels && labels.map((l, i) => <text key={i} x={X(i)} y={h - 6} textAnchor="middle" fill="var(--ink-4)" style={{ fontFamily: 'var(--f-mono)', fontSize: 10 }}>{l}</text>)}
    </svg>
  );
}

/* ── Multi-series line chart (overlay) ───────────────────────── */
function LineChart({ lines, w = 520, h = 200, grid = 4, labels }) {
  const all = lines.flatMap((l) => l.data);
  const max = Math.max(...all) * 1.08, min = Math.min(0, ...all), rng = (max - min) || 1;
  const padL = 6, padB = labels ? 22 : 8, padT = 8;
  const X = (i, n) => padL + (i / (n - 1)) * (w - padL * 2);
  const Y = (v) => padT + (1 - (v - min) / rng) * (h - padT - padB);
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: 'block', overflow: 'visible' }}>
      {Array.from({ length: grid + 1 }).map((_, i) => { const y = padT + (i / grid) * (h - padT - padB); return <line key={i} x1={padL} y1={y} x2={w - padL} y2={y} stroke="var(--line)" strokeWidth="1" />; })}
      {lines.map((l, li) => {
        const c = cssVar(l.tone); const d = l.data.map((v, i) => `${i ? 'L' : 'M'}${X(i, l.data.length).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
        return <g key={li}><path d={d} fill="none" stroke={c} strokeWidth="2.5" strokeDasharray={l.dashed ? '5,4' : 'none'} strokeLinecap="round" strokeLinejoin="round" />
          <circle cx={X(l.data.length - 1, l.data.length)} cy={Y(l.data[l.data.length - 1])} r="3" fill={c} /></g>;
      })}
      {labels && labels.map((l, i) => <text key={i} x={X(i, labels.length)} y={h - 6} textAnchor="middle" fill="var(--ink-4)" style={{ fontFamily: 'var(--f-mono)', fontSize: 10 }}>{l}</text>)}
    </svg>
  );
}

/* ── Donut / Ring gauge ──────────────────────────────────────── */
function Donut({ segments, size = 150, thick = 18, center, sub, gap = 2 }) {
  const total = segments.reduce((a, s) => a + s.value, 0) || 1;
  const r = (size - thick) / 2, cx = size / 2, cy = size / 2, C = 2 * Math.PI * r;
  let off = 0;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--bg-3)" strokeWidth={thick} />
        {segments.map((s, i) => {
          const frac = s.value / total; const len = frac * C; const dash = `${Math.max(len - gap, 0)} ${C - Math.max(len - gap, 0)}`;
          const el = <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={cssVar(s.tone)} strokeWidth={thick} strokeDasharray={dash} strokeDashoffset={-off} strokeLinecap="butt" />;
          off += len; return el;
        })}
      </svg>
      {(center || sub) && (
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2 }}>
          {center && <div style={{ fontSize: size * 0.2, fontWeight: 700, letterSpacing: '-0.005em', color: 'var(--ink)', lineHeight: 1, fontFamily: 'var(--f-sans)', whiteSpace: 'nowrap' }}>{center}</div>}
          {sub && <div style={{ fontFamily: 'var(--f-mono)', fontSize: 9.5, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>{sub}</div>}
        </div>
      )}
    </div>
  );
}

/* ── Radial gauge (single value, arc) ────────────────────────── */
function Gauge({ value, max = 100, size = 150, thick = 14, tone = 'accent', label, fmt }) {
  const r = (size - thick) / 2, cx = size / 2, cy = size / 2;
  const A = Math.PI * 1.35, start = Math.PI * 0.825;
  const pol = (ang) => [cx + r * Math.cos(ang), cy + r * Math.sin(ang)];
  const arc = (a0, a1) => { const [x0, y0] = pol(a0), [x1, y1] = pol(a1); const large = (a1 - a0) > Math.PI ? 1 : 0; return `M${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1}`; };
  const frac = Math.min(value / max, 1);
  return (
    <div style={{ position: 'relative', width: size, height: size * 0.78 }}>
      <svg width={size} height={size * 0.82} viewBox={`0 0 ${size} ${size * 0.82}`} style={{ overflow: 'visible' }}>
        <path d={arc(start, start + A)} fill="none" stroke="var(--bg-3)" strokeWidth={thick} strokeLinecap="round" />
        <path d={arc(start, start + A * frac)} fill="none" stroke={cssVar(tone)} strokeWidth={thick} strokeLinecap="round" />
      </svg>
      <div style={{ position: 'absolute', inset: 0, top: '14%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontSize: size * 0.2, fontWeight: 700, letterSpacing: '-0.03em', color: 'var(--ink)', lineHeight: 1 }}>{fmt ? fmt(value) : value}</div>
        {label && <div style={{ fontFamily: 'var(--f-mono)', fontSize: 9.5, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-3)', marginTop: 4 }}>{label}</div>}
      </div>
    </div>
  );
}

/* ── MiniBars — vertical bar chart ───────────────────────────── */
function MiniBars({ data, w = 220, h = 90, tone = 'd-2', labels, highlight }) {
  const max = Math.max(...data) || 1; const n = data.length; const gap = 4; const bw = (w - gap * (n - 1)) / n;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h + (labels ? 16 : 0)}`} style={{ display: 'block' }}>
      {data.map((v, i) => {
        const bh = (v / max) * h; const x = i * (bw + gap); const isHi = highlight === i;
        return <g key={i}>
          <rect x={x} y={h - bh} width={bw} height={bh} rx="2.5" fill={isHi ? cssVar('accent') : cssVar(tone)} opacity={isHi ? 1 : 0.55} />
          {labels && <text x={x + bw / 2} y={h + 12} textAnchor="middle" fill="var(--ink-4)" style={{ fontFamily: 'var(--f-mono)', fontSize: 9 }}>{labels[i]}</text>}
        </g>;
      })}
    </svg>
  );
}

/* ── Radar / spider chart ────────────────────────────────────── */
function Radar({ axes, series, size = 240, max = 5, rings = 4 }) {
  const cx = size / 2, cy = size / 2, R = size / 2 - 30; const N = axes.length;
  const ang = (i) => -Math.PI / 2 + (i / N) * Math.PI * 2;
  const pt = (i, v) => [cx + (v / max) * R * Math.cos(ang(i)), cy + (v / max) * R * Math.sin(ang(i))];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ overflow: 'visible' }}>
      {Array.from({ length: rings }).map((_, ri) => {
        const rr = ((ri + 1) / rings); const poly = axes.map((_, i) => { const [x, y] = pt(i, rr * max); return `${x.toFixed(1)},${y.toFixed(1)}`; }).join(' ');
        return <polygon key={ri} points={poly} fill="none" stroke="var(--line)" strokeWidth="1" />;
      })}
      {axes.map((_, i) => { const [x, y] = pt(i, max); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--line)" strokeWidth="1" />; })}
      {series.map((s, si) => {
        const c = cssVar(s.tone); const poly = s.data.map((v, i) => { const [x, y] = pt(i, v); return `${x.toFixed(1)},${y.toFixed(1)}`; }).join(' ');
        return <g key={si}><polygon points={poly} fill={c} fillOpacity="0.14" stroke={c} strokeWidth="2" strokeLinejoin="round" />
          {s.data.map((v, i) => { const [x, y] = pt(i, v); return <circle key={i} cx={x} cy={y} r="3" fill={c} />; })}</g>;
      })}
      {axes.map((a, i) => { const [x, y] = pt(i, max + 0.55); return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill="var(--ink-3)" style={{ fontFamily: 'var(--f-mono)', fontSize: 10, letterSpacing: '0.04em' }}>{a}</text>; })}
    </svg>
  );
}

/* ── Gantt / timeline ────────────────────────────────────────── */
function Gantt({ rows, w = 560, cols, rowH = 34 }) {
  const n = cols.length; const labelW = 150; const trackW = w - labelW; const colW = trackW / n; const H = rows.length * rowH + 26;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${H}`} style={{ display: 'block', overflow: 'visible' }}>
      {cols.map((c, i) => <g key={i}><line x1={labelW + i * colW} y1="20" x2={labelW + i * colW} y2={H - 4} stroke="var(--line)" strokeWidth="1" /><text x={labelW + i * colW + 4} y="12" fill="var(--ink-4)" style={{ fontFamily: 'var(--f-mono)', fontSize: 9.5, letterSpacing: '0.06em' }}>{c}</text></g>)}
      {rows.map((r, ri) => {
        const y = 26 + ri * rowH; const x = labelW + r.start * colW; const bw = Math.max(r.len * colW - 4, 8); const c = cssVar(r.tone);
        return <g key={ri}>
          <text x="0" y={y + rowH / 2} dominantBaseline="middle" fill="var(--ink-2)" style={{ fontFamily: 'var(--f-sans)', fontSize: 12 }}>{r.label}</text>
          <rect x={x} y={y + 5} width={bw} height={rowH - 14} rx="5" fill={c} fillOpacity={r.ghost ? 0.18 : 0.85} stroke={c} strokeWidth={r.ghost ? 1 : 0} strokeDasharray={r.ghost ? '4,3' : 'none'} />
          {r.milestone != null && <circle cx={labelW + r.milestone * colW} cy={y + rowH / 2} r="4.5" fill="var(--accent)" stroke="var(--bg-1)" strokeWidth="2" />}
        </g>;
      })}
    </svg>
  );
}

/* ── Sankey-lite — left→right flow ribbons ───────────────────── */
function FlowRibbons({ left, right, links, w = 560, h = 260 }) {
  const nodeW = 12, pad = 8; const lx = pad, rx = w - pad - nodeW;
  const total = left.reduce((a, n) => a + n.value, 0) || 1;
  let ly = 0; const lpos = left.map((n) => { const hh = (n.value / total) * (h - (left.length - 1) * 6); const o = { ...n, y: ly, h: hh }; ly += hh + 6; return o; });
  let ry = 0; const rtot = right.reduce((a, n) => a + n.value, 0) || 1; const rpos = right.map((n) => { const hh = (n.value / rtot) * (h - (right.length - 1) * 6); const o = { ...n, y: ry, h: hh }; ry += hh + 6; return o; });
  const lOff = {}, rOff = {};
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: 'block', overflow: 'visible' }}>
      {links.map((lk, i) => {
        const a = lpos[lk.from], b = rpos[lk.to]; if (!a || !b) return null;
        const t = (lk.value / a.value) * a.h; const bt = (lk.value / b.value) * b.h;
        const ay = a.y + (lOff[lk.from] || 0); const by = b.y + (rOff[lk.to] || 0);
        lOff[lk.from] = (lOff[lk.from] || 0) + t; rOff[lk.to] = (rOff[lk.to] || 0) + bt;
        const x0 = lx + nodeW, x1 = rx; const mx = (x0 + x1) / 2; const c = cssVar(a.tone);
        const d = `M${x0},${ay} C${mx},${ay} ${mx},${by} ${x1},${by} L${x1},${by + bt} C${mx},${by + bt} ${mx},${ay + t} ${x0},${ay + t} Z`;
        return <path key={i} d={d} fill={c} fillOpacity="0.22" />;
      })}
      {lpos.map((n, i) => <g key={`l${i}`}><rect x={lx} y={n.y} width={nodeW} height={n.h} rx="3" fill={cssVar(n.tone)} /><text x={lx + nodeW + 8} y={n.y + n.h / 2} dominantBaseline="middle" fill="var(--ink-2)" style={{ fontFamily: 'var(--f-sans)', fontSize: 12 }}>{n.label}</text></g>)}
      {rpos.map((n, i) => <g key={`r${i}`}><rect x={rx} y={n.y} width={nodeW} height={n.h} rx="3" fill={cssVar(n.tone)} /><text x={rx - 8} y={n.y + n.h / 2} dominantBaseline="middle" textAnchor="end" fill="var(--ink-2)" style={{ fontFamily: 'var(--f-sans)', fontSize: 12 }}>{n.label}</text></g>)}
    </svg>
  );
}

/* ── Heat strip — intensity cells (e.g. activity over time) ──── */
function HeatStrip({ data, cols = 24, cell = 15, gap = 3, tone = 'accent' }) {
  const max = Math.max(...data) || 1; const rows = Math.ceil(data.length / cols);
  const w = cols * (cell + gap), h = rows * (cell + gap);
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: 'block' }}>
      {data.map((v, i) => { const r = Math.floor(i / cols), c = i % cols; const op = 0.12 + (v / max) * 0.88;
        return <rect key={i} x={c * (cell + gap)} y={r * (cell + gap)} width={cell} height={cell} rx="2.5" fill={cssVar(tone)} opacity={op} />; })}
    </svg>
  );
}

/* ── Progress meter — labeled horizontal bar ─────────────────── */
function Meter({ pct, tone = 'accent', h = 8, track = 'var(--bg-3)' }) {
  return (
    <div style={{ width: '100%', height: h, background: track, borderRadius: 99, overflow: 'hidden' }}>
      <div style={{ width: `${Math.max(0, Math.min(100, pct))}%`, height: '100%', borderRadius: 99, background: `linear-gradient(90deg, ${cssVar(tone)}, color-mix(in srgb, ${cssVar(tone)} 55%, transparent))` }} />
    </div>
  );
}

/* ── Legend row ──────────────────────────────────────────────── */
function Legend({ items, style }) {
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '7px 18px', ...style }}>
      {items.map((it, i) => (
        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 7, fontSize: 12.5, color: 'var(--ink-2)' }}>
          <span style={{ width: 10, height: 10, borderRadius: 3, background: cssVar(it.tone) }} />
          {it.label}{it.value != null && <span style={{ fontFamily: 'var(--f-mono)', color: 'var(--ink-3)', fontSize: 11 }}>{it.value}</span>}

}

});


/* ===== gallery.jsx ===== */
/* ═══════════════════════════════════════════════════════════════
   GALLERY SHELL — the browsable library frame.
   - Top bar: theme toggle + flow toggle (desktop: text, mobile: icon).
   - Desktop: 236px left rail with grouped template index.
   - Mobile: sticky header + bottom-sheet nav drawer + a thumb-zone
     action bar (Templates / frame stepper) fixed to the bottom.
   - Stage: scales each fixed-width design to the viewport.
   - All interactive states (hover/press/focus) via gc-* classes in
     tokens.css; theme + flow preferences persist in localStorage.
   Templates self-register via window.ISG.register({...}).
   ═══════════════════════════════════════════════════════════════ */

window.ISG = window.ISG || { _reg: [], register(e) { this._reg.push(e); } };

const { useState, useEffect, useRef, useLayoutEffect } = React;

/* ── Responsive breakpoint ────────────────────────────────────── */
function useMedia(query) {
  const [matches, setMatches] = useState(() =>
    typeof window !== 'undefined' ? window.matchMedia(query).matches : false
  );
  useEffect(() => {
    const mq = window.matchMedia(query);
    const sync = () => setMatches(mq.matches);
    sync();
    mq.addEventListener('change', sync);
    window.addEventListener('resize', sync);
    // Deterministic: fires on the post-splash reflow in the bundled iframe,
    // where timing heuristics (rAF/timeout) and matchMedia 'change' can be missed.
    const ro = new ResizeObserver(sync);
    ro.observe(document.documentElement);
    return () => {
      mq.removeEventListener('change', sync);
      window.removeEventListener('resize', sync);
      ro.disconnect();
    };
  }, [query]);
  return matches;
}

/* ── Stage: scale a design of fixed `w` to the container width ───
   zoom: 'fit' (default) scales to fit the container; a number is an
   absolute scale (used by the mobile zoom control). When the scaled
   content is wider than the container, the parent .board-scroll
   scrolls horizontally. ─────────────────────────────────────────── */
function Stage({ w, h, mode, zoom = 'fit', children }) {
  const wrapRef = useRef(null);
  const innerRef = useRef(null);
  const [scale, setScale] = useState(1);
  const [dims, setDims] = useState({ w: 0, h: 0 });

  useLayoutEffect(() => {
    const measure = () => {
      if (!wrapRef.current) return;
      const cw = wrapRef.current.clientWidth;
      const fit = Math.min(cw / w, 1.0);
      const s = (zoom === 'fit' || zoom == null) ? fit : zoom;
      setScale(s);
      const contentH = mode === 'board' ? h : (innerRef.current ? innerRef.current.offsetHeight : h);
      setDims({ w: Math.round(w * s), h: Math.round(contentH * s) });
    };
    measure();
    const ro = new ResizeObserver(measure);
    if (wrapRef.current) ro.observe(wrapRef.current);
    if (innerRef.current) ro.observe(innerRef.current);
    return () => ro.disconnect();
  }, [w, h, mode, zoom, children]);

  return (
    <div ref={wrapRef} style={{ width: '100%' }}>
      <div style={{ width: dims.w || undefined, height: dims.h || undefined }}>
        <div ref={innerRef} style={{
          width: w, height: mode === 'board' ? h : undefined,
          transform: `scale(${scale})`, transformOrigin: 'top left',
        }}>
          {children}
        </div>
      </div>
    </div>
  );
}

/* Mobile zoom control — Fit / 75% / 100% for fixed-width designs */
function ZoomSeg({ value, onChange, options }) {
  return (
    <div role="group" aria-label="Zoom" style={{ display: 'inline-flex', background: 'var(--bg-2)', border: '1px solid var(--line-2)', borderRadius: 'var(--r-sm)', padding: 2, gap: 2 }}>
      {options.map(([v, lab]) => (
        <button key={String(v)} onClick={() => onChange(v)} aria-pressed={v === value} className="gc gc-press" style={{

          background: v === value ? 'var(--bg-4)' : 'transparent',
          color: v === value ? 'var(--ink)' : 'var(--ink-3)',
        }}>{lab}</button>
      ))}
    </div>
  );
}

/* ── Frame wrappers ───────────────────────────────────────────── */
function ScaledFrame({ frame, mode }) {
  const isMobile = useMedia('(max-width: 767px)');
  const [zoom, setZoom] = useState('fit');
  useEffect(() => { setZoom('fit'); }, [frame]);
  const opts = mode === 'board'
    ? [['fit', 'Fit'], [0.5, '50%'], [1, '100%']]
    : [['fit', 'Fit'], [1, '100%'], [1.25, '125%']];
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 8, marginBottom: 10 }}>
        <span style={{ fontFamily: 'var(--f-mono)', fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--ink-4)', marginRight: 'auto' }}>
          {isMobile ? 'Pinch or scroll to read · zoom' : 'Zoom to read · scroll to pan'}
        </span>
        <ZoomSeg value={zoom} onChange={setZoom} options={opts} />
      </div>
      <div className="board-scroll" style={{ border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', boxShadow: 'var(--glass-shadow)', background: 'var(--bg)' }}>
        <Stage w={frame.w} h={frame.h} mode={mode} zoom={zoom}>{frame.node}</Stage>
      </div>
    </div>
  );
}
function BoardFrame({ frame }) { return <ScaledFrame frame={frame} mode="board" />; }
function FlowFrame({ frame }) { return <ScaledFrame frame={frame} mode="flow" />; }

/* ── Search box — filters the template index ─────────────────── */

      <input
        type="search" value={value} onChange={(e) => onChange(e.target.value)} autoFocus={autoFocus}

          width: '100%', minHeight: 38, padding: '0 30px 0 32px',
          background: 'var(--bg-2)', border: '1px solid var(--line-2)', borderRadius: 'var(--r-sm)',

}

/* ── Mobile bottom-sheet nav drawer ──────────────────────────── */
function NavDrawer({ open, onClose, groups, active, onSelect, query, onQuery }) {
  const reduceMotion = useMedia('(prefers-reduced-motion: reduce)');

  useEffect(() => {
    document.body.style.overflow = open ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [open]);

  // Esc to close
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  return (
    <>
      {/* Backdrop */}
      <div
        onClick={onClose}
        style={{
          position: 'fixed', inset: 0, zIndex: 88,
          background: 'rgba(7,8,11,0.72)',
          backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)',
          opacity: open ? 1 : 0,
          pointerEvents: open ? 'auto' : 'none',
          transition: reduceMotion ? 'none' : 'opacity 0.26s ease',
        }}
      />
      {/* Sheet */}
      <div
        id="isg-nav-drawer"
        role="dialog"
        aria-modal="true"
        aria-label="Template navigation"
        style={{
        position: 'fixed', left: 0, right: 0, bottom: 0, zIndex: 92,
        maxHeight: '82vh',
        background: 'var(--bg-1)',
        borderTop: '1px solid var(--line-2)',
        borderRadius: '18px 18px 0 0',
        transform: open ? 'translateY(0)' : 'translateY(100%)',
        transition: reduceMotion ? 'none' : 'transform 0.34s cubic-bezier(0.32, 0.72, 0, 1)',
        display: 'flex', flexDirection: 'column',
        paddingBottom: 'env(safe-area-inset-bottom, 0px)',
        visibility: open ? 'visible' : 'hidden',
      }}>
        {/* Drag handle */}
        <div style={{ padding: '14px 0 10px', display: 'flex', justifyContent: 'center', flexShrink: 0 }}>
          <div style={{ width: 32, height: 4, borderRadius: 2, background: 'var(--bg-4)' }} />
        </div>
        {/* Sheet header */}
        <div style={{
          padding: '0 20px 12px', flexShrink: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          borderBottom: '1px solid var(--line)',
        }}>
          <span style={{ fontFamily: 'var(--f-mono)', fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-4)' }}>Templates</span>
          <button onClick={onClose} aria-label="Close navigation" className="gc gc-press" style={{
            background: 'var(--bg-3)', border: 'none', cursor: 'pointer',
            color: 'var(--ink-3)', width: 32, height: 32, borderRadius: '50%',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 16, lineHeight: 1,
          }}>×</button>
        </div>
        {/* Search */}
        {onQuery && (
          <div style={{ padding: '12px 20px 4px', flexShrink: 0 }}>
            <SearchBox value={query} onChange={onQuery} />
          </div>
        )}
        {/* Scrollable list */}
        <div style={{ overflowY: 'auto', padding: '6px 0 20px', flex: 1, WebkitOverflowScrolling: 'touch' }}>
          {groups.length === 0 && (
            <div style={{ padding: '12px 20px', fontFamily: 'var(--f-mono)', fontSize: 12, color: 'var(--ink-4)' }}>No templates match “{query}”.</div>
          )}
          {groups.map((g) => (
            <div key={g.name} style={{ marginBottom: 4 }}>
              <div style={{
                fontFamily: 'var(--f-mono)', fontSize: 10.5, fontWeight: 500, letterSpacing: '0.14em',
                textTransform: 'uppercase', color: 'var(--ink-4)',
                padding: '12px 20px 6px',
              }}>{g.name}</div>
              {g.items.map((it) => (
                <button key={it.id} onClick={() => { onSelect(it.id); onClose(); }}
                  className="gc gc-nav gc-press" data-active={it.id === active ? 'true' : 'false'}
                  style={{ padding: '12px 20px', fontSize: 16, minHeight: 48 }}
                  aria-current={it.id === active ? 'page' : undefined}>{it.name}</button>
              ))}
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

/* ── Mobile thumb-zone action bar ─────────────────────────────── */

/* ── Flow-dot Tweaks Panel ────────────────────────────────────── */
const FD_DEFAULTS = /*EDITMODE-BEGIN*/{
  "thick": 18,
  "len": 180,
  "glowR1": 20,
  "glowR2": 50,
  "brightness": 0.2,
  "fade1": 80,
  "fade2": 100,
  "dur": 22
}/*EDITMODE-END*/;

function FlowDotPanel() {
  const { useTweaks, TweaksPanel, TweakSection, TweakSlider } = window;
  if (!useTweaks) return null;
  const [t, setTweak] = useTweaks(FD_DEFAULTS);

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--fd-thick',      t.thick + 'px');
    r.style.setProperty('--fd-len',        t.len + 'px');
    r.style.setProperty('--fd-glow-r1',    t.glowR1 + 'px');
    r.style.setProperty('--fd-glow-r2',    t.glowR2 + 'px');
    r.style.setProperty('--fd-brightness', String(t.brightness));
    r.style.setProperty('--fd-fade1',      t.fade1 + '%');
    r.style.setProperty('--fd-fade2',      t.fade2 + '%');
    r.style.setProperty('--fd-dur',        t.dur + 's');
  }, [t.thick, t.len, t.glowR1, t.glowR2, t.brightness, t.fade1, t.fade2, t.dur]);

  return (
    <TweaksPanel title="Flow dot">
      <TweakSection label="Shape" />
      <TweakSlider label="Diameter"     value={t.thick}      min={2}   max={18}  step={1}   unit="px" onChange={(v) => setTweak('thick', v)} />
      <TweakSlider label="Tail length"  value={t.len}        min={8}   max={180} step={2}   unit="px" onChange={(v) => setTweak('len', v)} />
      <TweakSection label="Glow" />
      <TweakSlider label="Near radius"  value={t.glowR1}     min={0}   max={20}  step={0.5} unit="px" onChange={(v) => setTweak('glowR1', v)} />
      <TweakSlider label="Far radius"   value={t.glowR2}     min={0}   max={50}  step={1}   unit="px" onChange={(v) => setTweak('glowR2', v)} />
      <TweakSlider label="Brightness"   value={t.brightness} min={0.2} max={5}   step={0.1}          onChange={(v) => setTweak('brightness', v)} />
      <TweakSection label="Fade" />
      <TweakSlider label="Tail opacity" value={t.fade1}      min={0}   max={80}  step={1}   unit="%" onChange={(v) => setTweak('fade1', v)} />
      <TweakSlider label="Mid opacity"  value={t.fade2}      min={5}   max={100} step={1}   unit="%" onChange={(v) => setTweak('fade2', v)} />
      <TweakSection label="Speed" />
      <TweakSlider label="Duration"     value={t.dur}        min={1}   max={30}  step={0.5} unit="s" onChange={(v) => setTweak('dur', v)} />
    </TweaksPanel>
  );
}

/* ── App ──────────────────────────────────────────────────────── */
function App() {
  const reg = window.ISG._reg;
  const groups = [];
  reg.forEach((e) => {
    let g = groups.find((x) => x.name === e.group);
    if (!g) { g = { name: e.group, items: [] }; groups.push(g); }
    g.items.push(e);
  });

  const [active, setActive]     = useState(reg[0] ? reg[0].id : null);
  const [theme, setTheme]       = useState(() => {
    try { const t = localStorage.getItem('isgTheme'); return t === 'light' ? 'light' : 'dark'; } catch (e) { return 'dark'; }
  });
  const [frameIdx, setFrameIdx] = useState(0);
  const [navOpen, setNavOpen]   = useState(false);
  const [query, setQuery]       = useState('');
  const [flow, setFlow]         = useState(() => { try { return localStorage.getItem('isgFlow') !== 'off'; } catch (e) { return true; } });

  /* Filtered template index for the rail / drawer search */
  const q = query.trim().toLowerCase();
  const fGroups = q
    ? groups.map((g) => ({ ...g, items: g.items.filter((it) => (it.name + ' ' + g.name + ' ' + (it.blurb || '')).toLowerCase().includes(q)) })).filter((g) => g.items.length)
    : groups;

  const isMobile = useMedia('(max-width: 767px)');
  const mainRef  = useRef(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('isgTheme', theme); } catch (e) {}
  }, [theme]);
  useEffect(() => {
    document.documentElement.setAttribute('data-flowlight', flow ? 'on' : 'off');
    try { localStorage.setItem('isgFlow', flow ? 'on' : 'off'); } catch (e) {}
  }, [flow]);

  const entry    = reg.find((e) => e.id === active) || reg[0];
  const showFlow = !!entry && (entry.id === 'diagram-kit' || entry.id === 'infographics-kit');
  const frames   = entry ? entry.frames : [];
  const frame    = frames[Math.min(frameIdx, frames.length - 1)] || frames[0];

  /* Flat ordered list for prev/next template pager */
  const flatIdx  = reg.findIndex((e) => e.id === (entry ? entry.id : null));
  const prevTpl  = flatIdx > 0 ? reg[flatIdx - 1] : null;
  const nextTpl  = flatIdx >= 0 && flatIdx < reg.length - 1 ? reg[flatIdx + 1] : null;

  useEffect(() => {
    setFrameIdx(0);
    /* Return reading position to the top of the new template */
    if (mainRef.current) mainRef.current.scrollTop = 0;
    window.scrollTo(0, 0);
  }, [active]);
  useEffect(() => { if (!isMobile) setNavOpen(false); }, [isMobile]);

  const H = isMobile ? 52 : 56;

  return (
    <div className="isg-scope" style={{ minHeight: '100vh', background: 'var(--bg)', display: 'flex', flexDirection: 'column' }}>
      <div className="gl-mesh" />
      <Inspector />
      <FlowDotPanel />

      {/* Flow toggle — desktop fixed bottom-right only */}
      {showFlow && !isMobile && (
        <button onClick={() => setFlow((f) => !f)} title="Directional reading-glow" className="gc gc-press" style={{
          position: 'fixed', right: 22, bottom: 22, zIndex: 80,
          display: 'inline-flex', alignItems: 'center', gap: 9,
          fontFamily: 'var(--f-mono)', fontSize: 11, letterSpacing: '0.08em',
          padding: '9px 14px', cursor: 'pointer',
          borderRadius: 'var(--r-sm)',
          border: `1px solid ${flow ? 'var(--accent-line)' : 'var(--line-2)'}`,
          background: 'var(--glass-bg)',
          backdropFilter: 'var(--glass-blur)', WebkitBackdropFilter: 'var(--glass-blur)',
          color: flow ? 'var(--accent)' : 'var(--ink-3)',
          boxShadow: 'var(--glass-shadow)',
        }}>
          <span style={{ width: 8, height: 8, borderRadius: '50%', background: flow ? 'var(--accent)' : 'var(--ink-4)', boxShadow: flow ? '0 0 8px var(--accent)' : 'none' }} />
          FLOW · {flow ? 'ON' : 'OFF'}
        </button>
      )}

      {/* ── Header ───────────────────────────────────────────────── */}
      <header style={{
        position: 'sticky', top: 0, zIndex: 50, height: H, flexShrink: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: isMobile ? '0 16px' : '0 24px',
        background: 'var(--glass-bg)',
        backdropFilter: 'var(--glass-blur)', WebkitBackdropFilter: 'var(--glass-blur)',
        borderBottom: '1px solid var(--line)',
      }}>
        {isMobile ? (
          /* ── Mobile header: identity left, utilities right.
                Primary navigation lives in the bottom thumb bar. ── */
          <>
            <span style={{
              fontFamily: 'var(--f-sans)', fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em',
              color: 'var(--ink)', flex: 1, minWidth: 0,
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
              paddingRight: 10,
            }}>{entry ? entry.name : ''}</span>

            <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
              {showFlow && (
                <button
                  onClick={() => setFlow((f) => !f)}
                  title={`Flow light: ${flow ? 'on' : 'off'}`}
                  className="gc gc-press"
                  style={{
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    width: 36, height: 36, borderRadius: 'var(--r-sm)',
                    border: `1px solid ${flow ? 'var(--accent-line)' : 'var(--line)'}`,
                    background: flow ? 'var(--accent-soft)' : 'transparent',
                    cursor: 'pointer',
                  }}
                >
                  <span style={{ width: 7, height: 7, borderRadius: '50%', background: flow ? 'var(--accent)' : 'var(--ink-4)', boxShadow: flow ? '0 0 6px var(--accent)' : 'none', display: 'block' }} />
                </button>
              )}
              <SegCompact value={theme} onChange={setTheme} options={[['dark', '☾'], ['light', '◯']]} />
            </div>
          </>
        ) : (
          /* ── Desktop header ── */
          <>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <span style={{ fontFamily: 'var(--f-mono)', fontSize: 12, letterSpacing: '0.1em', color: 'var(--ink-2)' }}>TEMPLATE LIBRARY</span>
              <span style={{ color: 'var(--ink-4)' }}>/</span>
              <span style={{ fontSize: 13, fontWeight: 500 }}>{entry ? entry.name : ''}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <Seg value={theme} onChange={setTheme} options={[['dark', 'Dark'], ['light', 'Bright']]} />
            </div>
          </>
        )}
      </header>

      {/* Mobile drawer + thumb bar */}
      {isMobile && (
        <>
          <NavDrawer
            open={navOpen}
            onClose={() => setNavOpen(false)}
            groups={fGroups}
            query={query}
            onQuery={setQuery}
            active={active}
            onSelect={(id) => setActive(id)}
          />
          <MobileActionBar
            onOpenNav={() => setNavOpen(true)}
            frames={frames}
            frameIdx={Math.min(frameIdx, frames.length - 1)}
            onFrame={(i) => setFrameIdx(Math.max(0, Math.min(frames.length - 1, i)))}
            frameLabel={frame ? frame.label : ''}
          />
        </>
      )}

      {/* ── Body ─────────────────────────────────────────────────── */}
      <div style={{
        display: isMobile ? 'flex' : 'grid',
        flexDirection: isMobile ? 'column' : undefined,
        gridTemplateColumns: isMobile ? undefined : '216px 1fr',
        flex: 1, minHeight: 0,
      }}>

        {/* Desktop left rail */}
        {!isMobile && (
          <nav aria-label="Templates" style={{
            borderRight: '1px solid var(--line)', padding: '16px 0 60px',
            background: 'color-mix(in srgb, var(--bg-1) 60%, transparent)',
            backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)',
            overflowY: 'auto', position: 'sticky', top: H, alignSelf: 'start', height: `calc(100vh - ${H}px)`,
          }}>
            <div style={{ padding: '4px 16px 12px' }}>
              <SearchBox value={query} onChange={setQuery} />
            </div>
            {fGroups.length === 0 && (
              <div style={{ padding: '12px 22px', fontFamily: 'var(--f-mono)', fontSize: 11, color: 'var(--ink-4)', letterSpacing: '0.04em' }}>No templates match “{query}”.</div>
            )}
            {fGroups.map((g) => (
              <div key={g.name} style={{ marginBottom: 6 }}>
                <div style={{ fontFamily: 'var(--f-mono)', fontSize: 10.5, fontWeight: 500, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--ink-4)', padding: '14px 22px 6px' }}>{g.name}</div>
                {g.items.map((it) => (
                  <button key={it.id} onClick={() => setActive(it.id)}
                    className="gc gc-nav" data-active={it.id === active ? 'true' : 'false'}
                    style={{ padding: '8px 22px', fontSize: 13.5, lineHeight: 1.45 }}
                    aria-current={it.id === active ? 'page' : undefined}>{it.name}</button>
                ))}
              </div>
            ))}
          </nav>

        {/* Main viewport */}
        <main ref={mainRef} style={{ overflowY: 'auto', height: isMobile ? undefined : `calc(100vh - ${H}px)`, flex: isMobile ? 1 : undefined }}>
          <div style={{
            maxWidth: 1340, margin: '0 auto',
            padding: isMobile ? '24px 16px 132px' : '40px 30px 120px',
          }}>
            {entry && (
              <>
                <div style={{ marginBottom: 8 }}>
                  <Eyebrow>{entry.group}</Eyebrow>
                </div>
                <h1 style={{
                  fontSize: 'clamp(23px, 3.2vw, 28px)',
                  fontWeight: 600, letterSpacing: '-0.022em', lineHeight: 1.15,
                  margin: '8px 0 8px', textWrap: 'balance',
                }}>{entry.name}</h1>
                <p style={{
                  color: 'var(--ink-2)',
                  fontSize: 16,
                  maxWidth: '62ch', lineHeight: 1.65, margin: 0, textWrap: 'pretty',
                }}>{entry.blurb}</p>

                {entry.interactive && (
                  <div style={{
                    display: 'inline-flex', alignItems: 'center', gap: 9, marginTop: 16,
                    padding: '8px 14px', borderRadius: 999,
                    border: '1px solid var(--accent-line)', background: 'var(--accent-soft)',
                    color: 'var(--accent)', fontFamily: 'var(--f-mono)', fontSize: 11,

/* ═══════════════════════════════════════════════════════════════
   ISG STUDIO — presentation EDITOR built on the template library.
   The template registry (window.ISG._reg) becomes a palette of
   pre-made, scalable ELEMENTS you assemble into a deck. Plus a set
   of editable "basic" blocks for authoring text slides.

   Features: element library · slide rail (add / drag-reorder /
   duplicate / delete) · scalable canvas · Dark + Bright themes ·
   inline text editing · Present mode (keyboard nav) · PDF export
   honoring the live theme · localStorage persistence.

   Lives in the same Babel block as lib/viz/gallery/tpl-* so it

/* ── FitBox — scale a fixed-size node to fit BOTH dims of its box ── */
function FitBox({ w, h, children, pad = 0, align = 'center', maxScale = 1 }) {
  const boxRef = useRef(null);
  const [s, setS] = useState(0);
  useLayoutEffect(() => {
    const measure = () => {
      if (!boxRef.current) return;
      const cw = boxRef.current.clientWidth - pad * 2;
      const ch = boxRef.current.clientHeight - pad * 2;
      if (cw <= 0 || ch <= 0) return;
      setS(Math.min(cw / w, ch / h, maxScale));
    };
    measure();
    const ro = new ResizeObserver(measure);
    if (boxRef.current) ro.observe(boxRef.current);
    return () => ro.disconnect();
  }, [w, h, pad, maxScale]);
  return (
    <div ref={boxRef} style={{
      width: '100%', height: '100%', display: 'flex',
      alignItems: align === 'top' ? 'flex-start' : 'center',
      justifyContent: 'center', overflow: 'hidden',
    }}>
      <div style={{ width: w * s, height: h * s, flexShrink: 0 }}>
        <div style={{ width: w, height: h, transform: `scale(${s})`, transformOrigin: 'top left' }}>
          {children}
        </div>
      </div>
    </div>
  );
}

/* ── EditText — uncontrolled contentEditable (no caret jump) ────── */
function EditText({ value, onChange, editing, style, placeholder, as = 'div', multiline }) {
  const ref = useRef(null);
  const Tag = as;
  useLayoutEffect(() => {
    if (ref.current && ref.current.innerText !== (value || '')) {
      ref.current.innerText = value || '';
    }
  }, [value, editing]);
  if (!editing) {
    return <Tag style={style}>{(value || '').split('\n').map((l, i) => (
      <React.Fragment key={i}>{i > 0 && <br />}{l}</React.Fragment>
    ))}</Tag>;
  }
  return (
    <Tag
      ref={ref}
      contentEditable
      suppressContentEditableWarning
      data-ph={placeholder}
      onInput={(e) => onChange(e.currentTarget.innerText)}
      onKeyDown={(e) => {
        if (!multiline && e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); }
        e.stopPropagation();
      }}
      className="st-edit"
      style={{ ...style, outline: 'none', cursor: 'text' }}
    />
  );
}

const BASIC_BY_KEY = Object.fromEntries(BASICS.map((b) => [b.key, b]));

/* ── CATALOG — flatten registry frames into insertable elements ── */
function buildCatalog() {
  const out = [];
  (window.ISG._reg || []).forEach((e) => {
    (e.frames || []).forEach((f, i) => {
      out.push({
        key: `tpl:${e.id}:${i}`, kind: 'tpl', srcId: e.id, frameIdx: i,
        group: e.group, name: e.frames.length > 1 && f.label && f.label !== '—' ? f.label : e.name,
        sub: e.frames.length > 1 ? e.name : e.blurb,
        mode: f.mode, w: f.w, h: f.h, node: f.node,
      });
    });
  });
  return out;
}

/* ── Render any slide (basic or template) at native size ───────── */
function SlideContent({ slide, editing, onField }) {
  if (slide.kind === 'basic') {
    const def = BASIC_BY_KEY[slide.key];
    if (!def) return null;
    return def.Render({ c: slide.content || def.defaults, set: (f, v) => onField(f, v), editing });
  }
  const el = CATALOG_BY_KEY[slide.key];
  if (!el) return <MissingSlide />;
  return el.node;
}
function MissingSlide() {
  return (
    <div style={{ width: BLOCK_W, height: BLOCK_H, background: 'var(--bg-1)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--ink-4)', fontFamily: 'var(--f-mono)', letterSpacing: '0.1em' }}>
      ELEMENT UNAVAILABLE
    </div>
  );
}

/* slide dims */
function slideDims(slide) {
  if (slide.kind === 'basic') return { w: BLOCK_W, h: BLOCK_H, mode: 'board' };
  const el = CATALOG_BY_KEY[slide.key];
  if (!el) return { w: BLOCK_W, h: BLOCK_H, mode: 'board' };
  return { w: el.w, h: el.h, mode: el.mode };
}

let CATALOG = [];
let CATALOG_BY_KEY = {};

/* ════════════════════════════════════════════════════════════════
   ELEMENT LIBRARY — right panel. Grouped, searchable, click to add.
   Shows a live preview of the highlighted element.
   ════════════════════════════════════════════════════════════════ */
function ElementLibrary({ onAdd, onClose }) {
  const [q, setQ] = useState('');
  const all = useMemo(() => {
    const basics = BASICS.map((b) => ({ key: b.key, kind: 'basic', group: 'Basics', name: b.name, sub: 'Editable text slide', mode: 'board', w: BLOCK_W, h: BLOCK_H }));
    return [...basics, ...CATALOG];
  }, []);
  const filtered = all.filter((e) => !q || (e.name + ' ' + e.group + ' ' + (e.sub || '')).toLowerCase().includes(q.toLowerCase()));
  const groups = [];
  filtered.forEach((e) => {
    let g = groups.find((x) => x.name === e.group);
    if (!g) { g = { name: e.group, items: [] }; groups.push(g); }
    g.items.push(e);
  });
  const [hover, setHover] = useState(null);
  const previewKey = hover || (filtered[0] && filtered[0].key);
  const previewEl = previewKey && (BASIC_BY_KEY[previewKey] ? { kind: 'basic', key: previewKey } : CATALOG_BY_KEY[previewKey]);

  return (
    <aside className="st-lib">
      <div className="st-lib-head">
        <div className="st-eyebrow">Elements</div>
        <button className="st-icon" onClick={onClose} title="Close">✕</button>
      </div>
      <div className="st-lib-search">
        <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search elements…" className="st-search" />
      </div>
      <div className="st-lib-preview">
        {previewEl && (
          <div className="st-lib-preview-frame">
            <FitBox w={previewEl.kind === 'basic' ? BLOCK_W : previewEl.w} h={previewEl.kind === 'basic' ? BLOCK_H : previewEl.h}>
              {previewEl.kind === 'basic'
                ? BASIC_BY_KEY[previewEl.key].Render({ c: BASIC_BY_KEY[previewEl.key].defaults, set: () => {}, editing: false })
                : previewEl.node}
            </FitBox>
          </div>
        )}
      </div>
      <div className="st-lib-list">
        {groups.map((g) => (
          <div key={g.name} className="st-lib-group">
            <div className="st-lib-group-name">{g.name}</div>
            {g.items.map((e) => (
              <button key={e.key} className="st-lib-item" onMouseEnter={() => setHover(e.key)} onFocus={() => setHover(e.key)}
                onClick={() => onAdd(e.key, e.kind)}>
                <span className="st-lib-item-badge" data-mode={e.mode}>{e.mode === 'board' ? '▭' : '▤'}</span>
                <span className="st-lib-item-text">
                  <span className="st-lib-item-name">{e.name}</span>
                  {e.sub && <span className="st-lib-item-sub">{e.sub}</span>}
                </span>
                <span className="st-lib-item-add">+</span>
              </button>
            ))}
          </div>
        ))}
        {filtered.length === 0 && <div className="st-empty">No elements match “{q}”.</div>}
      </div>
    </aside>
  );
}

/* ════════════════════════════════════════════════════════════════
   SLIDE RAIL — left. Thumbnails, drag-reorder, select, context acts.
   ════════════════════════════════════════════════════════════════ */
function SlideRail({ deck, current, onSelect, onReorder, onDup, onDel, onAddClick }) {
  const [drag, setDrag] = useState(null);
  const [over, setOver] = useState(null);
  return (
    <aside className="st-rail">
      <div className="st-rail-head">
        <span className="st-eyebrow">Slides</span>
        <span className="st-rail-count">{deck.length}</span>
      </div>
      <div className="st-rail-list">
        {deck.map((slide, i) => {
          const d = slideDims(slide);
          return (
            <div key={slide.uid}
              className={'st-thumb' + (i === current ? ' is-current' : '') + (over === i ? ' is-over' : '')}
              draggable
              onDragStart={() => setDrag(i)}
              onDragOver={(e) => { e.preventDefault(); setOver(i); }}
              onDragLeave={() => setOver((o) => (o === i ? null : o))}
              onDrop={(e) => { e.preventDefault(); if (drag !== null && drag !== i) onReorder(drag, i); setDrag(null); setOver(null); }}
              onDragEnd={() => { setDrag(null); setOver(null); }}
              onClick={() => onSelect(i)}>
              <span className="st-thumb-num">{String(i + 1).padStart(2, '0')}</span>
              <div className="st-thumb-frame">
                <FitBox w={d.w} h={d.h} align={d.mode === 'flow' ? 'top' : 'center'}>
                  <SlideContent slide={slide} editing={false} onField={() => {}} />
                </FitBox>
              </div>
              <div className="st-thumb-acts">
                <button className="st-mini" title="Duplicate" onClick={(e) => { e.stopPropagation(); onDup(i); }}>⧉</button>
                <button className="st-mini" title="Delete" onClick={(e) => { e.stopPropagation(); onDel(i); }}>✕</button>
              </div>
            </div>
          );
        })}
        <button className="st-thumb-add" onClick={onAddClick}>+ Add slide</button>
      </div>
    </aside>
  );
}

/* ════════════════════════════════════════════════════════════════
   CANVAS — center. Current slide, scaled to fit, editable in place.
   ════════════════════════════════════════════════════════════════ */
function Canvas({ slide, editing, onField }) {
  if (!slide) {
    return <div className="st-canvas-empty"><div>Add an element to begin →</div></div>;
  }
  const d = slideDims(slide);
  return (
    <div className="st-canvas-wrap">
      <div className="st-canvas-card" style={{ aspectRatio: `${d.w} / ${d.h}` }}>
        <FitBox w={d.w} h={d.h} align={d.mode === 'flow' ? 'top' : 'center'}>
          <SlideContent slide={slide} editing={editing} onField={onField} />
        </FitBox>
      </div>
      <div className="st-canvas-meta">
        {slide.kind === 'basic' ? 'EDITABLE BLOCK' : (CATALOG_BY_KEY[slide.key] ? CATALOG_BY_KEY[slide.key].group.toUpperCase() : '')}
        {' · '}{d.w}{d.mode === 'board' ? '×' + d.h : 'w'} · scales to fit
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   PRESENT — fullscreen, keyboard nav, scaled to viewport.
   ════════════════════════════════════════════════════════════════ */
function Present({ deck, start, onExit }) {
  const [i, setI] = useState(start || 0);
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); setI((x) => Math.min(deck.length - 1, x + 1)); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); setI((x) => Math.max(0, x - 1)); }
      else if (e.key === 'Escape') onExit();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [deck.length, onExit]);
  const slide = deck[i];
  const d = slide ? slideDims(slide) : { w: BLOCK_W, h: BLOCK_H, mode: 'board' };
  return (
    <div className="st-present">
      <div className="st-present-stage">
        {slide && (
          <FitBox w={d.w} h={d.h} align={d.mode === 'flow' ? 'top' : 'center'}>
            <SlideContent slide={slide} editing={false} onField={() => {}} />
          </FitBox>
        )}
      </div>
      <div className="st-present-bar">
        <button className="st-present-btn" onClick={() => setI((x) => Math.max(0, x - 1))} disabled={i === 0}>←</button>
        <span className="st-present-count">{i + 1} / {deck.length}</span>
        <button className="st-present-btn" onClick={() => setI((x) => Math.min(deck.length - 1, x + 1))} disabled={i === deck.length - 1}>→</button>
        <button className="st-present-btn st-present-exit" onClick={onExit}>Esc ✕</button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   PRINT DECK — flat pages, per-page @page sizing, then print().
   Honors the live theme (rendered inside current data-theme).
   ════════════════════════════════════════════════════════════════ */
function PrintDeck({ deck, onDone }) {
  const ref = useRef(null);
  useLayoutEffect(() => {
    const root = ref.current;
    const paginate = () => {
      if (!root) return;
      const els = root.querySelectorAll('.st-print-page');
      let css = '';
      els.forEach((el, i) => {
        const w = Math.max(1, Math.round(el.firstChild.offsetWidth));
        const h = Math.max(1, Math.ceil(el.firstChild.offsetHeight));
        el.style.width = w + 'px'; el.style.height = h + 'px';
        css += `@page p${i}{size:${w}px ${h}px;margin:0}\n.st-print-page[data-p="${i}"]{page:p${i}}\n`;
      });
      let st = document.getElementById('st-dyn-pages');
      if (!st) { st = document.createElement('style'); st.id = 'st-dyn-pages'; document.head.appendChild(st); }
      st.textContent = css;
    };
    paginate();
    let done = false;
    const go = async () => {
      try { await document.fonts.ready; } catch (e) {}
      paginate();
      await new Promise((r) => setTimeout(r, 350));
      if (done) return; done = true;
      window.print();
    };
    go();
    const after = () => { document.documentElement.removeAttribute('data-studio-printing'); onDone(); };
    window.addEventListener('afterprint', after, { once: true });
    document.documentElement.setAttribute('data-studio-printing', '');
    return () => window.removeEventListener('afterprint', after);
  }, []);
  return (
    <div className="st-print-stack" ref={ref}>
      {deck.map((slide, i) => {
        const d = slideDims(slide);
        return (
          <div className="st-print-page" data-p={i} key={slide.uid}
            style={{ width: d.w, height: d.mode === 'board' ? d.h : undefined }}>
            <div style={{ width: d.w, height: d.mode === 'board' ? d.h : undefined }}>
              <SlideContent slide={slide} editing={false} onField={() => {}} />
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   TOP BAR
   ════════════════════════════════════════════════════════════════ */
function TopBar({ title, onTitle, theme, onTheme, editing, onToggleEdit, onPresent, onExport, canPresent }) {
  return (
    <header className="st-top">
      <div className="st-top-left">
        <div className="st-logo"><span className="st-logo-mark">◆</span> ISG <b>Studio</b></div>
        <span className="st-top-div" />
        <input className="st-title" value={title} onChange={(e) => onTitle(e.target.value)} spellCheck={false} />
      </div>
      <div className="st-top-right">
        <button className={'st-btn' + (editing ? ' is-on' : '')} onClick={onToggleEdit} title="Toggle text editing">
          {editing ? '● Editing text' : '✎ Edit text'}
        </button>

          {[['dark', 'Dark'], ['light', 'Bright']].map(([v, l]) => (

          ))}
