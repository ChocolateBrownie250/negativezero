/* ===== tpl-storytelling.jsx ===== */
/* ═══════════════════════════════════════════════════════════════
   DATA STORYTELLING KIT — representation that carries a message.
   Charts answer "so what", not just "what". Annotated trend ·
   big-number lede · delta compare · KPI-vs-target · ranked
   emphasis · share breakdown — each paired with a takeaway line.
   Composes the viz kit; all color via tokens; theme-aware.
   ═══════════════════════════════════════════════════════════════ */

(function () {
  const W = 1080;
  const Doc = ({ children, pad = '52px 60px 64px' }) => (
    <div className="isg-scope" style={{ width: W, background: 'var(--bg)', color: 'var(--ink)', padding: pad, position: 'relative' }}>{children}</div>
  );
  const Block = ({ children, meta }) => (
    <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', borderBottom: '1px solid var(--line)', paddingBottom: 9, marginBottom: 20, marginTop: 40 }}>
      <h3 style={{ margin: 0 }} className="t-eyebrow">{children}</h3>
      {meta && <span className="t-meta">{meta}</span>}
    </div>
  );
  const Kit = ({ name, note, children }) => (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <span className="t-meta" style={{ color: 'var(--accent)' }}>{name}</span>
        <span style={{ flex: 1, height: 1, background: 'var(--line)' }} />
        {note && <span className="t-meta" style={{ color: 'var(--ink-3)' }}>{note}</span>}
      </div>
      {children}
    </div>
  );

  /* The signature move: every chart states its conclusion in words. */
  const Takeaway = ({ children, tone = 'accent' }) => (
    <div style={{ display: 'flex', gap: 11, alignItems: 'flex-start', marginTop: 16 }}>
      <span style={{ width: 22, height: 2, background: toneColor(tone), marginTop: 9, flexShrink: 0 }} />
      <div style={{ fontSize: 14, lineHeight: 1.5, color: 'var(--ink)', fontWeight: 500, textWrap: 'pretty' }}>{children}</div>
    </div>
  );
  const Panel = ({ children, style }) => (
    <div style={{ background: 'var(--grad-surface)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '22px 24px', boxShadow: 'var(--elev-1)', position: 'relative', overflow: 'hidden', ...style }}>
      <div style={{ position: 'absolute', inset: 0, background: 'var(--grad-sheen)', pointerEvents: 'none' }} />
      <div style={{ position: 'relative' }}>{children}</div>
    </div>
  );

  /* ── 1 · ANNOTATED TREND — area chart that points at the moment ─ */
  function AnnotatedTrend({ data, labels, annIndex, annText, tone = 'd-2', w = 600, h = 210 }) {
    const max = Math.max(...data) * 1.12, min = Math.min(0, ...data), rng = (max - min) || 1;
    const padL = 8, padB = 24, padT = 26;
    const X = (i) => padL + (i / (data.length - 1)) * (w - padL * 2);
    const Y = (v) => padT + (1 - (v - min) / rng) * (h - padT - padB);
    const pts = data.map((v, i) => [X(i), Y(v)]);
    const line = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    const fill = `${line} L${X(data.length - 1).toFixed(1)},${Y(min)} L${padL},${Y(min)} Z`;
    const c = `var(--${tone})`;
    const ax = X(annIndex), ay = Y(data[annIndex]);
    return (
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: 'block', overflow: 'visible' }}>
        <defs><linearGradient id="atrend" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity="0.32" /><stop offset="100%" stopColor={c} stopOpacity="0.02" /></linearGradient></defs>
        {[0, 1, 2, 3].map((i) => { const y = padT + (i / 3) * (h - padT - padB); return <line key={i} x1={padL} y1={y} x2={w - padL} y2={y} stroke="var(--line)" strokeWidth="1" />; })}
        <path d={fill} fill="url(#atrend)" />
        <path d={line} fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {/* annotation guide + marker */}
        <line x1={ax} y1={ay} x2={ax} y2={h - padB} stroke="var(--accent)" strokeWidth="1.3" strokeDasharray="4,3" opacity="0.8" />
        <circle cx={ax} cy={ay} r="5" fill="var(--accent)" stroke="var(--bg-1)" strokeWidth="2" />
        <g transform={`translate(${Math.min(ax + 10, w - 184)}, 6)`}>
          <rect x="0" y="0" width="178" height="34" rx="7" fill="var(--bg-1)" stroke="var(--accent-line)" />
          <rect x="0" y="0" width="3" height="34" rx="1.5" fill="var(--accent)" />
          <text x="12" y="14" fill="var(--accent)" style={{ fontFamily: 'var(--f-mono)', fontSize: 8.5, letterSpacing: '0.12em' }}>INFLECTION</text>
          <text x="12" y="27" fill="var(--ink)" style={{ fontFamily: 'var(--f-sans)', fontSize: 12.5, fontWeight: 600 }}>{annText}</text>
        </g>
        {labels && labels.map((l, i) => <text key={i} x={X(i)} y={h - 6} textAnchor="middle" fill="var(--ink-4)" style={{ fontFamily: 'var(--f-mono)', fontSize: 11.5 }}>{l}</text>)}
      </svg>
    );
  }

  /* ── 2 · BIG-NUMBER LEDE — lead with the headline figure ──── */
  function BigNumberLede({ value, delta, deltaTone = 'ok', label, context, spark, tone = 'd-2' }) {
    return (
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 20 }}>
        <div>
          <div className="t-meta">{label}</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginTop: 8 }}>
            <span className="t-num" style={{ fontSize: 60, lineHeight: 0.9 }}>{value}</span>
            {delta && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontFamily: 'var(--f-mono)', fontSize: 13, padding: '4px 10px', borderRadius: 99, background: `var(--${deltaTone}-bg)`, border: `1px solid var(--${deltaTone}-line)`, color: `var(--${deltaTone})` }}>{delta}</span>}
          </div>
          <div className="t-small" style={{ marginTop: 10, maxWidth: '46ch' }}>{context}</div>
        </div>
        {spark && <div style={{ paddingTop: 24 }}><Sparkline data={spark} tone={tone} w={160} h={56} /></div>}
      </div>
    );
  }

  /* ── 3 · DELTA COMPARE — before → after, change made explicit ─ */
  function DeltaCompare({ before, after, beforeLabel, afterLabel, change, tone = 'ok' }) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
        <div style={{ flex: 1, textAlign: 'center', background: 'var(--bg-2)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '18px 16px' }}>
          <div className="t-meta">{beforeLabel}</div>
          <div className="t-num" style={{ fontSize: 36, color: 'var(--ink-3)', marginTop: 8 }}>{before}</div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, flexShrink: 0 }}>
          <svg width="40" height="16" viewBox="0 0 40 16"><path d="M2,8 H32" stroke={`var(--${tone})`} strokeWidth="2" /><path d="M27,3 L34,8 L27,13" fill="none" stroke={`var(--${tone})`} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
          <span style={{ fontFamily: 'var(--f-mono)', fontSize: 13, fontWeight: 600, color: `var(--${tone})` }}>{change}</span>
        </div>
        <div style={{ flex: 1, textAlign: 'center', background: `var(--${tone}-bg)`, border: `1px solid var(--${tone}-line)`, borderRadius: 'var(--r-lg)', padding: '18px 16px' }}>
          <div className="t-meta" style={{ color: `var(--${tone})` }}>{afterLabel}</div>
          <div className="t-num" style={{ fontSize: 36, color: 'var(--ink)', marginTop: 8 }}>{after}</div>
        </div>
      </div>
    );
  }

  /* ── 4 · KPI vs TARGET — bullet bar with goal marker ──────── */
  function KPIvTarget({ rows }) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        {rows.map((r, i) => {
          const hit = r.actual >= r.target;
          const tone = hit ? 'ok' : 'warn';
          return (
            <div key={i} style={{ display: 'grid', gridTemplateColumns: '140px 1fr 96px', alignItems: 'center', gap: 16 }}>
              <span style={{ fontSize: 13, color: 'var(--ink-2)' }}>{r.label}</span>
              <div style={{ position: 'relative', height: 20, background: 'var(--bg-3)', borderRadius: 99 }}>
                <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: `${Math.min(100, r.actual)}%`, borderRadius: 99, background: `linear-gradient(90deg, var(--${tone}), color-mix(in srgb, var(--${tone}) 55%, transparent))` }} />
                <div style={{ position: 'absolute', left: `${Math.min(100, r.target)}%`, top: -4, bottom: -4, width: 2, background: 'var(--ink)', borderRadius: 1 }} title="target" />
              </div>
              <span style={{ fontFamily: 'var(--f-mono)', fontSize: 13.5, textAlign: 'right', color: `var(--${tone})` }}>{r.actual}% <span style={{ color: 'var(--ink-4)' }}>/ {r.target}</span></span>
            </div>
          );
        })}
      </div>
    );
  }

  /* ── 5 · RANKED EMPHASIS — one bar carries the point ──────── */
  function RankedEmphasis({ items }) {
    const max = Math.max(...items.map((i) => i.value)) || 1;
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {items.map((it, i) => {
          const tone = it.hero ? 'accent' : 'd-2';
          return (
            <div key={i} style={{ display: 'grid', gridTemplateColumns: '150px 1fr 64px', alignItems: 'center', gap: 14 }}>
              <span style={{ fontSize: 13, fontWeight: it.hero ? 600 : 400, color: it.hero ? 'var(--accent)' : 'var(--ink-2)' }}>{it.label}</span>
              <div style={{ height: 26, background: 'var(--bg-3)', borderRadius: 'var(--r-sm)', overflow: 'hidden' }}>
                <div style={{ width: `${(it.value / max) * 100}%`, height: '100%', background: it.hero ? 'var(--accent-grad)' : `color-mix(in srgb, var(--d-2) 55%, transparent)`, opacity: it.hero ? 1 : 0.7 }} />
              </div>
              <span className="t-num" style={{ fontSize: 16, textAlign: 'right', color: it.hero ? 'var(--accent)' : 'var(--ink-2)' }}>{it.display || it.value}</span>
            </div>
          );
        })}
      </div>
    );
  }

  /* ── FRAME 1 · STORYTELLING ELEMENTS ──────────────────────── */
  const libFrame = (
    <Doc>
      <div style={{ position: 'absolute', inset: 0, background: 'var(--ambient)', pointerEvents: 'none' }} />
      <div style={{ position: 'relative' }}>
        <div className="t-eyebrow">Data Storytelling · Elements</div>
        <h1 className="t-display" style={{ fontSize: 'clamp(36px,3.8vw,52px)', margin: '14px 0 12px' }}>A chart should<br /><span style={{ color: 'var(--accent)' }}>argue, not just plot.</span></h1>
        <p className="t-lead">Each element below pairs a representation with the sentence it proves. Lead with the number, point at the moment that matters, and always close with the takeaway. Raw chart primitives live in the viz kit — these are the framed, message-first versions.</p>
      </div>

      <Block meta="TREND">Annotated trend</Block>
      <Kit name="AnnotatedTrend" note="USE WHEN · one moment changed the curve">
        <Panel>
          <div className="t-meta" style={{ marginBottom: 6 }}>[ Metric ] · [ period ]</div>
          <AnnotatedTrend data={[8, 9, 11, 10, 13, 15, 14, 18, 24, 31, 38, 44]} labels={['J', 'F', 'M', 'A', 'M', 'J', 'J', 'A', 'S', 'O', 'N', 'D']} annIndex={8} annText="[ launch shipped ]" tone="d-2" />
          <Takeaway>[ State the conclusion the curve proves — e.g. "growth re-accelerated the month the new product shipped, not before." ]</Takeaway>
        </Panel>
      </Kit>

      <Block meta="HEADLINE">Big-number lede</Block>
      <Kit name="BigNumberLede" note="USE WHEN · one figure is the story">
        <Panel>
          <BigNumberLede label="[ Headline metric ]" value="[ 142% ]" delta="↑ [ +38pt ]" deltaTone="ok" context="[ One line of context that makes the number mean something — versus what, since when, compared to whom. ]" spark={[3, 4, 4, 5, 7, 9, 12, 16]} tone="d-3" />
          <Takeaway tone="d-3">[ The so-what: why this number changes the decision in front of the reader. ]</Takeaway>
        </Panel>
      </Kit>

      <Block meta="CHANGE">Delta &amp; KPI vs target</Block>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, alignItems: 'start' }}>
        <Kit name="DeltaCompare" note="USE WHEN · before → after impact">
          <Panel>
            <DeltaCompare beforeLabel="[ Before ]" before="[ 4.2s ]" afterLabel="[ After ]" after="[ 0.9s ]" change="−79%" tone="ok" />
            <Takeaway tone="ok">[ Name the intervention and the result in one breath. ]</Takeaway>
          </Panel>
        </Kit>
        <Kit name="KPIvTarget" note="USE WHEN · performance against a goal">
          <Panel>
            <KPIvTarget rows={[
              { label: '[ Adoption ]', actual: 82, target: 70 },
              { label: '[ Retention ]', actual: 61, target: 75 },
              { label: '[ NPS ]', actual: 90, target: 80 },
            ]} />
            <Takeaway>[ Call out the one bar that missed — that’s the conversation. ]</Takeaway>
          </Panel>
        </Kit>
      </div>

      <Block meta="RANKING & MIX">Ranked emphasis &amp; share</Block>
      <div style={{ display: 'grid', gridTemplateColumns: '1.25fr 1fr', gap: 20, alignItems: 'start' }}>
        <Kit name="RankedEmphasis" note="USE WHEN · one item dominates">
          <Panel>
            <RankedEmphasis items={[
              { label: '[ Segment A ]', value: 64, display: '[ 64% ]', hero: true },
              { label: '[ Segment B ]', value: 21, display: '[ 21% ]' },
              { label: '[ Segment C ]', value: 9, display: '[ 9% ]' },
              { label: '[ Segment D ]', value: 6, display: '[ 6% ]' },
            ]} />
            <Takeaway>[ Lead with the leader; the long tail is context, not the headline. ]</Takeaway>
          </Panel>
        </Kit>
        <Kit name="Donut + Legend" note="USE WHEN · composition of a whole">
          <Panel>
            <div style={{ display: 'flex', alignItems: 'center', gap: 22 }}>
              <Donut size={132} thick={18} center="[ 64% ]" sub="share"
                segments={[{ value: 64, tone: 'accent' }, { value: 21, tone: 'd-2' }, { value: 9, tone: 'd-4' }, { value: 6, tone: 'd-5' }]} />
              <Legend items={[{ label: '[ A ]', tone: 'accent', value: '64%' }, { label: '[ B ]', tone: 'd-2', value: '21%' }, { label: '[ C ]', tone: 'd-4', value: '9%' }, { label: '[ D ]', tone: 'd-5', value: '6%' }]} style={{ flexDirection: 'column', gap: 9 }} />
            </div>
            <Takeaway>[ Emphasize one slice in coral; the rest recede to muted hues. ]</Takeaway>
          </Panel>
        </Kit>
      </div>
    </Doc>
  );

  /* ── FRAME 2 · STORYTELLING PLAYBOOK ──────────────────────── */
  const choose = [
    ['A single figure is the headline', 'Big-number lede', 'One value, one delta, one line of context. No chart needed.', 'd-3'],
    ['A trend turned at a moment', 'Annotated trend', 'Plot the line, then mark and name the inflection. Don’t make readers hunt.', 'd-2'],
    ['Something changed before→after', 'Delta compare', 'Two values + the % change + the cause. Direction colored by good/bad.', 'ok'],
    ['Performance against a goal', 'KPI vs target', 'Bar = actual, tick = target. Green clears, amber misses.', 'warn'],
    ['One category dominates', 'Ranked emphasis', 'Sort descending, highlight the leader in coral, mute the tail.', 'accent'],
    ['Parts of a whole', 'Donut + legend', 'Use for 2–5 slices only; emphasize one. Beyond five, switch to a bar.', 'd-5'],
  ];
  const rules = [
    ['Lead with the takeaway', 'Title the chart with the conclusion ("Growth re-accelerated"), not the dimension ("Revenue by month").'],
    ['One message per chart', 'If a chart needs two sentences to explain, it’s two charts. Split before you stack.'],
    ['Annotate the point', 'Mark the moment, slice or bar that matters. An unannotated chart makes the reader do your job.'],
    ['Label directly', 'Put labels on the data, not in a far-off key. Legends are a last resort, never the first.'],
    ['Be honest with the axis', 'Start bars at zero. Don’t truncate to exaggerate. Credibility is the whole point of a number.'],
    ['Mute everything but the point', 'Coral for the subject, one muted hue for context. Color spent everywhere signals nothing.'],
  ];
  const guideFrame = (
    <Doc>
      <div className="t-eyebrow">Data Storytelling · Playbook</div>
      <h1 className="t-h1" style={{ margin: '12px 0 8px' }}>Make the data talk</h1>
      <p className="t-lead" style={{ fontSize: 16 }}>Pick the representation from the message, then enforce the six rules. The goal is a reader who gets the point without reading the axis.</p>

      <Block meta="MESSAGE → REPRESENTATION">Decision guide</Block>
      <div style={{ border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', overflow: 'hidden', boxShadow: 'var(--elev-1)' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '260px 180px 1fr', background: 'var(--bg-2)', borderBottom: '1px solid var(--line)' }}>
          {['When the message is…', 'Use', 'How to apply it'].map((h, i) => <div key={i} style={{ padding: '11px 18px', borderLeft: i ? '1px solid var(--line)' : 'none' }} className="t-meta">{h}</div>)}
        </div>
        {choose.map(([msg, use, how, tone], i) => (
          <div key={i} style={{ display: 'grid', gridTemplateColumns: '260px 180px 1fr', borderBottom: i < choose.length - 1 ? '1px solid var(--line)' : 'none' }}>
            <div style={{ padding: '13px 18px', fontSize: 13.5, color: 'var(--ink)' }}>{msg}</div>
            <div style={{ padding: '13px 18px', borderLeft: '1px solid var(--line)', display: 'flex', alignItems: 'center', gap: 8 }}><Dot tone={tone} size={7} /><span style={{ fontSize: 13, fontWeight: 600, color: toneColor(tone) }}>{use}</span></div>
            <div style={{ padding: '13px 18px', borderLeft: '1px solid var(--line)' }} className="t-small">{how}</div>
          </div>
        ))}
      </div>

      <Block meta="6 RULES">Rules for honest, legible data</Block>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
        {rules.map(([t, d], i) => (
          <div key={i} style={{ background: 'var(--grad-surface)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '18px 20px', boxShadow: 'var(--elev-1)' }}>
            <div className="t-num" style={{ fontSize: 22, color: 'var(--accent)', opacity: 0.5 }}>{String(i + 1).padStart(2, '0')}</div>
            <div className="t-h3" style={{ fontSize: 15, margin: '8px 0 6px' }}>{t}</div>
            <div className="t-small" style={{ lineHeight: 1.5 }}>{d}</div>
          </div>
        ))}
      </div>
    </Doc>
  );

  window.ISG.register({
    id: 'data-storytelling', group: 'Data storytelling', name: 'Message-first charts',
    blurb: 'Representation that argues a point: annotated trend, big-number lede, before→after delta, KPI-vs-target bullet bars, ranked emphasis and an emphasized share donut — each paired with a takeaway line. A playbook frame maps message → representation and sets six rules for honest, legible data.',
    frames: [
      { label: 'Storytelling elements', mode: 'flow', w: W, node: libFrame },
      { label: 'Storytelling playbook', mode: 'flow', w: W, node: guideFrame },
    ],
  });
})();


/* ===== tpl-infographics.jsx ===== */
/* ═══════════════════════════════════════════════════════════════
   INFOGRAPHICS KIT — high-glance, standalone visual facts.
   Icon-stat tiles · numbered step ribbon · pictograph unit grid ·
   head-to-head bars · milestone timeline · stat band. Built for
   moments where a reader skims, not studies. Each block carries a
   best-practice note. All color via tokens; theme-aware.
   ═══════════════════════════════════════════════════════════════ */

(function () {
  const W = 1080;
  const Doc = ({ children, pad = '52px 60px 64px' }) => (
    <div className="isg-scope" style={{ width: W, background: 'var(--bg)', color: 'var(--ink)', padding: pad, position: 'relative' }}>{children}</div>
  );
  const Block = ({ children, meta }) => (
    <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', borderBottom: '1px solid var(--line)', paddingBottom: 9, marginBottom: 20, marginTop: 40 }}>
      <h3 style={{ margin: 0 }} className="t-eyebrow">{children}</h3>
      {meta && <span className="t-meta">{meta}</span>}
    </div>
  );
  const Kit = ({ name, note, children }) => (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <span className="t-meta" style={{ color: 'var(--accent)' }}>{name}</span>
        <span style={{ flex: 1, height: 1, background: 'var(--line)' }} />
        {note && <span className="t-meta" style={{ color: 'var(--ink-3)' }}>{note}</span>}
      </div>
      {children}
    </div>
  );

  /* Abstract geometric mark — NOT illustrative. Encodes category only. */
  function Mark({ shape = 'ring', tone = 'accent', size = 40 }) {
    const c = `var(--${tone})`; const s = size;
    const inner = {
      ring: <circle cx={s / 2} cy={s / 2} r={s / 2 - 4} fill="none" stroke={c} strokeWidth="3" />,
      dot: <circle cx={s / 2} cy={s / 2} r={s / 4} fill={c} />,
      bars: <g>{[0, 1, 2].map((i) => <rect key={i} x={6 + i * (s / 4)} y={s - 6 - (i + 1) * (s / 5)} width={s / 7} height={(i + 1) * (s / 5)} rx="1.5" fill={c} />)}</g>,
      up: <path d={`M${s / 2},6 L${s - 7},${s - 8} L7,${s - 8} Z`} fill="none" stroke={c} strokeWidth="3" strokeLinejoin="round" />,
      grid: <g>{[0, 1].flatMap((r) => [0, 1].map((cc) => <rect key={`${r}${cc}`} x={8 + cc * (s / 2.4)} y={8 + r * (s / 2.4)} width={s / 4} height={s / 4} rx="2" fill={c} opacity={r + cc === 0 ? 1 : 0.5} />))}</g>,
      arrow: <g><path d={`M7,${s / 2} H${s - 8}`} stroke={c} strokeWidth="3" strokeLinecap="round" /><path d={`M${s - 16},${s / 2 - 7} L${s - 7},${s / 2} L${s - 16},${s / 2 + 7}`} fill="none" stroke={c} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" /></g>,
    }[shape];
    return (
      <div style={{ width: s + 16, height: s + 16, borderRadius: 'var(--r)', background: `var(--${tone}-soft)`, border: `1px solid var(--${tone}-line)`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>{inner}</svg>
      </div>
    );
  }

  /* ── 1 · ICON-STAT TILE ───────────────────────────────────── */
  function IconStat({ shape, tone = 'accent', value, label, delta, deltaTone, detail }) {
    const clickable = !!detail;
    const fire = (e) => { e.stopPropagation(); openInspector(detail); };
    const extra = clickable ? {
      className: 'ix ix-lift', role: 'button', tabIndex: 0, onClick: fire,
      onKeyDown: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fire(e); } },
    } : {};
    return (
      <div {...extra} style={{ flex: 1, background: 'var(--grad-surface)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '20px 22px', boxShadow: 'var(--elev-1)', display: 'flex', flexDirection: 'column', gap: 14, position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, background: 'var(--grad-sheen)', pointerEvents: 'none' }} />
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'relative' }}>
          <Mark shape={shape} tone={tone} size={34} />
          {delta && <span style={{ fontFamily: 'var(--f-mono)', fontSize: 12, padding: '3px 9px', borderRadius: 99, background: `var(--${deltaTone || 'ok'}-bg)`, border: `1px solid var(--${deltaTone || 'ok'}-line)`, color: `var(--${deltaTone || 'ok'})` }}>{delta}</span>}
        </div>
        <div style={{ position: 'relative' }}>
          <div className="t-num" style={{ fontSize: 34, lineHeight: 1, color: 'var(--ink)', whiteSpace: 'nowrap' }}>{value}</div>
          <div className="t-small" style={{ marginTop: 6 }}>{label}</div>
        </div>
        {clickable && <span className="ix-cue" aria-hidden="true" style={{ top: 'auto', bottom: 12, right: 12 }}>+</span>}
      </div>
    );
  }

  /* ── 2 · STEP RIBBON — big numerals, connected ────────────── */
  function StepRibbon({ steps }) {
    const tones = ['d-1', 'd-2', 'd-3', 'd-4'];
    return (
      <div style={{ display: 'flex', alignItems: 'stretch', gap: 14, position: 'relative' }}>
        {steps.map((s, i) => {
          const t = tones[i % tones.length];
          return (
            <div key={i} style={{ flex: 1, position: 'relative', paddingTop: 8 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 46, height: 46, borderRadius: '50%', background: `var(--${t}-soft)`, border: `1.5px solid var(--${t}-line)`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <span className="t-num" style={{ fontSize: 22, color: `var(--${t})` }}>{i + 1}</span>
                </div>
                {i < steps.length - 1 && <div style={{ flex: 1, height: 2, background: `linear-gradient(90deg, var(--${t}-line), var(--line))` }} />}
              </div>
              <div className="t-h3" style={{ fontSize: 15, marginTop: 14 }}>{s.title}</div>
              <div className="t-small" style={{ marginTop: 5, lineHeight: 1.45 }}>{s.sub}</div>
            </div>
          );
        })}
      </div>
    );
  }

  /* ── 3 · PICTOGRAPH — countable units (X in Y) ────────────── */
  function Pictograph({ filled, total = 10, tone = 'accent', cols = 10, label }) {
    return (
      <div>
        <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols}, 1fr)`, gap: 7, maxWidth: cols * 26 }}>
          {Array.from({ length: total }).map((_, i) => (
            <span key={i} style={{ width: 18, height: 18, borderRadius: 5, background: i < filled ? `var(--${tone})` : 'var(--bg-3)', border: i < filled ? `1px solid var(--${tone})` : '1px solid var(--line)', boxShadow: i < filled ? `0 0 0 3px var(--${tone}-soft)` : 'none' }} />
          ))}
        </div>
        {label && <div className="t-small" style={{ marginTop: 14 }}><span className="t-num" style={{ fontSize: 20, color: `var(--${tone})` }}>{filled}</span> <span style={{ color: 'var(--ink-4)' }}>/ {total}</span> &nbsp;{label}</div>}
      </div>
    );
  }

  /* ── 4 · HEAD-TO-HEAD — diverging comparison bars ─────────── */
  function HeadToHead({ a, b, rows }) {
    const max = Math.max(...rows.flatMap((r) => [r.a, r.b])) || 1;
    return (
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Dot tone="accent" size={8} /><span className="t-h3" style={{ fontSize: 14, color: 'var(--accent)' }}>{a}</span></div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span className="t-h3" style={{ fontSize: 14, color: 'var(--d-2)' }}>{b}</span><Dot tone="d-2" size={8} /></div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {rows.map((r, i) => (
            <div key={i}>
              <div style={{ textAlign: 'center', fontFamily: 'var(--f-mono)', fontSize: 10.5, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-4)', marginBottom: 5 }}>{r.label}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ flex: 1, display: 'flex', justifyContent: 'flex-end' }}>
                  <div style={{ width: `${(r.a / max) * 100}%`, height: 18, background: 'var(--accent-grad)', borderRadius: '4px 0 0 4px' }} />
                </div>
                <span className="t-num" style={{ fontSize: 13, width: 44, textAlign: 'right', color: 'var(--accent)' }}>{r.a}</span>
                <span style={{ width: 1, height: 22, background: 'var(--line-2)' }} />
                <span className="t-num" style={{ fontSize: 13, width: 44, color: 'var(--d-2)' }}>{r.b}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ width: `${(r.b / max) * 100}%`, height: 18, background: 'color-mix(in srgb, var(--d-2) 65%, transparent)', borderRadius: '0 4px 4px 0' }} />
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ── 5 · MILESTONE TIMELINE ───────────────────────────────── */
  function Timeline({ milestones }) {
    const tones = ['d-1', 'd-2', 'd-3', 'd-4', 'd-5'];
    return (
      <div style={{ position: 'relative', paddingTop: 4 }}>
        <div style={{ position: 'absolute', left: 0, right: 0, top: 30, height: 2, background: 'var(--line-2)' }} />
        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
          {milestones.map((m, i) => {
            const t = tones[i % tones.length];
            return (
              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', position: 'relative', padding: '0 8px' }}>
                <span style={{ fontFamily: 'var(--f-mono)', fontSize: 11, letterSpacing: '0.08em', color: `var(--${t})`, marginBottom: 12 }}>{m.date}</span>
                <span style={{ width: 16, height: 16, borderRadius: '50%', background: `var(--${t})`, border: '3px solid var(--bg)', boxShadow: `0 0 0 3px var(--${t}-soft)`, zIndex: 1 }} />
                <span className="t-h3" style={{ fontSize: 14, marginTop: 14 }}>{m.title}</span>
                <span className="t-small" style={{ marginTop: 4, lineHeight: 1.4 }}>{m.sub}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  /* ── 6 · STAT BAND — headline figures, divided ────────────── */
  function StatBand({ stats }) {
    return (
      <div style={{ display: 'flex', background: 'var(--grad-well)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', boxShadow: 'var(--elev-1)', overflow: 'hidden', position: 'relative' }}>
        <FlowEdge dur={9} />
        {stats.map((s, i) => (
            <div key={i} style={{ flex: 1, padding: '22px 26px', borderLeft: i ? '1px solid var(--line)' : 'none', display: 'flex', flexDirection: 'column', gap: 6 }}>
            <span className="t-num" style={{ fontSize: 34, lineHeight: 1, color: s.tone ? `var(--${s.tone})` : 'var(--ink)' }}>{s.value}</span>
            <span className="t-meta">{s.label}</span>
          </div>
        ))}
      </div>
    );
  }

  /* ── FRAME 1 · INFOGRAPHIC ELEMENTS ───────────────────────── */
  const libFrame = (
    <Doc>
      <div style={{ position: 'absolute', inset: 0, background: 'var(--ambient)', pointerEvents: 'none' }} />
      <div style={{ position: 'relative' }}>
        <div className="t-eyebrow">Infographics · Elements</div>
        <h1 className="t-display" style={{ fontSize: 'clamp(36px,3.8vw,52px)', margin: '14px 0 12px' }}>Facts built<br /><span style={{ color: 'var(--accent)' }}>for a glance.</span></h1>
        <p className="t-lead">Standalone visual facts for covers, dividers and summary moments — read in two seconds, no axis required. Marks stay abstract and encode category only; the number always leads. Keep these sparse: an infographic that needs studying has failed.</p>
      </div>

      <Block meta="HEADLINE TILES">Icon-stat tiles &amp; band</Block>
      <div style={{ display: 'flex', gap: 14 }}>
        <Kit name="IconStat ×3" note="USE WHEN · 2–4 hero metrics · click a tile"><div style={{ display: 'flex', gap: 14 }}>
          <IconStat shape="up" tone="accent" value="[ 142% ]" label="[ YoY growth ]" delta="↑" deltaTone="ok"
            detail={{ kicker: 'Metric · YoY growth', title: '[ 142% ]', tone: 'accent', sub: '[ YoY growth ]', body: ['Tiles can carry their own detail — click to expand the figure with context, source and a link.'], stats: [{ k: 'Period', v: '[ TTM ]' }, { k: 'Source', v: '[ … ]' }], links: [{ label: 'See the data', href: '#', primary: true }] }} />
          <IconStat shape="bars" tone="d-2" value="[ 4.8M ]" label="[ ARR ]"
            detail={{ kicker: 'Metric · ARR', title: '[ 4.8M ]', tone: 'd-2', sub: '[ annual recurring revenue ]', body: ['Replace with how the figure is defined and measured.'], stats: [{ k: 'As of', v: '[ date ]' }] }} />
          <IconStat shape="ring" tone="d-3" value="[ 19 ]" label="[ mo runway ]"
            detail={{ kicker: 'Metric · Runway', title: '[ 19 months ]', tone: 'd-3', sub: '[ at current burn ]', body: ['Context for the number.'] }} />
        </div></Kit>
      </div>
      <div style={{ marginTop: 22 }}>
        <Kit name="StatBand" note="USE WHEN · a divider strip of numbers">
          <StatBand stats={[
            { value: '[ 8,400+ ]', label: 'Data points / run', tone: 'd-1' },
            { value: '[ 3 ]', label: 'Deploy modes', tone: 'd-2' },
            { value: '[ <1s ]', label: 'P95 latency', tone: 'd-3' },
            { value: '[ 99.9% ]', label: 'Uptime', tone: 'd-4' },
          ]} />
        </Kit>
      </div>

      <Block meta="SEQUENCE">Step ribbon</Block>
      <Kit name="StepRibbon" note="USE WHEN · a how-it-works in 3–4 beats">
        <StepRibbon steps={[
          { title: '[ Connect ]', sub: '[ point at any source ]' },
          { title: '[ Collect ]', sub: '[ one stateless agent ]' },
          { title: '[ Normalize ]', sub: '[ portable JSON ]' },
          { title: '[ Act ]', sub: '[ dashboards & alerts ]' },
        ]} />
      </Kit>

      <Block meta="PROPORTION">Pictograph &amp; head-to-head</Block>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.3fr', gap: 28, alignItems: 'center' }}>
        <Kit name="Pictograph" note="USE WHEN · a countable ratio (X in Y)">
          <Pictograph filled={7} total={10} tone="accent" label="[ of teams ship weekly ]" />
        </Kit>
        <Kit name="HeadToHead" note="USE WHEN · us vs them, few metrics">
          <HeadToHead a="[ Us ]" b="[ Incumbent ]" rows={[
            { label: '[ Setup ]', a: 9, b: 4 },
            { label: '[ Coverage ]', a: 8, b: 6 },
            { label: '[ Cost ]', a: 9, b: 3 },
          ]} />
        </Kit>
      </div>

      <Block meta="TIME">Milestone timeline</Block>
      <Kit name="Timeline" note="USE WHEN · a roadmap or history">
        <Timeline milestones={[
          { date: '[ Q1 ]', title: '[ Seed ]', sub: '[ first design partners ]' },
          { date: '[ Q2 ]', title: '[ GA ]', sub: '[ self-serve launch ]' },
          { date: '[ Q3 ]', title: '[ Scale ]', sub: '[ enterprise tier ]' },
          { date: '[ Q4 ]', title: '[ Expand ]', sub: '[ new category ]' },
        ]} />
      </Kit>
    </Doc>
  );

  /* ── FRAME 2 · INFOGRAPHIC PLAYBOOK ───────────────────────── */
  const choose = [
    ['Anchor a cover or section', 'Stat band / IconStat', 'A row of 3–4 hero numbers. One unit each, mono labels beneath.', 'd-1'],
    ['Explain how something works', 'Step ribbon', 'Three or four numbered beats, left→right. One verb per step.', 'd-2'],
    ['Show a ratio you can count', 'Pictograph', 'Units out of a whole ("7 in 10"). Keep totals to 10 or 20.', 'accent'],
    ['Position against a rival', 'Head-to-head', 'Diverging bars, your side in coral. 3–5 metrics, no more.', 'd-3'],
    ['Lay out a roadmap or history', 'Timeline', 'Evenly spaced milestones on one rail; date above, title below.', 'd-4'],
    ['Carry a single dramatic figure', 'IconStat', 'One mark, one number, one delta. Let whitespace do the work.', 'd-5'],
  ];
  const rules = [
    ['The number leads', 'Headline figure first and largest; label and mark support it. If the eye lands on the icon, resize.'],
    ['Marks encode, never illustrate', 'Abstract geometry tied to category — no clip-art, no literal pictures. The system stays instrumented.'],
    ['Round for the glance', 'Infographics are for skimming: "~140%", "8K+", "<1s". Save the exact figure for the table.'],
    ['Three to five, then stop', 'A glanceable unit holds a handful of items. More than five and it becomes a chart — move it.'],
    ['One accent, rest muted', 'Coral marks the one fact that matters; supporting facts take quiet diagram hues.'],
    ['Air is a feature', 'Generous spacing is what separates an infographic from a dashboard. Don’t fill every gap.'],
  ];
  const guideFrame = (
    <Doc>
      <div className="t-eyebrow">Infographics · Playbook</div>
      <h1 className="t-h1" style={{ margin: '12px 0 8px' }}>Built for a glance</h1>
      <p className="t-lead" style={{ fontSize: 16 }}>Infographics live on covers, dividers and summary slides — not in the analysis. Choose by purpose, then keep them sparse.</p>

      <Block meta="PURPOSE → ELEMENT">Decision guide</Block>
      <div style={{ border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', overflow: 'hidden', boxShadow: 'var(--elev-1)' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '260px 190px 1fr', background: 'var(--bg-2)', borderBottom: '1px solid var(--line)' }}>
          {['When you need to…', 'Use', 'How to apply it'].map((h, i) => <div key={i} style={{ padding: '11px 18px', borderLeft: i ? '1px solid var(--line)' : 'none' }} className="t-meta">{h}</div>)}
        </div>
        {choose.map(([purpose, use, how, tone], i) => (
          <div key={i} style={{ display: 'grid', gridTemplateColumns: '260px 190px 1fr', borderBottom: i < choose.length - 1 ? '1px solid var(--line)' : 'none' }}>
            <div style={{ padding: '13px 18px', fontSize: 13.5, color: 'var(--ink)' }}>{purpose}</div>
            <div style={{ padding: '13px 18px', borderLeft: '1px solid var(--line)', display: 'flex', alignItems: 'center', gap: 8 }}><Dot tone={tone} size={7} /><span style={{ fontSize: 13, fontWeight: 600, color: toneColor(tone) }}>{use}</span></div>
            <div style={{ padding: '13px 18px', borderLeft: '1px solid var(--line)' }} className="t-small">{how}</div>
          </div>
        ))}
      </div>

      <Block meta="6 RULES">Rules for glanceable infographics</Block>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }}>
        {rules.map(([t, d], i) => (
          <div key={i} style={{ background: 'var(--grad-surface)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '18px 20px', boxShadow: 'var(--elev-1)' }}>
            <div className="t-num" style={{ fontSize: 22, color: 'var(--accent)', opacity: 0.5 }}>{String(i + 1).padStart(2, '0')}</div>
            <div className="t-h3" style={{ fontSize: 15, margin: '8px 0 6px' }}>{t}</div>
            <div className="t-small" style={{ lineHeight: 1.5 }}>{d}</div>
          </div>
        ))}
      </div>
    </Doc>
  );

  window.ISG.register({
    id: 'infographics-kit', group: 'Infographics', name: 'Glanceable facts',
    interactive: true,
    blurb: 'Standalone visual facts for covers, dividers and summaries: icon-stat tiles, a divided stat band, numbered step ribbon, pictograph unit grid, diverging head-to-head bars and a milestone timeline. Abstract marks encode category only; the number always leads. A playbook frame maps purpose → element with six rules for keeping them glanceable.',
    frames: [
      { label: 'Infographic elements', mode: 'flow', w: W, node: libFrame },
      { label: 'Infographic playbook', mode: 'flow', w: W, node: guideFrame },
    ],
  });
})();


/* ===== tpl-architecture.jsx ===== */
/* ═══════════════════════════════════════════════════════════════
   ARCHITECTURE — real technical schematics, not abstract boxes.
   A small coordinate diagram engine (nodes + orthogonal edges +
   trust/network zones + hub-spoke) drives every frame. All color
   via the diagram palette tokens; theme-aware; SF Pro / SF Mono.
   Frames: Cover · System diagram · Deployment topology ·
           Data-source hub · Layered platform stack.
   ═══════════════════════════════════════════════════════════════ */

(function () {
  const W = 1920, H = 1080;
  const PALETTE = ['d-1', 'd-2', 'd-3', 'd-4', 'd-5', 'd-6', 'mute', 'accent'];

  /* ── Slide shell ─────────────────────────────────────────── */
  function Slide({ eyebrow, title, accentWord, dots = 0.4, children, titleMb = 18, foot }) {
    return (
      <div className="isg-scope" style={{
        width: W, height: H, background: 'var(--bg)', color: 'var(--ink)',
        padding: '72px 110px 60px', display: 'flex', flexDirection: 'column',
        position: 'relative', overflow: 'hidden',
      }}>
        {dots > 0 && <div style={{ position: 'absolute', inset: 0, backgroundImage: 'radial-gradient(circle, color-mix(in srgb, var(--ink) 11%, transparent) 1px, transparent 1px)', backgroundSize: '48px 48px', opacity: dots, pointerEvents: 'none' }} />}
        <div style={{ position: 'absolute', inset: 0, backgroundImage: 'var(--tx-grain)', backgroundSize: '160px 160px', opacity: 0.4, mixBlendMode: 'overlay', pointerEvents: 'none' }} />
        <div style={{ position: 'absolute', top: -220, right: -120, width: 820, height: 640, background: 'radial-gradient(circle, var(--accent-soft), transparent 70%)', filter: 'blur(50px)', pointerEvents: 'none', opacity: 0.7 }} />
        {eyebrow && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, fontFamily: 'var(--f-mono)', fontSize: 20, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--accent)', position: 'relative' }}>
            <span style={{ width: 38, height: 2, background: 'var(--accent)' }} />{eyebrow}
          </div>
        )}
        {title && (
          <h1 style={{ fontSize: 46, fontWeight: 600, letterSpacing: '-0.03em', lineHeight: 1.05, margin: `16px 0 ${titleMb}px`, position: 'relative' }}>
            {title} {accentWord && <span style={{ color: 'var(--accent)' }}>{accentWord}</span>}
          </h1>
        )}
        <div style={{ flex: 1, minHeight: 0, position: 'relative', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>{children}</div>
        {foot && <div style={{ display: 'flex', gap: 28, marginTop: 18, position: 'relative', flexWrap: 'wrap' }}>{foot}</div>}
      </div>
    );
  }

  /* ── Diagram engine ──────────────────────────────────────── */
  function getAnchor(n, side) {
    const cx = n.x + n.w / 2, cy = n.y + n.h / 2;
    switch (side) {
      case 'l': return { x: n.x, y: cy };
      case 'r': return { x: n.x + n.w, y: cy };
      case 't': return { x: cx, y: n.y };
      case 'b': return { x: cx, y: n.y + n.h };
      default:  return { x: cx, y: cy };
    }
  }
  function routePoints(a, b, router) {
    switch (router) {
      case 'straight': return [a, b];
      case 'hv': return [a, { x: b.x, y: a.y }, b];
      case 'vh': return [a, { x: a.x, y: b.y }, b];
      case 'v': { const m = (a.y + b.y) / 2; return [a, { x: a.x, y: m }, { x: b.x, y: m }, b]; }
      case 'h':
      default: { const m = (a.x + b.x) / 2; return [a, { x: m, y: a.y }, { x: m, y: b.y }, b]; }
    }
  }
  function pathD(pts) { return pts.map((p, i) => `${i ? 'L' : 'M'}${p.x},${p.y}`).join(' '); }
  function labelPt(a, b, router) {
    if (router === 'h' || router === undefined) return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    if (router === 'v') return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    if (router === 'hv') return { x: b.x, y: a.y };
    if (router === 'vh') return { x: a.x, y: b.y };
    return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  }

  function NodeContent({ n, t, sm }) {
    return (
      <>
        <div style={{ position: 'absolute', top: 0, left: 0, bottom: 0, width: 3, background: `var(--${t})`, boxShadow: `0 0 12px var(--${t})` }} />
        {n.kicker && <div style={{ fontFamily: 'var(--f-mono)', fontSize: sm ? 11 : 13.5, letterSpacing: '0.12em', textTransform: 'uppercase', color: `var(--${t})` }}>{n.kicker}</div>}
        {n.title && <div style={{ fontSize: n.big ? 27 : (sm ? 16 : 22), fontWeight: 600, letterSpacing: '-0.01em', marginTop: n.kicker ? 5 : 0, color: 'var(--ink)', lineHeight: 1.1 }}>{n.title}</div>}
        {n.sub && <div style={{ fontSize: sm ? 12.5 : 15, color: 'var(--ink-3)', marginTop: 4, lineHeight: 1.35 }}>{n.sub}</div>}
        {n.items && <div style={{ marginTop: 'auto', display: 'flex', flexDirection: 'column', gap: 3, paddingTop: 8 }}>{n.items.map((it, i) => <span key={i} style={{ fontFamily: 'var(--f-mono)', fontSize: 14, color: 'var(--ink-2)' }}>{it}</span>)}</div>}
        {n.tags && <div style={{ marginTop: 'auto', display: 'flex', gap: 6, flexWrap: 'wrap', paddingTop: 8 }}>{n.tags.map((tg, i) => <span key={i} style={{ fontFamily: 'var(--f-mono)', fontSize: 12, padding: '3px 9px', borderRadius: 6, background: `var(--${t}-soft)`, border: `1px solid var(--${t}-line)`, color: `var(--${t})` }}>{tg}</span>)}</div>}
      </>
    );
  }

  function NodeBox({ n, dimmed, onHover }) {
    const t = n.tone || 'd-2';
    const sm = n.sm;
    const clickable = !!(n.detail || n.href);
    const baseStyle = {
      position: 'absolute', left: n.x, top: n.y, width: n.w, height: n.h,
      background: n.solid ? `var(--${t}-fill), var(--bg-1)` : 'var(--grad-surface)',
      border: `${n.big ? 2 : 1.5}px solid var(--${t}-line)`,
      borderRadius: sm ? 10 : 14, padding: sm ? '10px 13px' : '15px 18px',
      display: 'flex', flexDirection: 'column',
      boxShadow: n.big ? `var(--${t}-glow), 0 1px 0 rgba(255,255,255,0.05) inset` : '0 2px 12px rgba(0,0,0,0.22), 0 1px 0 rgba(255,255,255,0.04) inset',
      overflow: 'hidden',
      opacity: dimmed ? 0.38 : 1,
      transition: 'opacity var(--dur) var(--ease-out), transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out)',
      color: 'inherit', textDecoration: 'none',
    };
    const hoverHandlers = { onMouseEnter: () => onHover && onHover(n.id), onMouseLeave: () => onHover && onHover(null) };
    const cue = clickable ? <span className="ix-cue" aria-hidden="true">{n.href ? '↗' : '+'}</span> : null;
    const inner = <><NodeContent n={n} t={t} sm={sm} /></>;
    if (!clickable) {
      return <div style={baseStyle} {...hoverHandlers}>{n.big && <FlowEdge dur={8} />}{inner}</div>;
    }
    if (n.href) {
      const ext = /^(https?:|mailto:|tel:)/.test(n.href);
      return (
        <a className="ix ix-lift" style={baseStyle} href={n.href} target={ext ? '_blank' : undefined} rel={ext ? 'noopener noreferrer' : undefined} {...hoverHandlers}>
          {cue}{n.big && <FlowEdge dur={8} />}{inner}
        </a>
      );
    }
    const fire = (e) => { e.stopPropagation(); openInspector(n.detail); };
    return (
      <div className="ix ix-lift" role="button" tabIndex={0} style={baseStyle} {...hoverHandlers}
           onClick={fire} onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fire(e); } }}>
        {cue}{n.big && <FlowEdge dur={8} />}{inner}
      </div>
    );
  }

  /* nodes: {id,x,y,w,h,...NodeBox props, detail?, href?}
     edges: {from:'id:side', to:'id:side', router, tone, label, dashed}
     zones: {x,y,w,h,label,tone}
     Hovering a node highlights its edges (animated flow) + neighbors,
     dims the rest; clicking a node with `detail` opens the Inspector. */
  function Diagram({ w, h, nodes, edges = [], zones = [], style }) {
    const [hover, setHover] = React.useState(null);
    const byId = {}; nodes.forEach((n) => { byId[n.id] = n; });
    const resolve = (ref) => { const [id, side] = ref.split(':'); return getAnchor(byId[id], side || 'c'); };
    const endIds = (e) => [e.from.split(':')[0], e.to.split(':')[0]];
    const anyHover = !!hover;
    const nbr = new Set();
    if (hover) { nbr.add(hover); edges.forEach((e) => { const [a, b] = endIds(e); if (a === hover) nbr.add(b); if (b === hover) nbr.add(a); }); }
    const isConn = (e) => { if (!hover) return false; const [a, b] = endIds(e); return a === hover || b === hover; };
    return (
      <div style={{ position: 'relative', width: w, height: h, margin: '0 auto' }} onMouseLeave={() => setHover(null)}>
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ position: 'absolute', inset: 0, overflow: 'visible' }}>
          <defs>
            {PALETTE.map((t) => (
              <marker key={t} id={`ah-${t}`} markerWidth="11" markerHeight="11" refX="7.5" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill={`var(--${t})`} />
              </marker>
            ))}
          </defs>
          {zones.map((z, i) => (
            <g key={`z${i}`}>
              <rect x={z.x} y={z.y} width={z.w} height={z.h} rx="18" fill={`color-mix(in srgb, var(--${z.tone || 'mute'}) 4%, transparent)`} stroke={`var(--${z.tone || 'mute'}-line)`} strokeWidth="1.5" strokeDasharray="7,5" />
              {z.label && <text x={z.x + 18} y={z.y + 26} fill={`var(--${z.tone || 'mute'})`} style={{ fontFamily: 'var(--f-mono)', fontSize: 14, letterSpacing: '0.16em', textTransform: 'uppercase', opacity: 0.85 }}>{z.label}</text>}
            </g>
          ))}
          {edges.map((e, i) => {
            const a = resolve(e.from), b = resolve(e.to);
            const pts = routePoints(a, b, e.router);
            const t = e.tone || 'd-6';
            const conn = isConn(e);
            const dim = anyHover && !conn;
            return (
              <g key={`e${i}`}>
                <path d={pathD(pts)} fill="none" stroke={`var(--${t})`} strokeWidth={e.width || 1.8} strokeDasharray={e.dashed ? '6,5' : 'none'} markerEnd={`url(#ah-${t})`} opacity={dim ? 0.16 : (e.dim ? 0.5 : 0.9)} style={{ transition: 'opacity var(--dur) var(--ease-out)' }} />
                {conn && <path d={pathD(pts)} className="svg-edge-flow" pathLength="1" style={{ '--fl-edgedur': '1.8s', stroke: `var(--${t})` }} />}
              </g>
            );
          })}
        </svg>
        {edges.filter((e) => e.label).map((e, i) => {
          const a = resolve(e.from), b = resolve(e.to);
          const p = labelPt(a, b, e.router);
          const t = e.tone || 'd-6';
          return (
            <div key={`l${i}`} style={{ position: 'absolute', left: p.x, top: p.y, transform: 'translate(-50%,-50%)', fontFamily: 'var(--f-mono)', fontSize: 13, letterSpacing: '0.06em', color: `var(--${t})`, background: 'var(--bg)', border: `1px solid var(--${t}-line)`, borderRadius: 6, padding: '3px 9px', whiteSpace: 'nowrap' }}>{e.label}</div>
          );
        })}
        {nodes.map((n) => <NodeBox key={n.id} n={n} dimmed={anyHover && !nbr.has(n.id)} onHover={setHover} />)}
      </div>
    );
  }

  /* ── Frame 1 · COVER ─────────────────────────────────────── */
  const cover = (
    <Slide eyebrow="Technology Architecture" dots={0.45}
      foot={[['d-1', '[ metric ]', '[ measured ]'], ['d-5', '[ component ]', '[ form factor ]'], ['d-6', 'JSON', '[ contract ]'], ['d-3', '[ mode ]', '[ surface ]']].map(([t, v, l], i) => (
        <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: 6, paddingRight: 28, borderRight: i < 3 ? '1px solid var(--line)' : 'none', minWidth: 200 }}>
          <span style={{ fontSize: 38, fontWeight: 600, letterSpacing: '-0.03em', color: `var(--${t})`, lineHeight: 1 }}>{v}</span>
          <span style={{ fontSize: 18, color: 'var(--ink-3)' }}>{l}</span>
        </div>
      ))}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
        <div style={{ fontSize: 104, fontWeight: 600, letterSpacing: '-0.05em', lineHeight: 0.94 }}>[ Product&nbsp;Name ]</div>
        <div style={{ fontSize: 36, fontWeight: 400, letterSpacing: '-0.02em', color: 'var(--ink-3)' }}>architecture &nbsp;·&nbsp; <span style={{ color: 'var(--ink)', fontWeight: 500 }}>[ Company ]</span></div>
        <div style={{ width: 80, height: 3, background: 'var(--accent)', borderRadius: 2 }} />
        <div style={{ fontSize: 27, color: 'var(--ink-2)', maxWidth: 1180, lineHeight: 1.5 }}>[ One-line architecture thesis — what the product is, the single contract it is built around, and the clean separation that makes it portable. ]</div>
      </div>

  );

  /* ── Frame 2 · SYSTEM DIAGRAM ────────────────────────────── */
  const sysNodes = [
    { id: 's1', x: 20, y: 95, w: 250, h: 140, tone: 'd-1', kicker: 'Source', title: '[ System A ]', sub: '[ type / origin ]',
      detail: { kicker: 'Source · System A', title: '[ System A ]', tone: 'd-1', sub: '[ type / origin ]',
        body: ['Click any component to inspect it. Replace this copy with what the source is, how it is reached, and the cadence of collection.'],

      detail: { kicker: 'Source · System C', title: '[ System C ]', tone: 'd-1', sub: '[ type / origin ]',

    { id: 'c',  x: 440, y: 270, w: 280, h: 180, tone: 'd-5', big: true, kicker: 'Collector', title: '[ Agent ]', sub: '[ single binary · stateless ]', tags: ['[ pull ]', '[ cron ]'],

        tags: ['[ pull ]', '[ cron ]', '[ portable ]'],
        links: [{ label: 'Open agent docs', href: '#', primary: true }, { label: 'View on GitHub', href: 'https://github.com' }] } },
    { id: 'p0', x: 820, y: 70, w: 500, h: 120, tone: 'd-2', kicker: 'Store', title: '[ Backing store ]', sub: '[ engine · retention ]',
      detail: { kicker: 'Store', title: '[ Backing store ]', tone: 'd-2', sub: '[ engine · retention ]',
        body: ['Durable storage for everything the collector emits.'],

    { id: 'p1', x: 820, y: 235, w: 240, h: 160, tone: 'd-6', kicker: 'Service', title: '[ Feature A ]', sub: '[ time-series ]',
      detail: { kicker: 'Service', title: '[ Feature A ]', tone: 'd-6', sub: '[ time-series ]', body: ['Describe what this service computes.'] } },
    { id: 'p2', x: 1080, y: 235, w: 240, h: 160, tone: 'd-4', kicker: 'Service', title: '[ Feature B ]', sub: '[ rule checks ]',
      detail: { kicker: 'Service', title: '[ Feature B ]', tone: 'd-4', sub: '[ rule checks ]', body: ['Describe what this service computes.'] } },
    { id: 'p3', x: 820, y: 425, w: 240, h: 160, tone: 'd-3', kicker: 'Service', title: '[ Feature C ]', sub: '[ drill-down ]',
      detail: { kicker: 'Service', title: '[ Feature C ]', tone: 'd-3', sub: '[ drill-down ]', body: ['Describe what this service computes.'] } },
    { id: 'p4', x: 1080, y: 425, w: 240, h: 160, tone: 'd-5', kicker: 'Service', title: '[ Feature D ]', sub: '[ topology ]',
      detail: { kicker: 'Service', title: '[ Feature D ]', tone: 'd-5', sub: '[ topology ]', body: ['Describe what this service computes.'] } },
    { id: 'u1', x: 1430, y: 200, w: 230, h: 150, tone: 'd-3', kicker: 'Consumer', title: '[ Dashboard ]', sub: '[ UI surface ]', href: '#',
      detail: null },
    { id: 'u2', x: 1430, y: 420, w: 230, h: 150, tone: 'd-3', kicker: 'Consumer', title: '[ Alerting ]', sub: '[ notify path ]',
      detail: { kicker: 'Consumer', title: '[ Alerting ]', tone: 'd-3', sub: '[ notify path ]', body: ['Where signals are delivered.'], links: [{ label: 'Configure alerts', href: '#', primary: true }] } },
  ];
  const sysZones = [
    { x: 0, y: 50, w: 290, h: 620, label: 'Sources', tone: 'd-1' },
    { x: 790, y: 20, w: 560, h: 660, label: 'Platform', tone: 'd-2' },

  const sysEdges = [

  const systemSlide = (

  /* ── Frame 3 · DEPLOYMENT TOPOLOGY ───────────────────────── */
  function DeployCol({ tone, mode, name, sub, bullets, boundary, internet }) {
    const cw = 470, ch = 250;
    const nodes = [

    const zones = boundary ? [{ x: 8, y: internet ? 40 : 56, w: 454, h: internet ? 200 : 168, label: boundary, tone }] : [];
    const edges = [

    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: `var(--${tone}-fill), var(--${tone}-soft)`, border: `1.5px solid var(--${tone}-line)`, borderRadius: 'var(--r-xl)', overflow: 'hidden' }}>

  const deploySlide = (

      <div style={{ flex: 1, display: 'flex', gap: 28, alignItems: 'stretch' }}>

        <DeployCol tone="d-3" mode="Mode 2" name="Self-hosted" sub="[ your network ]" boundary="Your network boundary"
          bullets={['[ .deb / .rpm / container ]', '[ Data never leaves the LAN ]', '[ Self-managed store ]']} />
        <DeployCol tone="d-1" mode="Mode 3" name="Air-gapped" sub="[ isolated network ]" boundary="Fully isolated"

  /* ── Frame 4 · DATA-SOURCE HUB (hub & spoke) ─────────────── */
  function HubDiagram() {
    const w = 1500, h = 700, cx = w / 2, cy = h / 2;
    const rx = 560, ry = 290;
    const sources = ['[ source_one ]', '[ source_two ]', '[ source_three ]', '[ source_four ]', '[ source_five ]', '[ source_six ]', '[ source_seven ]', '[ source_eight ]'];
    const angles = [-90, -45, 0, 45, 90, 135, 180, 225].map((d) => (d * Math.PI) / 180);
    const pw = 230, ph = 56;
    const pills = sources.map((s, i) => {
      const px = cx + rx * Math.cos(angles[i]);
      const py = cy + ry * Math.sin(angles[i]);
      return { s, px, py, x: px - pw / 2, y: py - ph / 2 };
    });
    return (
      <div style={{ position: 'relative', width: w, height: h, margin: '0 auto' }}>

          <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill="none" stroke="var(--line)" strokeWidth="1" strokeDasharray="2,8" opacity="0.7" />
        </svg>

          <div style={{ fontSize: 34, fontWeight: 600, letterSpacing: '-0.02em' }}>[ Agent ]</div>
          <div style={{ fontSize: 16, color: 'var(--ink-3)' }}>[ N+ metrics / run ]</div>
        </div>
        <div style={{ position: 'absolute', left: cx - 130, top: cy + 100, width: 260, textAlign: 'center', fontFamily: 'var(--f-mono)', fontSize: 15, color: 'var(--d-6)', background: 'var(--d-6-soft)', border: '1px solid var(--d-6-line)', borderRadius: 100, padding: '7px 0' }}>→ emits portable JSON</div>
      </div>
    );
  }
  const hubSlide = (
    <Slide eyebrow="Collection Model" title="One agent," accentWord="every source" titleMb={6} dots={0.3}>
      <HubDiagram />
    </Slide>
  );

  /* ── Frame 5 · LAYERED PLATFORM STACK ────────────────────── */
  function Layer({ tone, tag, title, sub, boxes, last }) {
    return (
      <div style={{ position: 'relative' }}>
        <div style={{ display: 'flex', alignItems: 'stretch', background: `var(--${tone}-fill), var(--${tone}-soft)`, border: `1.5px solid var(--${tone}-line)`, borderRadius: 'var(--r-lg)', overflow: 'hidden' }}>
          <div style={{ width: 220, flexShrink: 0, padding: '20px 24px', borderRight: `1px solid var(--${tone}-line)`, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 6 }}>
            <div style={{ fontFamily: 'var(--f-mono)', fontSize: 14, letterSpacing: '0.14em', textTransform: 'uppercase', color: `var(--${tone})` }}>{tag}</div>
            <div style={{ fontSize: 26, fontWeight: 600, letterSpacing: '-0.02em' }}>{title}</div>
            <div style={{ fontSize: 15, color: 'var(--ink-3)' }}>{sub}</div>
          </div>
          <div style={{ flex: 1, padding: 16, display: 'flex', gap: 14 }}>
            {boxes.map((b, i) => (
              <div key={i} style={{ flex: 1, background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 'var(--r)', padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 4 }}>
                <div style={{ fontSize: 18, fontWeight: 600 }}>{b[0]}</div>
                <div style={{ fontSize: 14, color: 'var(--ink-3)' }}>{b[1]}</div>
              </div>
            ))}
          </div>
        </div>
        {!last && (
          <div style={{ display: 'flex', justifyContent: 'center', height: 30, alignItems: 'center' }}>
            <svg width="22" height="30" viewBox="0 0 22 30"><path d="M11,2 V22" stroke="var(--d-6)" strokeWidth="2" /><path d="M4,16 L11,24 L18,16" fill="none" stroke="var(--d-6)" strokeWidth="2" /></svg>
          </div>
        )}
      </div>

  }
  const stackSlide = (
    <Slide eyebrow="Layer Model" title="A clean," accentWord="layered stack" titleMb={16} dots={0.25}>
      <div style={{ display: 'flex', flexDirection: 'column' }}>
        <Layer tone="d-1" tag="L1 · Collect" title="[ Ingest ]" sub="[ stateless agents ]" boxes={[['[ Collector ]', '[ pull · cron ]'], ['[ Adapter ]', '[ per-source ]'], ['[ Buffer ]', '[ at-least-once ]']]} />
        <Layer tone="d-2" tag="L2 · Store" title="[ Persist ]" sub="[ backing store ]" boxes={[['[ Time-series ]', '[ retention ]'], ['[ Catalog ]', '[ metadata ]'], ['[ Index ]', '[ query path ]']]} />
        <Layer tone="d-3" tag="L3 · Serve" title="[ Analyze ]" sub="[ application layer ]" boxes={[['[ Query API ]', '[ read path ]'], ['[ Rules ]', '[ evaluation ]'], ['[ Export ]', '[ downstream ]']]} />
        <Layer tone="d-5" tag="L4 · Consume" title="[ Surface ]" sub="[ edges ]" last boxes={[['[ Dashboard ]', '[ UI ]'], ['[ Alerting ]', '[ notify ]'], ['[ API ]', '[ integrations ]']]} />
      </div>
    </Slide>
  );

  window.ISG.register({
    id: 'arch-deck', group: 'Architecture deck', name: 'Technology architecture deck',
    interactive: true,
    blurb: 'Real technical schematics built on a node/edge/zone diagram engine — components as nodes, directional data-flow arrows, trust/network boundaries, a hub-and-spoke source map and a layered stack. Each node owns one muted diagram hue; coral marks the lead component.',
    frames: [
      { label: 'Cover', mode: 'board', w: W, h: H, node: cover },
      { label: 'System diagram', mode: 'board', w: W, h: H, node: systemSlide },
      { label: 'Deployment topology', mode: 'board', w: W, h: H, node: deploySlide },
      { label: 'Data-source hub', mode: 'board', w: W, h: H, node: hubSlide },

/* ===== tpl-roadmap.jsx ===== */
/* ═══════════════════════════════════════════════════════════════
   ROADMAP — interactive planning boards.
   Frame 1 · Quarters timeline (clickable phase bars + milestones)
   Frame 2 · Now / Next / Later (clickable initiative cards)
   Every phase, milestone and card is an Interactive element: click
   to open the Inspector with window, owner, scope and links.
   ═══════════════════════════════════════════════════════════════ */

(function () {
  const W = 1920, H = 1080;

  function Slide({ eyebrow, title, accentWord, lead, children, foot, dots = 0.32 }) {
    return (

  /* ── Frame 1 · QUARTERS TIMELINE ─────────────────────────── */
  const COLS = ['Q1', 'Q2', 'Q3', 'Q4'];
  const PHASES = [

      detail: { kicker: 'Discovery · Q1', title: 'Research & scoping', tone: 'd-2', sub: '[ workstream owner ]',
        body: ['Click any phase to inspect its window, owner and exit criteria. Replace this with the goals for the phase.'],
        stats: [{ k: 'Window', v: 'Q1' }, { k: 'Owner', v: '[ team ]' }, { k: 'Exit', v: '[ signed scope ]' }], tags: ['[ interviews ]', '[ scoping ]'] } },
    { row: 1, ws: 'Foundations', s: 0.8, len: 1.7, tone: 'd-5', label: 'Platform groundwork',
      detail: { kicker: 'Foundations · Q1–Q2', title: 'Platform groundwork', tone: 'd-5', sub: '[ workstream owner ]',

    { row: 2, ws: 'Build', s: 1.5, len: 1.7, tone: 'd-1', label: 'Core feature build',
      detail: { kicker: 'Build · Q2–Q3', title: 'Core feature build', tone: 'd-1', sub: '[ workstream owner ]',

    { row: 3, ws: 'Pilot', s: 2.8, len: 0.8, tone: 'd-4', label: 'Design-partner pilot',
      detail: { kicker: 'Pilot · Q3', title: 'Design-partner pilot', tone: 'd-4', sub: '[ workstream owner ]',
        body: ['Limited rollout with design partners before GA.'], stats: [{ k: 'Window', v: 'Q3' }, { k: 'Cohort', v: '[ N partners ]' }] } },
    { row: 4, ws: 'Launch', s: 3.4, len: 0.6, tone: 'd-3', label: 'General availability',
      detail: { kicker: 'Launch · Q4', title: 'General availability', tone: 'd-3', sub: '[ workstream owner ]',
        body: ['Open the doors. Marketing, docs and support all live.'], stats: [{ k: 'Window', v: 'Q4' }, { k: 'Gate', v: '[ readiness review ]' }], tags: ['[ GA ]'] } },
  ];
  const MILESTONES = [
    { at: 1.2, row: 0, label: 'Scope locked', tone: 'd-2', detail: { kicker: 'Milestone', title: 'Scope locked', tone: 'd-2', body: ['The point where requirements freeze and build can begin.'], stats: [{ k: 'Date', v: '[ end Q1 ]' }] } },

  function Timeline() {
    const labelW = 240, trackW = 1380, colW = trackW / 4, rowH = 92, gap = 18, topH = 44;

        {MILESTONES.map((m, i) => (
          <Interactive key={i} detail={m.detail} lift={false}

        ))}
      </div>
    );

  );

  /* ── Frame 2 · NOW / NEXT / LATER ────────────────────────── */
  const HORIZONS = [
    { tag: 'Now', tone: 'd-1', sub: 'In flight this quarter', items: [
      { t: '[ Initiative A ]', s: '[ shipping ]', body: ['What is actively being built right now.'], stats: [{ k: 'Status', v: '[ in progress ]' }, { k: 'Owner', v: '[ team ]' }], links: [{ label: 'Tracking board', href: '#', primary: true }] },
      { t: '[ Initiative B ]', s: '[ shipping ]', body: ['Second active initiative.'], stats: [{ k: 'Status', v: '[ in progress ]' }] },
      { t: '[ Initiative C ]', s: '[ hardening ]', body: ['Stabilization work before release.'] },
    ] },
    { tag: 'Next', tone: 'd-4', sub: 'Committed, not started', items: [
      { t: '[ Initiative D ]', s: '[ committed ]', body: ['Planned for the following quarter.'], stats: [{ k: 'Status', v: '[ queued ]' }] },
      { t: '[ Initiative E ]', s: '[ committed ]', body: ['Dependent on Now items landing.'] },
    ] },
    { tag: 'Later', tone: 'd-5', sub: 'Under consideration', items: [
      { t: '[ Initiative F ]', s: '[ exploring ]', body: ['On the radar; not yet scoped.'] },
      { t: '[ Initiative G ]', s: '[ exploring ]', body: ['Opportunistic / stretch.'] },
      { t: '[ Initiative H ]', s: '[ idea ]', body: ['Raw idea awaiting validation.'] },
    ] },
  ];

  const horizonSlide = (
    <Slide eyebrow="Prioritization" title="Now," accentWord="next, later"
      lead="Three horizons of certainty. Click a card to inspect status, owner and links.">
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 28, alignItems: 'start' }}>
        {HORIZONS.map((h, i) => (
          <div key={i} style={{ background: `var(--${h.tone}-fill), var(--${h.tone}-soft)`, border: `1.5px solid var(--${h.tone}-line)`, borderRadius: 'var(--r-xl)', overflow: 'hidden' }}>
            <div style={{ padding: '22px 26px 18px', borderBottom: `1px solid var(--${h.tone}-line)`, background: `color-mix(in srgb, var(--${h.tone}) 9%, transparent)` }}>
              <div style={{ fontFamily: 'var(--f-mono)', fontSize: 15, letterSpacing: '0.16em', textTransform: 'uppercase', color: `var(--${h.tone})` }}>{h.tag}</div>
              <div style={{ fontSize: 19, color: 'var(--ink-3)', marginTop: 6 }}>{h.sub}</div>
            </div>
            <div style={{ padding: 18, display: 'flex', flexDirection: 'column', gap: 14 }}>
              {h.items.map((it, j) => (
                <Interactive key={j} cue="inspect" lift
                  detail={{ kicker: h.tag, title: it.t, tone: h.tone, sub: it.s, body: it.body, stats: it.stats, links: it.links }}
                  style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 'var(--r-lg)', padding: '18px 20px' }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 12 }}>
                    <span style={{ fontSize: 22, fontWeight: 600, letterSpacing: '-0.01em' }}>{it.t}</span>
                  </div>
                  <div style={{ fontFamily: 'var(--f-mono)', fontSize: 14, letterSpacing: '0.08em', textTransform: 'uppercase', color: `var(--${h.tone})`, marginTop: 8 }}>{it.s}</div>
                </Interactive>
              ))}
            </div>
          </div>
        ))}
      </div>
    </Slide>
  );

  window.ISG.register({
    id: 'roadmap', group: 'Roadmap', name: 'Roadmap & timeline',
    interactive: true,
    blurb: 'Interactive planning boards: a four-quarter timeline with clickable phase bars and milestone diamonds, plus a Now / Next / Later prioritization grid. Every phase, milestone and initiative opens the Inspector with its window, owner, scope and links — coral marks the critical path.',
    frames: [
      { label: 'Quarters timeline', mode: 'board', w: W, h: H, node: timelineSlide },
      { label: 'Now / Next / Later', mode: 'board', w: W, h: H, node: horizonSlide },
    ],
  });
})();
